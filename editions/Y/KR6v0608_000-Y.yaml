body:
  text: 自序編述之緣起方針與目的佛教之末流病莫急於好大喜功好大則不切實際偏激者誇誕擬想者附會美之曰無往而不圓融喜功則不擇手段淫猥也可卑劣也可美之曰無事而非方便圓融方便昔嘗深信不疑且以此為佛教獨得之秘也七七軍興避難來巴之縉雲山間與師友談輒深感於中國佛教之信者眾而卒無以紓國族之急聖教之危吾人殆有所未盡乎乃稍稍反而責諸己二十七年冬梁漱溟氏來山自述其學佛中止之機曰此時此地此人吾聞而思之深覺不特梁氏之為然宋明理學之出佛歸儒亦未嘗不緣此一念也佛教之遍十方界盡未來際度一切有情心量廣大非不善也然不假以本末先後之辨任重致遠之行而競為三生取辦一生圓證即身成佛之談事大而急功無惑乎佛教之言高而行卑也吾心疑甚殊不安時治唯識學探其源於阿含經讀得諸佛皆出人間終不在天上成佛也句有所入釋尊之為教有十方世界而詳此土立三世而重現在志度一切有情而特以人類為本釋尊之本教初不與末流之圓融者同動言十方世界一切有情也吾為之喜極而淚二十九年遊黔之筑垣張力羣氏時相過從時太虛大師訪問海南佛教國以評王公度之印度信佛而亡主印度以不信佛而亡與海南之同情王氏者辯張氏聞之舉以相商曰為印度信佛而亡之說者昧於孔雀王朝之崇佛而強固不可然謂印度以不信佛而亡疑亦有所未盡夫印度佛教之流行歷千六百年時不為不久遍及五印信者不為不眾而末流所趨何以日見衰竭其或印度佛教之興有其可興之道佛教之衰滅末流偽雜有以致之乎余不知所以應姑答以容考之釋慧松歸自海南道出筑垣與之作三日談慧師於無往不圓融無事非方便攻難甚苦蓋病其流風之雜濫梵佛一體而失佛教之真也自爾以來為學之方針日定深信佛教於長期之發展中必有以流變而失真者探其宗本明其流變抉擇而洗鍊之願自治印度佛教始察思想之所自來動機之所出於身心國家實益之所在不為華飾之辯論所蒙願本此意以治印度之佛教治印度佛教不易取材於迻譯之經論古德之傳記支離破碎甚苦無嚴明條貫之體系足資依循察印度佛教之流變自其事理之特徵約為五階而束之為三時三時之證有四一經典之暗示聲聞藏不判教性空大乘經判小大二教以空為究竟說真常與唯心之大乘經判三教初則詳無常實有之聲聞行次則說性空幻有之菩薩行後則說真常妙有不空之如來行以空為不了義昔以一切經為佛說則三者為如來說教之次第今以歷史印證之則印度佛教發展之遺痕也二察學者之從違凡信聲聞藏者或有不信大乘經為佛說信大乘經者必信聲聞藏信聲聞及大乘性空經者多有拒斥真常論與唯心論信真常唯心論者必以空為佛說此以後承於前故必信前者不詳後見後說之有異於前故或破之三符古德之判教印華古德之約理以判教者並與此三期之次第合嘗為三期佛教與判教一文揭之於海潮音見二十二卷十二期四合傳譯之次第經則自漢迄東晉之末以般若法華以法華為真常論隋智者牽合於涅槃而後盛說之前此之宋慧觀梁法雲輩不聞此說十地經淨名經首楞嚴三昧經等為盛並性空之經也東晉末覺賢譯如來藏經北涼曇無讖譯涅槃金光明大集劉宋求那跋陀羅譯楞伽深密法鼓勝鬘經真常與唯心之經東來乃日多以言論西晉竺法護創譯龍樹之性空論北魏宋齊梁間乃有彌勒無著堅慧等真常與唯心論傳說之大乘起信論則謂出於陳真諦之譯印度之佛教初則無常論盛行中則性空論後乃有真常論盛行參證史跡有如此不可以意為出入也印度佛教之僅存者多斷片支離破碎甚吾人實無如之何欲為印度佛教史之敘述惟有積此支離破碎之片斷以進窺錯綜複雜之流變離此實無適當之途徑可循印度佛教發展之全貌時賢雖或有異說而實大體從同即此以探其宗本自流變以批判其臧否則以佛教者行解之龐雜勢必紛呶不已海南佛教者以聲聞行為究竟藏衛來者以無上瑜伽為特高中國佛教之傳統學者以真常論為根基三論天臺融真常於性空唯識則隱常於真常賢禪密為徹底之真常者淨則隨學者所學而出入之茲不暇辯詰請直述研求之所見佛教乃內本釋尊之特見外冶印度文明以創立者故流變之印度佛教有反釋尊之特見者闢之可也非適應無以生存其因地因時因人而間不同者事之不可免且毋寧視為當然以是海南佛教者忽視佛教正常之開顯方便之適應指責一切大乘道非佛意也然方便云云或為正常之適應或為畸形之發展或為毒素之羼入必嚴為料簡正不能率以方便二字混濫之釋尊之特見標緣起無我說反吠陀之常我論而興後期之佛教日傾向於真常唯心與常我論合流直就其理論觀之雖融三明之哲理未見其大失即繩墨之亦見理未徹姑為汲引婆羅門印度教而談不得解脫而已若即理論之圓融方便而見之於事行則印度真常論者之末流融神秘欲樂而成邪正雜濫之梵佛一體在中國者末流為三教同源論冥鏹祀祖扶鸞降神等無不滲雜於其間真常唯心論即佛教之梵化設以此為究竟正不知以何為釋尊之特見也印度之佛教自以釋尊之本教為淳樸深簡平實然適應時代之聲聞行無以應世求應學釋尊本行之菩薩道中期佛教之緣起性空即緣起無我之深化雖已啟梵化之機而意象多允當龍樹集其成其說菩薩也三乘同入無餘涅槃而發菩提心其精神為忘己為人抑他力為卑怯自力不由他其精神為盡其在我三阿僧祇劫有限有量其精神為任重致遠菩薩之真精神可學略可於此見之龍樹有革新僧團之志事未成而可師能立本於根本佛教之淳樸宏闡中期佛教之行解梵化之機應慎攝取後期佛教之確當者庶足以復興佛教而暢佛之本懷也歟中國佛教為圓融方便真常唯心他力頓證之所困已奄奄無生氣神秘欲樂之說自西而東又日有泛濫之勢乃綜合所知編印度之佛教為諸生講之僻處空山參考苦少直探於譯典者多於時賢之作惟內院出版之數種商務本之佛教史略印度哲學宗教史而已不復一一註出非掠美也書成演培妙欽文慧等諸學友勸以刊行且罄其僅有之一切為刊費心不忍卻允之得周君貫仁蒙君仁慈為任校印之責學友之熱忱可感有如此令人忘其庸病矣民國三一一三印順自序於合江法王學院

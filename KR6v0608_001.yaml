body:
  text: 第一章印度佛教流變概觀佛教創始於印度釋迦牟尼乃釋尊本其獨特之深見應人類之共欲陶冶印度文化而樹立者其在印度凡流行千六百年而斬因地而異因人而異因時而異離合錯綜極其變法海汪洋入之者輒莫知方隅焉試聚世界佛徒於一堂叩其所學察其所行則將見彼此之不同遠出吾人意料外此雖以適應異族文化而有所變然其根本之差別實以承受印度之佛教者異也以是欲知佛教之本質及其流變應於印度佛教中求之佛教乃內本釋尊之特見外冶印度文明而創立者與印度固有之文明關涉頗深故欲為印度佛教流變之鳥瞰應一審佛教以前印度文明之梗概印度文明之開發者為印歐族之雅利安人白種之一支一初自西北移入印度於佛元前十二世紀至六世紀頃以五河地方為中心逐先住之達羅毗荼族棕種之一支等於南方而居之其被虜獲者呼為首陀羅即奴隸族也當時之雅利安人崇敬日月等自然神事火祭祀讚神而述其願求懷德畏威神格尚高潔崇神之目的如戰爭勝利畜牧繁殖乃至家庭和諧身心健康概為現實人生之滿足來生之觀念雖有而未詳晰其末期已有自哲學之見地開始為宇宙人生之解説者代表印度最古文化之梨俱吠陀即此期之作品可謂之吠陀創始時代二次於佛元前六世紀至三世紀頃雅利安人以閻牟那河上流之拘羅地方為中心厚植其勢力婆羅門教之中國即此次又東南下而達恆河之下流舍衛國以東特以鄰接緬藏區之民族多有黃色人種然亦為所征服此時之雅利安人受被征服者神祕思想之熏染幽靈密咒之崇拜大盛婆羅門高於一切以祭祀為萬能以神鬼為工具而利用之神格日以卑落好表徵重儀式確立四姓之制生死流轉之説起於此時於現實人生之無限滿足外轉為來生天國之要求此可謂之梵教極盛時代三自佛元前二三世紀以來雅利安文明漸南達德干高原且遍及於全印然南印民族漸受梵化而非武力之征服其恆河下流富有黃種血統之民族受吠陀文化之誘發文事大啓摩竭陀之悉蘇那伽王朝且漸為印度之政治重心婆羅門教之中國反退為邊地矣時東方有為之民族以受吠陀文化之熏習多以雅利安人之剎帝利自居而實未盡然如巴達耶那法經説摩竭陀人韋提希人非雅利安人也吠陀受東方文明之潛化不復以祭祀萬能升天永樂為滿足乃演為達本窮理之學承吠陀梵書而起之奧義書於婆羅門教隱含否定之機於梵行幼年學業家住主持家業之上加以林棲遁世之苦行生活於祭祀生天之上創真我解脫之説我性本淨如何離塵垢而契入梵我之實體要以克制情欲之苦行集中意志之瑜伽外苦形骸而內離妄念念表徵梵我之唵則達真我超越之解脫承此反吠陀傾向之暗流而開展之乃産生多種出家之沙門團多以嚴酷之苦行求解脫而成風行一時之反吠陀潮流此可謂之教派興起時代雅利安文明受異族文化之同化於前反抗於後婆羅門教乃為之一時衰落也東方新興民族之勃起雖衍出反吠陀之潮流而以氣候酷暑受東南濱海民族之影響頗嫌於神祕苦行極端釋尊乃乘時而興來自雪山之麓慈和不失其雄健深思而不流於神祕淡泊而薄苦行創佛教弘正法於恆河兩岸所弘之正法以緣起為本即世間為相依相資之存在無神我為世界之主宰亦無神我為個人之靈體也以世間為無我之緣起故於現實人生之佛教反侵略而歌頌無諍闢四姓階級而道平等於未來生天之佛教崇善行以代祭祀萬能尊自力以斥神力咒力於究竟解脫之佛教以不苦不樂為中道行不以瑜伽者之狂禪為是而以戒為足以慧為目釋尊之教化雖以適應時代思潮特重於出家己利解脫為重之聲聞然釋尊自身則表現悲智之大乘中和雄健與弟子同得真解脫而佛獨稱十力大師也佛於反吠陀之學流中可謂月朗秋空繁星失照矣此第一期之佛教可曰聲聞為本之解脫同歸釋尊入滅已下迄佛元四百年佛教以孔雀王朝之崇信漸自恆河流域而分化各方東之大衆系自毗舍離而央掘多羅烏荼而遠化南印後又沿西海濱北來西之上座系以摩偷羅為中心或深入北方而至罽賓或沿雪山麓而東化或西南抵阿槃提摩臘婆且遠化於錫蘭以分化一方語文師承環境之異學派之分流日甚然分化之主因實為大乘入世傾向之勃發其見於辨論者崇兼濟則有佛菩薩聖德之諍求適應則有律重根本之諍闡舊融新則有有無雜藏之諍分化之方式不一而實為急於己利聲聞與重於為人菩薩兩大思想之激蕩此第二期之佛教小乘盛而大乘猶隱可曰傾向菩薩之聲聞分流佛元四世紀至七世紀南以安達羅北以大月支貴霜王朝之護持兩系合流於北方大乘佛教乃盛大乘於各派之思想固以南方為重而能綜合者就中龍樹菩薩以南方學者而深入北方佛教之堂奧闡一切法性空而三世幻有之大乘尤為大乘不祧之宗以融攝世俗大乘經已不無神祕苦行表徵他力思想之潛萌龍樹菩薩乃間為之洗刷也此第三期之佛教説三乘共同一解脫與根本佛教相契應然佛世重聲聞今則詳菩薩之利他可曰菩薩為本之大小兼暢七世紀至千年頃大乘佛教又分流從北來西以阿瑜陀為中心無著師資弘虛妄唯識學從南來東以摩竭陀為中心真常唯心論之勢大張學出龍樹之佛護清辨等又復興性空唯名論於南印三系競進而聚訟於摩竭陀大乘分化之因甚復雜而如來傾向之潛流實左右之多陀阿伽陀華語如來有二義一外道神我之異名即如如不變而為流轉解脫之當體如來死後去或不去即此二佛陀之異名可譯為如來如解或如説即證如如之法性而來成正覺者如法相而解者如法相而説者佛具此三義故曰如來與後期佛教之如來義頗不同如來者一切有情有如來性無不可以成佛如來性真常不變即清淨本具之心體離幻妄時證覺心性而圓顯如來之本體也此真常淨心易與婆羅門之梵我相雜而其時又適為婆羅門印度教復興梵我論大成之世佛陀漸與梵天同化矣其見於辨論者有生滅心與真常心之諍有唯心與有境之諍有性空與不空之諍有三乘與一乘之諍此第四期之佛教可曰傾向如來之菩薩分流千年以降佛教漸自各地萎縮而局促於摩竭陀以東以如來不可思議之三密為重點立本於神祕唯心頓入之行解為一切學派內外思想之綜合為一切祕密迷信之綜合唱一切有情成佛不復如大乘初興之重於利他而求即心即身之成佛奄奄六百年受異教者之壓迫而衰滅此第五期之佛教可曰如來為本之梵佛一體印度佛教凡經五期之演變若取喻人之一生則如誕生童年少壯漸衰而老死也菩薩為本大小兼暢菩薩分流傾向如來傾向菩薩聲聞分流如來為本佛梵一如佛教融吠陀而衰滅聲聞為本解脫同歸佛教反吠陀而創始重人事吠陀創始時代求天樂梵教極盛時代趣解脫教派興起時代人間樂天上樂究竟樂神教佛教依此圖以觀印度佛教之流變不難知其梗概夫人之所求者現實人間樂未來人天上樂究竟解脫樂三者而已其即人事以向天道以天道明人事者神教也即解脫以入世利生依人間悲濟之行以向解脫者佛教也解脫思想興則神教衰天神崇拜盛則佛教衰此必然之理也觀吠陀創始時崇天道以盡人事繼之者祭祀求生天祕密求神祐婆羅門教乃底於極盛逮解脫思想起理智開發婆羅門教衰而教派紛起矣佛教以反吠陀之精神代婆羅門教而興初則聲聞為本而重於解脫事繼起者以菩薩為本詳悲智利濟之行以入世而向出世佛教乃大成惜佛徒未能堅定其素志一轉為忽此土而重他方薄人間而尊天上輕為他而重利己融攝神教之一切彼神教以之而極盛者佛教以之而衰滅婆羅門教演化所成之印度教又起而代之矣如上印度佛教五期之流變今更束之為兩類三時教即與從來判教之説合一自佛教傳布之興衰言之佛元三世紀中熏迦王朝毀佛而佛教一變前乎此者佛教與摩竭陀孔雀王朝相依相成國運達無比之隆盛佛教亦登於國教之地位遍及於五印遠及於錫蘭罽賓後乎此者佛教已失其領導思想之權威矣佛元九十世紀佛教北受胸奴族之蹂躪東受設賞迦王之摧殘而印度教則尤明攻暗襲其間佛教又為之一變前此佛教雖失其政治之指導權偏於學術之研幾然傳布普遍不失為印度大宗教之一後則局處摩竭陀書空咄咄坐待衰亡而已以教難而觀佛教之演變頗明白可見初則聲聞小乘之四諦乘中則菩薩大乘之波羅蜜乘後則為如來一乘之陀羅尼乘二自教理之發展言之亦有三時即初二期為初時教第三期含得二期之末及四期之初為中時教四五兩期為第三時教初時教以諸行無常印為中心理論修行並自無常門出發實有之小乘如説一切有部其代表也第二時教以諸法無我印為中心理論之解説修行之宗要並以一切法無我性空為本性空之大乘如龍樹之中觀學其代表也第三時教以涅槃寂靜印為中心成立染淨緣起以無生寂滅性為所依修行解脫亦在證覺此如來法性真常即常談之妙有不空中道之一乘如楞伽密嚴經其代表也後之祕密教雖多不同之解説於真常論而融攝一切事相耳論理更無別也雖然世間事乃非斷非常之緣起固不得而割截之非一非異之緣起亦不得執一以概全此僅就其時代事理之特徵姑為此分畫而已第二章釋尊略傳第一節出家前之釋尊釋迦牟尼佛之傳記零落難詳即其僅見於記述者又多傳説互異且雜以表象之辭欲取捨以得精確之佛傳實非今日所能也今但取近於史實者敘之用以倣佛此聖者之化迹而已釋迦訓能為種族之名牟尼訓寂默乃聖者之德合言之為能寂所以尊釋迦族中之聖者也釋迦族舊傳雅利安人出名王甘蔗之後初居印度河側東下立國於雪山之麓即釋種所自起甘蔗王族出瞿曇即喬達摩仙之後因以瞿曇為氏云然以近人之考證頗不以此説為然而以釋種為黃色之蒙古人種玄奘西域記謂迦毗羅衛以外之釋族凡四國一梵衍那國在雪山中即今興都庫斯山脈之西部二呬摩呾羅雪山下國在巴達克山南三商彌國在蔥嶺西南境與印度阿富汗接壤四烏仗那在今印度西北邊省之北部其故都直逼蔥嶺下此四國悉非雅利安人也雜阿含經載釋尊嘗入婆羅門家被呵為領群特且拒其入室使釋尊而為雅利安人則不當如此舍衛國之波斯匿王雅利安人而釋種拒不與婚嫁其種族之不同固灼然可見從地理之分布而考之則可見其為山嶽民族而南望大陸者釋族以孔武有力稱其東鄰拘尸那稱力士生地迦毗羅衛之釋族蓋雪山中之遊牧民族卜居平地而漸農業化者自蔥嶺東來沿喜馬拉雅山分布之居民如西藏尼泊爾不丹及印度阿薩密省悉為黃種釋族非雅利安系其為黃種無疑也毗舍離民族為離車子摩竭陀與之通婚嫁玄奘傳尼泊爾為離車子毗舍離跋耆比丘以佛出波夷那為言疑釋種同此釋族所住地在恆河支流羅泊提河東北面積約三百二十方里有盧毗尼河貫其間遂分十家各主一城位盧毗尼河西北之迦毗羅衛城即釋尊父王之治地也迦毗羅衛即今之畢拍囉婆在尼泊爾南境佛元二千二百八十六年一月於其地掘得釋迦族供養釋尊靈骨之石瓶地當北緯二十七度三十七分東經八十三度八分與法顯所述之迦毗羅衛正合因得定釋尊之故鄉焉盧毗尼河之東有拘利城與迦毗羅衛自昔通婚嫁釋尊父王輸頭陀那娶拘利城主阿䨲釋迦之二女摩耶及波闍波提為妃摩耶夫人四十四歲時夢白象入胎而有妊翌年分娩期近乃從俗歸寧途經嵐毗尼園少憩遂誕生太子於無憂樹或作娑羅樹鉢羅叉樹下園去迦毗羅衛東四十里為拘利城主善覺妃嵐毗尼之別墅在今尼泊爾之蘭冥帝時距今二千四百零九年前之四月八日日出時也釋尊系出名門色相端嚴有異常兒識者知其不凡咸謂在家當為輪王出家必成一切智因賜以悉達多義成之名太子生七日母摩耶命終由姨母波闍波提代育之年七歲就傅依名學者毗奢密多羅受吠陀及五明論次依羼提提婆受兵法及武術學不數年靡不精達乃於十五歲時父王為其舉行灌頂大典立為太子太子處儲位之尊享王家物質之樂而常若不愜於懷父王因為其完婚納善覺女耶輸陀羅為妃闢三時殿益五欲之樂以娛之孰知太子之別有會心如蓮之出淤泥而不染歟第二節出家太子於二十九歲之十二月八日中夜或云十九歲二十五歲捨父母妻兒臣民偕侍者車匿悄然離城去至跋伽婆仙人所住林中剃鬚髮服僧伽梨遣車匿還報父王大驚遣使召之不得因留憍陳如跋提跋波摩訶男阿説示以侍之釋尊出家之動機即佛教化世目的之所在此應略事分疏之以見佛意雅利安民族之初移殖於五河地方也勇敢善戰夷舊住民族而奴役之階級之制由此興政治無專政苛斂選舉或世襲以家族為中心而組成一族一族之小國宗教則崇拜自然未聞出世解脫之談此佛元前六世紀事也此後沿恆河東下入於豐沃之平原農業勃興文化大啓婆羅門學者創四姓之説視為有神聖不可踰越之限制婆羅門為專責宗教之祭師剎帝利為獨占軍政之武士吠舍為業農工商之平民此三皆為雅利安人同有誦吠陀而祭神之權利且可依宗教而得新生命第四首陀羅族即被征服者但以勞力供賤役無祭神重生之權也時宗教之儀式制度及神學燦然大備煩瑣思辨而融以神祕之咒術所謂吠陀天啓祭祀萬能婆羅門至上之婆羅門教三綱即於此時確立之逮佛元前二三世紀中政治與宗教俱有顯著之變遷祭祀萬能已不能饜足人意窮理盡性以求徹底解脫之風因森林書優波尼沙曇之出而日盛厭世出家修行以達神我之解脫蔚為一時風尚焉婆羅門之教權雖仍有人為之支持發揚然以拘於傳承形式嚴階級重祭祀已不足適應時代兼之婆羅門恃宗教而營家族之生活自日趨於腐化雜以神祕咒術乃益泛濫而不可收拾有心之士慨然而起否認吠陀反抗婆羅門之學派是也然思想一旦解放即陷於混亂之局或否認道德之價值或創自然之説或作殘酷之苦行或修枯寂之禪定或作詭辨論或倡導唯物追求現世五欲之樂舊説弊而新學罔安得一切智者以正之以言政治自雅利安民族東移恆河流域以來東方被征服民族受吠陀文化之啓發而次第興起王位多世襲不復選舉養兵固位既為同族兼併之戰又為反雅利安族之爭摩竭陀與憍薩羅之對立其著者也群雄分立相為爭伐東方新興民族之勢力且駸駸駕雅利安族而上之然世亂時荒民不堪命矣安得一施仁政統一閻浮躋人民於盛世之輪王哉不作轉輪王即為一切智者釋種以之期待釋尊者實時代之公意也時代之政教趨勢既明可以進論釋尊出家之動機矣傳説父王曾偕太子出遊並觀耕焉田間作人赤體辛勤事耕墾形容枯瘠日炙汗流並困乏飢渴而不得息犁牛困頓備受鞭策羈勒之苦犁場土墢之下悉有蟲出鳥雀飛來競食之太子有感於農奴貧病衆生相殘之苦悲心油然而生因移坐閻浮樹下寂然而思所以救濟之道隱萌出家之志此釋尊入道之初心社會救濟與生死解脫實兼而有之復有説焉太子嘗遊觀四門歷見老病死苦及見出家安樂而日增其厭世出家之心此不必視為事實要為熟聞塵世可厭解脫為樂而出家遊觀云云特象徵其內心之感悟而已傳説出家之動機止於此吾嘗於迦毗羅衛之國政若有所見焉迦毗羅衛地不滿百里受憍薩羅國之控制而非其種族憍薩羅國王徵妃於釋種釋種不願為異族之婚而又莫敢與抗國小地僻處兼併之世強鄰虎視亦難以圖存矣當佛之世即為憍薩羅所滅其明證也末利夫人信佛波斯匿王猶多憎嫌之辭與憍薩羅爭霸之摩竭陀王頻毗娑羅則有願分國與釋尊並治之説頗可玩味釋尊其有感於國族之苦乎不為轉輪王則為一切智人二者不相兼而不相悖捨無可為之故國謀生死之解脫兼求淑世善生之道釋尊毅然成行矣釋尊忘世為道日以求道為務嘗南行參訪於毗舍離城北之阿羅邏迦藍彼以超越一切有而住無所有之定境為解脫釋尊以為未盡去訪鬱頭藍弗於王舍城外森林中彼以非想非非想為涅槃即泯想非想之差別而住於平等寂靜之知見釋尊知其法之未盡又捨之行止於槃荼婆山入王舍城乞食頻毗娑羅王見之力勸返俗釋尊謝卻之王因以若成道者願先見度為請釋尊往優婁頻羅聚落之苦行林與苦行者為伍備嘗辛苦精進不為不至而終無所獲因悟苦行之非計翻然改圖欲於定中觀察以得之先趨尼連禪河解衣入浴受牧女善生乳糜之供色力乃漸復憍陳如等五人見之謂為退失心生誹謗捨之而去波羅奈釋尊乃獨行於伽耶山之畢波羅樹下敷吉祥草跏趺而坐以不成正覺不起此座為誓時出家來已六年矣或云十二年第三節成正覺釋尊以大悲大智大精進力宴坐禪思者凡四十九日破魔障得三明於二月八日明星現時廓然圓悟而成正覺因得佛陀之名今印度之巴特拿城南七十里有伽耶城距伽耶城八里有佛陀伽耶即釋尊成道處也其所坐之畢波羅樹因釋尊悟道其下遂稱之為菩提樹今尚存成正覺云者簡言之即正覺世間之實相智明成就而生死永寂佛陀追述悟道之經過不外正覺緣起之生滅釋尊嘗以我説緣起示異於外道持此以為佛法之特質可也生死大苦由業力而輪回不息為印度學者之共信然一及大我小我本體現象之説則莫不陷於矛盾彼輩探宇宙之本元而立梵探個人之主體而立我又從而融合之然一之則一解脫而一切解脫異之則梵我一體之説不合其説現象也謂自本淨之梵我起迷妄苦迫之世間無論其解説為如形之與影如水之與波或如父之與子然以本淨為迷妄之因終無以自圓其矛盾若以迷妄與淨我同為無始之存在則陷入二元失其本宗矣使果為二元也真妄又如何聯繫而構成流轉真我曾無所異又如何離妄而獨存釋尊正覺緣起知其病根在真我既無我為宇宙之本元亦無我為輪回之主體世間唯是惑業苦緣起之鉤鎖即緣起以達無我乃徹見生死之實相而解脫成正覺者此也釋尊菩提樹下之正觀以為吾人有身心演變之老病死苦有人事糾紛之愛別離苦怨憎會苦自然缺陷之求不得苦悉沈沒於老病死憂悲苦惱之大海而莫之能脫即此苦而探其原知衆苦之因於受生有生即有苦苦實與生俱來樂生厭苦之常情蓋亦顛倒之甚矣吾人何事有生而為衆苦之所迫必有能生身心者在此能生者之存在曰有明言之則以業力熏發而構成身心之潛在也業力熏成身心之潛在由於執取何者內則妄執自我外則或為五欲之追求或執取倒見以為是邪行以為清淨於是乎三業繁興而集未來身心之苦本馳取一切又以欲愛染著為因於相續之三有自體於所取之三有境界若磁鐵之相引而不捨著之不已則成為縱我役物之行釋尊嘗敘之云當知因愛有求因求有利因利有用因用有欲因欲有著因著有嫉因嫉有守因守有護因護故刀杖爭訟作無數惡又云以欲為本故母共子諍子共母諍父子兄弟姊妹親族展轉共諍更相説惡況復他人以欲為本故民民共諍國國共諍彼因鬪諍共相憎故以種種器仗展轉加害愛取為未來生死之動力亦現在愛別憎會求不得之苦因以是節制愛取乃樂生之王政根絶愛取為厭苦離欲解脫之聖法釋尊為之而出家者今則以正觀緣起而得之逐物流轉與離貪解脫之緣起正觀即正法之根本釋尊於初轉法輪時嘗約之為四諦生老病死憂悲苦惱為苦諦愛為集諦愛滅為滅諦以厭苦離欲解脫之道為道諦也緣起不出此五支老死生有取愛然考釋尊之教猶有闡述緣起之底蘊而詳説之者即求觸境繫心之歷程而達於身心相依之開展也順其序而略言之識入母胎因有名色之開展識與名色相依不離一期生命於是乎相續而住名色開展有六處根境相涉入則有根境識三者相觸之認識識觸與無明俱昧於緣起乃味著於苦樂之受而愛著生矣識與名色六處同為前生惑業所起之身心雖識為一期生命開展之初始然是苦而非苦集故欲解脫未來之生死者在滅觸俱無明而非滅識也釋尊又推此意而闡述之識為無始相續之苦果不勞滅之滅無始相續之惑業可矣以過去之觸俱無明為無明以過去著境馳求之一切身口意行為行必無明滅而後行滅行滅而後識滅也釋尊於緣起正觀中知生死之因於愛取之行染愛以無明為本以無明之蒙昧無知不覺生死為惑業苦緣起之鉤鎖而若有自我者存有我則有我所愛之為自體愛境界愛取之為我語取欲取等縱我逐物苦輪常運不息矣一旦緣起觀成無明滅而明生無我無我所離無因邪因等惡見愛欲自離而解脫如旭日初生長夜永別自覺自證我生已盡梵行已立所作已辦不更受後有釋尊正覺而成佛蓋如此第四節轉法輪釋尊成正覺已欲出其所悟之正法以化迪有情實現現樂後樂及究竟樂然鑒於時代根性之積重難返實難與言正覺之本懷乃於五十七日中或云三七日一年等度長期獨善之行而思所以應化之方焉嘗慨然曰我此甚深法無信云何解辛勤我所證顯説為徒勞我寧不説法疾入於涅槃是何言之痛也其不易説即説亦難信難行之道或解為緣起及緣起之滅或解為緣起之性空或解為一乘之實相所説不必同而不離緣起正法則一蓋緣起正法不特證之以寂滅出世因衆生著阿賴耶樂阿賴耶喜阿賴耶而不易即解之以和樂順世亦非剎帝利以武力毗舍以財力首陀羅貧弱不克自振之時機所能喻傳説有梵天來請佛乃起而弘布其正法此豈非有感於婆羅門文明之有待救濟不忍斯世之終古長夜耶長期熟思已決意唱道一適應時代之方便教而寓真實於其中俾漸加格化以達暢盡正覺之本懷也釋尊去波羅奈遇商人提謂波利於途二人以麩蜜獻佛受三歸依而去得佛財分之最初弟子也途中又值異學阿耆婆迦叩佛所師佛以我最上最勝不著一切法諸愛盡解脫自覺誰禰師答之又問佛所之佛告以我至波羅奈擊妙甘露鼓轉無上法輪世所未曾轉蓋聖智洞徹事見機先確證所證而無疑也佛訪憍陳如等於波羅奈之鹿野苑五人見其來也初以其退失淨行相約勿為禮佛至不覺肅然致敬佛告以我即是佛具一切智寂靜無漏心得自在汝等須來當示汝法教授於汝汝應聽説如説修行即於現身得證諸漏五人乃執弟子禮即所謂五比丘是五比丘以佛之捨苦行為疑佛乃進而教之曰有二種障一者心著欲境而不能離是非解脫之因二者不正思惟自苦其身而求出離永無解脫離此二邊乃為中道精勤修習能至涅槃此中道云者即八正道為佛教精義所在自利利他悉應於此中求之此就教授之中心立言若詳示生死流轉之苦痛及原因解脫生死之聖境離苦得樂之正道即四諦是有轉法輪經等載之聞法已憍陳如首先悟入正法因得阿若憍陳如之稱餘四人亦次第得入悉成羅漢三寶乃具足世間凡有六阿羅漢苦生老病死愛別離怨憎會求不得如病苦之集後有愛喜貪俱行愛彼彼喜樂愛如病源苦之滅愛滅如病愈苦滅之道八正道如藥此四諦之創説即所謂初轉法輪也轉法輪者法為規律之義約道諦言即行持之正軌解脫者所必由故曰法者八正道也約四諦言即一切普遍不變真實之法則緣起流轉為苦集緣起還滅為滅即流轉以達還滅之行為道此世出世間必然而不容或異之軌律曰法此法性自爾曰法性法常爾曰法住法各如其分曰法位法為一切之因依曰法界是真是實是諦是如釋尊之所證所説此法也據印度舊説統一閻浮正法化世之大王名轉輪王輪為輪形之武器當其舉行即位典禮時有此輪寶來應以輪寶之力自近而轉及遠方摧輾一切怨敵而後王道化被於天下今以喻佛之説法自己而轉及他人摧折一切異論惡見而後佛化遍及於世間大品經以不轉不還為説知轉有運動推進之意以鹿野苑之最初推動此正法乃獨得轉法輪之名實則法輪常轉不必限於初説也佛度五比丘已即於波羅奈小住禪思經行教授初創和樂僧團之制波羅奈有長者子耶舍及親友多人聞風來歸並出家證果世間乃有六十一阿羅漢滿慈子大迦旃延娑毗耶並捨外道入佛法度雨期已釋尊遣弟子遊化人間自身則獨往優婁頻羅聚落化事火婆羅門迦葉氏三弟兄及其弟子千人佛教之勢日張釋尊憶頻毗娑羅王之約乃與千比丘趣摩竭陀首都王舍城王聞之率臣民郊迎見三迦葉為弟子信心彌切王聞法得法眼淨因於城旁迦蘭陀長者之竹園建精舍奉佛此國王信佛之始亦佛教僧寺之始也釋尊之二大弟子舍利弗目犍連於佛成道第四年歸佛二人初從刪闍耶外道出家常以未聞道要為悵一日舍利弗入城見阿説示五比丘之一威儀庠序諸根豫悅叩其所師曰釋氏大沙門詢其所學則舉緣起偈答之諸法因緣起如來説是因諸法因緣滅是大沙門説舍利弗聞之得法眼淨歸語目犍連亦悟因偕二百五十弟子詣竹園出家時有摩訶迦葉者出家修厭離行素為國人所宗仰於王舍城多子塔前值佛因回心入佛教自謂若不值佛亦當獨覺云成道第六年淨飯王病遣優陀夷來迎佛以生前一見為幸並於尼拘律園預建精舍以待之釋尊偕弟子還迦毗羅衛為釋種説法淨飯王得道證宮人多受戒法惟度異母弟難陀及佛子羅睺羅出家淨飯王為之悲感不勝留七日辭還竹園甫抵末羅族之阿䨲比耶村釋種之阿那律阿難金毗羅提婆達多等追蹤至請為弟子或謂此出淨飯王意云理髮師之優波離亦於此時出家後世所傳之十大弟子除解空第一之須菩提似出家較晚外餘並釋尊初期之弟子也此後至涅槃無連續之記載惟遊化之地點所化之弟子散見於聖典中得以見其概略釋尊教化凡四十五年其足迹所及東至瞻波西至拘睒彌及摩偷羅南至波羅奈北至迦毗羅衛猶不出恆河流域其常住説法之處非信徒奉獻之精舍園林即水邊林下大率以清淨而宜教化為主其有名者如王舍城之竹園靈鷲山溫泉林舍衛城之祇園鹿子母講堂華氏城之雞園波羅奈之鹿苑毗舍離之庵羅園重閣講堂獼猴河畔之牛角林迦毗羅衛之尼拘律園拘睒彌之瞿師羅園等以在竹園及祇園之時日為多釋尊初期之出家弟子惟限於男性之比丘以從其他教團中來者為多初至王舍城已有千二百五十弟子矣佛之姨母摩訶波闍波提自淨飯王歿後求度出家佛初不許後以阿難之請始允其出家由是有比丘尼比丘尼中如耶輸陀羅蓮華色曠野等亦有名其歸佛之在家弟子男稱優婆塞女稱優婆夷為數尤衆上自王公貴族下至乞丐淫女無不為釋尊慈悲所攝受優婆塞之有名者如摩竭陀王頻毗娑羅阿闍世憍薩羅王波斯匿頻王之侍醫耆婆大臣雨勢舍衛城之豪商須達多釋種之釋摩訶男等優婆夷之有名者有頻王妃之韋提希匿王妃之末利須達多之妻善生舍衛城之鹿子母毗舍離之淫女庵摩羅等此等在家弟子亦多有證果者及能論議深法者釋尊之説法也不務深邃理論之闡述不為苦行奇事以惑衆惟以簡明切實之教旨示人以中道之行務使聞法者人能隨分隨力去惡進德以自淨其心佛法之在恆河兩岸如春風時雨之化洽無間固由説法之善巧解脫道之純正與適合時代根性之要求然有賴於釋尊崇高之德性悲懷平等躬行身教者尤多釋尊之與弟子師友也我不攝受衆同坐解脫床不如異教者之以神子神使自居或統攝者自居回施物於僧不欲厚於己五日一行比丘之房為病比丘洗濯為盲比丘紝針向小比丘懺摩聞其病則不辭跋涉之勞憫其愚則不以誑佛為嫌凡沐釋尊慈和懇至之化者莫不自尊自律而日進於德阿難説精進忘病起坐以聽之聞堂中説法則佇立於戶外釋尊之敬正法也如此其於人世之和樂悲懷兼濟亦有可言者釋迦族與拘利族爭水釋尊遠來為之和解毗舍離大疫則身入其境以化之教跋耆族以國不危之道回琉璃王殘民之師息阿闍世王東征之謀化央瞿利魔羅行旅蒙其澤即此數端可見釋尊之重視現樂人群為何如餘如唱四姓平等之教斥祭祀呵苦行禁咒術糾正印度文明之偏失則尤世人所熟知者及門之聲聞弟子以蔽於時習間或未能深體釋尊之本懷然如畢陵迦婆蹉之捍盜富樓那之化粗獷之邊民目犍連之殉教等亦有足多者在家弟子尤多難能之行釋摩訶男自殺以救同族末利夫人飲酒以救人須達多及梨師達多等更能舉所有資産與信佛之四衆弟子共之佛及弟子之高行碩德如此宜其風化所及翕然景從也初期出家弟子多耆年久學厭離心切釋尊僅提示法味同受財利共享之原則即能淡泊知足和諧共存固無須制戒律以繩墨之也後以比丘日衆僧事日繁或放逸而作罪行或愚昧而受譏嫌或共住相紛爭比丘之衣食住行在在與社會經濟有關時代俗尚之無礙於正法者亦不必矯情立異與世共諍釋尊乃適應時衆之要求一一為之制其遮止性罪及足以引生性罪之方便易受世人疑慮譏毀者制為戒條半月半月誦習之曰波羅提木叉餘如參加僧團及退出之規定安居誦戒之規則等大抵經佛之指導而經常行之此則結集所出之雜跋渠是也比丘之出家在求解脫自由然群衆相處不能無法制否則自相凌奪不能身心安寧以和樂為道遊化人間必求時地之適應否則受譏毀摧殘而無以圖存求正法之久住端賴此攝僧之制耳佛教之僧制泯階級均貧富齊貴賤老少融法治德化於一爐實兼自由與團結而有之僧制本世間事或為道德之訓條或為僧團之組織法或為衣食等瑣事而佛制不許白衣在家衆人聞舊傳有人竊聽戒法金剛力士擊殺之僧團極公開其內容則諱莫如深何哉誠以和樂平等共存之制驚世駭俗未能為時衆所共喻也因佛教之開展外來之障礙亦隨之而生婆羅門反對之以其一反婆羅門教三綱苦行沙門反對之以其呵苦行為癡人也釋尊之遊化常與四衆弟子俱貧乞者亦隨行此無所有者之集團遊行常使城主頒輸金之制村主發蒺藜之論餘若農奴怠工武人解甲並使治者為之不快然釋尊之教以究竟之解脫為主方便之社會救濟厄於時勢未能一展所長故佛教之受壓迫亦以外道為多有帶盂而謗佛者有埋尸以相毀者有設火坑毒飯以害佛者尤以提婆達多之摧殘佛教為最烈提婆達多佛之堂弟而從佛出家者受韋提希子阿闍世之敬禮染著利養乃與阿闍世謀勸殺父王頻毗娑羅為新王己則殺佛別創新教為新佛彼欲害佛者數次初放醉象次使狂人後投大石而皆目的不果乃自稱大師創五法是道毀八正道非道五法者一盡形壽著糞掃衣二盡形壽常乞食三盡形壽唯一坐食四盡形壽常露坐五盡形壽不食一切魚肉血味鹽酥乳等或作不食鹽不食酥乳不食魚肉常乞食春夏八月露坐四月住草庵觀其五法之峻嚴頗類耆那苦行之教以時衆崇尚苦行乃使佛教之五百新學暫時叛教以去佛與弟子雖疊受政教之迫害從未叫囂少流於感情用事沈靜悲憫一以德化卒於心安理得中勝之第五節入涅槃釋尊遊化四十五年年八十矣由王舍城而拘尸那為最後之遊行途經波吒釐子城時方興築佛即言其將來當甚繁榮云又與弟子渡恆河入毗舍離值雨期欲於城外波梨婆村安居時世飢饉乃散衆獨與阿難居此處此時佛已重病自知化緣已畢惟以弟子多不在前不宜入涅槃遂自支持以待阿難知佛入滅期近乃請所以命弟子者佛曰我不攝受衆亦無所教命汝等當自依止法依止莫異依止即應依四念處而行蓋四念處為七覺支之初基離四倒之妙術出生死唯一可依之道也安居畢入城乞食為衆説法翌日勉力向拘尸那行經路乾荼村説戒定慧解脫之四法即總攝佛學之宏綱及其目的所在也佛由此入波婆村食金工純陀所獻之旃檀耳而病益劇途中腹痛痢血疲纍不堪乃命阿難敷坐稍息旋復行浴於拘孫河宿拘尸那城外熙連禪河畔之二娑羅樹間有外道須跋陀羅聞釋尊中夜將入涅槃請見佛一決所疑阿難以釋尊疲乏辭須拔陀羅固請不已佛愍之命入示以唯八正道有沙門果聞法證果因為佛最後弟子於時大衆知佛將滅未離欲者悲痛淚落不自勝佛乃起為作最後之教誨曰汝等勿謂失師主我涅槃後所説法律是汝師也佛諭衆有疑者可疾問之無得懷疑不求決也世尊三唱而無人問者乃更謂弟子曰汝等勿懷憂惱若我住世一劫會亦當滅世相如是當勤精進自今已後我諸弟子展轉行之即是如來法身常在而不滅也釋尊忍疾為弟子説法安慰之勉勵之其教誡之懇篤可以見矣教誡畢從容入滅時二月十五日中夜也侍佛涅槃之大弟子唯阿那律及阿難在乃移舍利於郊外天冠寺以待衆比丘之來七日後大迦葉共五百比丘至乃依輪王禮而荼毗之第三章佛理要略第一節世間佛法無他事淨化世間以進趣出世之寂滅而已世間者本無今有有已還無時劫之遷流變壞謂之世十方器界無邊際在成住壞中一切有情無數量在生老死中有情與器界起滅於三世之流莫知其終始此之謂世間世間唯有情與器界而有情則又為其本何者有有情而後往返彼此知器界前後延續有時劫若離有情此器界之與時劫不必論亦無可論也言有情者自體愛則內我之貪染境界愛則外境之執取後有愛則無限生存之意欲有情者有此情愛也外書之釋此為喜為動為情為光明內典之釋此為大心快心勇心如金剛心生存意志躍躍然熱烈衝動奔放而靡止有情者有此情識也有情愛與有情識者其緣起之和合邊名之曰有情從其緣起之種種邊則曰名色曰五蘊色受想行識曰六處眼處耳鼻舌身意處曰六界地水火風空識蓋心色不一不異之和合而以愛取營為個性之活動者也何由知世間以有情為本乎世間之存在曰有世間之顯現曰生此生之與有佛法並約有情為論有情即世間生死死生生生不已之存在此可於聖典知之自有情之種類言分別有情之種類者曰五有天有人有旁生有鬼有地獄有以人有為本為中心旁攝於鬼畜此三者之勝進者為天劣退者為地獄若分別有情出生之相類者曰四生胎生卵生濕生化生前三生其常見化生則其變也即此五有四生而論其延續於時劫一期則生有本有死有前後則本有中有後有即現實之存在以知未來之存在相續非斷滅者名為有曰前生曰今生曰後生生滅不居非常住名曰生即此五有四生而論其往返乎器界有則欲有色有無色有同因所愛所取以成世間之存在生則欲界生色界生無色界生世間以有情為本存在者唯此顯現者唯此不亦灼然可見乎自因果言之此有故彼有此生故彼生謂無明緣行乃至純大苦聚集世間以有情為本有情不出惑業苦三雜染此三者之因有曰有支此生彼生曰緣生有情之生死相續苦非自他共無因作佛説為緣起逐物流轉觸境繫心心色依持緣起如環之無端以無始來不見真實諦死生無邊際生生不已而衆苦永在自業報論之業力所感為報如五有緣起之顯在也無有情而無色者亦無有情而無心者心色和合不即不離相依相持而相續存在此有情即世間之根本即本而起末山河大地草木叢林曰無情無情乃有情之外在如焰之舒光明即總以探別曰情愛情識情愛情識乃有情之中樞如焰中之焦炷有情內不離情識即外不離器界依彼得存而為彼之本世間之學者不達外逐於物立唯物內蔽於心談唯心別而礙總則多元總而乖別明一本人各一是非孰知世間之實相哉有情所起之動能曰業不即色心亦不離曰有曰業有緣起之潛在也業感有情總別之報果則即潛而至顯依心色活動而成業力則即顯而至潛雖業之與報並有並生然據偏勝而言則業為有而報為生如上所述器界無邊際有情無數量其起滅於時劫無始終可謂廣大衆多悠久矣若探其本則有情之體有相生而已知此乃知佛法所明世間之宗本乃足以進言淨化世間以進趣出世之寂滅內則情識心偏此墮唯心此有故彼有有支約因果辨炷此生故彼生緣生種類則五有焰有情之自體心生相則四生存在則四有世間以有情為本約種類辨有情之延續生生則三生色得體則三有焰有情之往返生起則三界生光業有約業報辨外則器界色偏此立唯物報生第二節世間之淨化有情所依之器界有淨穢心識有愚智觸境生心而有情有苦樂淨化之者化世間之穢者愚者苦者為淨智樂也天樂地獄苦人鬼畜三苦樂雜格其優降則以天人鬼畜地獄為次第離三惡趣生人中捨人身生天上此異學之世間淨化佛法則不然求出三惡趣不必生天上所謂人身難得佛法難聞淨化世間在人中致人世和樂階梯出世之寂滅此佛法之世間淨化也淨化之道有三曰施曰戒曰定然施不如法或無戒生大力鬼畜中非世間所貴若不以進趣出世而修定為定力所拘者生長壽天中不特樂極生悲亦無以階梯出世施攝衆而常雜惡定離惡而多獨善施定非不善終不如淨戒之處衆不礙衆自他俱利而和樂善生也釋尊有云吾為汝説過去未來不知汝信不信且為談現在準此意以讀釋尊本教則於十方世界談此土三世時劫重現在一切有情詳人類即此土此時之人類以明世間之淨化可也豈必動言十方世界一切有情哉人之生也緣愛生與愛俱自體愛境界愛其所愛不必同而求暢達其生存則一愛以樂起樂者愛之不欲離苦者未得不欲得已得求所去意在愛未得之樂而欲得之樂其樂生其生是為世人之情我欲之人亦欲之即自情以通他人之情自通之法盡人之樂而遂人之生謂之善人生道德之十善基於此十善者不殺生以絶內命不偷盜以奪外命而個人於是乎樂生不邪淫以破室家之好而家族於是乎樂生不妄語亂是非不兩舌以破和合不惡口以豫人難堪不唐言綺語以啓人邪思而社會國家於是乎樂生此七者曰善業身語之動動於意不貪而後能克己不瞋而後能恕人此二者曰善心善心者情意之善者也正常之情意與行為必因正確之認識曰善意善意者信業報明因果知善惡不邪見者而後知所以自處知所以處人十善行而仁政興災難息修齊治平在十善行十善而現生樂後生樂近涅槃樂和樂善生在十善人無賢不肖莫不本樂生之情而動不肖者雖常苦他害他而遂己之樂生然亦未嘗不欲人之豫以樂生此樂生之十善所以為世之常道釋尊因而教之又以化在世間身語為重階梯出世禁醉亂之無知乃別啓五戒不殺不盜不邪淫不妄語不飲酒之教五戒十善本於自他共處非一人之戒善自行教他行讚歎行隨喜行必自他共行乃足以致人世之和樂善生不欲此世之淨化則已求淨化欲以大同和平自由為鵠者離五戒十善不可得也雖然自他共處世事繁多離合存奪不可名狀戒善重於止惡淨化世間不離此然唯此則樂個人之未來生而有餘樂群衆現在之和諧共存則不足釋尊為在家衆多説施戒慈定以處世戒偏於止惡為出家衆多説戒定慧以出世戒不僅止惡和樂共處之法制即寓於其中種族無優劣職業無貴賤四姓出家同姓釋僧事者衆人之事也衆人事非一人治非少數人治我不攝受衆佛滅無大師一切決於僧羯磨會議辦事出家者受同一教育守同一戒律其學而無成者曰啞羊亂法紀者曰無羞不使預羯磨德學集團會議而主僧事非少數人主亦非侈言群主彼無識無行者如何能主徒為狡黠者所利用欺騙而已沓婆受謗佛明知之而令自白於衆舉道德之化而一一納諸法軌之中也論經濟有四方僧物有現前僧物衆人共有共享之亦隨時隨地而有別如法受別施受別請此私有經濟制標準而或出入其中超標準之私物生則公諸衆而不得隱死則大分沒為僧物犯罪者悔則服務以淨罪不悔則默擯不齒以為刑凡此種種莫非自他和樂共存之制此自他和樂共存之制唯限於出家衆白衣不許聞問何哉蓋不能見容於封建階級獨善之當世故不得不隱之以待時即僧制以論自他共處之群制而世間乃有和樂平等思想正左右則見和資生均貧富則利和法制齊上下則戒和此三和之體具和之體必有和之相情投意悅則意和翔實雅正則語和光明禮敬則身和攝同行同願六和之群衆行自樂樂他自生生他之十善淨化世間為大同和平自由可立而待也不殺不盜個人能樂其生善業不邪淫家族能樂其生偏此多雜染不妄語四種社會能樂其生不貪欲能克己法善善心不瞋恚能恕人施善意不邪見知善惡邪正在世間道以戒為本樂見和思想正左右生體質利和産消均貧富定戒和法制齊上下人和身和光明禮敬表相語和翔實雅正偏此多獨善意和志同情悅雖然世間以有情為本有情體有而相生莫不悅生而惡死厭苦以求樂獨不知有情之樂生即衆苦之本有在即苦在有生即苦生厭苦而苦不盡求樂而苦來生不常而死繼之奈何致人世之和樂非不善也然身心無常變易苦自他共處離合苦器界依存拘礙苦有即苦而苦即有又奈何和樂善生之淨世不足以持久昔頂生王以十善化四洲分帝釋之半座然時移人亡則政息善眼十善化弟子自修慈定生二禪功德巍巍而今安在有生必有滅合會終當離世間之實相如是吾人其奈彼何第三節世間之解脫有情為世間之本染著於樂生而不知樂生之即苦身心和合必變異生老病死苦也有欲則有諍有欲則有厭自他共處必凌奪愛別怨會苦也器界共感不以一人為轉移共用不為一人所攝取求不得苦也苦雖無量五蘊和合而苦生故曰略攝為一五蘊熾盛苦也有在即苦在有生即苦生不特苦受之為苦樂受為壞苦不苦不樂為行苦世間與苦一體而異名耳若知此者人身難得如盲龜遇浮木佛法難聞如見優鉢曇華如不即此人身不即此和樂善生之人生以向出世豈非入寶山而空手回歟雖然出世之道未易言也世之求離苦而超此世間者見老病死之為苦乃欲駐顏於仙國永生於天堂見愛別怨會之為苦乃欲隱身山林以傲世離塵世而神我獨存見求不得之為苦乃欲蒙神之恩寵以供獻市富貴變化自在聲色自娛淨妙莊嚴見五蘊生之為苦者乃欲自殺以畢命前三者見於常求有之相續生之不已樂之無涯本有情樂生之世間心行以求出世如煮沙成飯此而可以超脫世苦孰不能畢苦哉後一墮於斷不知有有相續生生不已病在有情之染愛我法愛之不盡乃欲一死以為快老牛敗車之類也此而可以畢苦則凡死者莫不解脫何至生生不已之狂流奔放無極而至於今日然則奈何曰有佛法在出離之道唯一曰八正道八正道以正見為首為導信業果明善惡世間之正見未足以言出世有有之相續不已源於愛取之樂生樂生故苦苦相因死死不已惟不著樂而後能厭苦不染生而後能寂滅拔樂生之根乃入於不死不苦之境離苦以入寂在解有情之本無以昧於緣起無我故味著而愛取滋生此即苦之有情若有真實之自體又如何能滅之唯達有情之本空乃能不染於樂生故出世正見以空為本也且引經略敘之空諸行名色五蘊六處六界行也有情之所依亦有情之所取似有真實而實唯性空之緣起故曰眼等眼等性空生無所從來去亦無所至是眼不實而生生已盡滅有果報無作者陰陰相續以世俗故説有謂此有故彼有此生故彼生蓋因緣所生法即畢竟無自性生亦非實生滅亦非實滅若實生者不滅則墮常可滅則成斷中道正見此唯是空行生空行滅如幻如化之緣有耳不知諸行空者情滯於有未聞滯有而能滅即苦之有也此如尺蠖之有所依即不得無待而遊此性空之諸行無常無恆非久住不安穩是變壞法諸行無常義也不安穩而可壞無常之所以即苦知此者能厭厭切則能離染而得脫然無常乃空行之生滅陰陰相續之生滅故若以諸行為無常而又説諸法不空或説止於現在決非真知無常者即此性空生滅之諸行無我無我所諸法無我義也無常故苦苦故無我無我所得無我智者則於自體愛境界愛而離欲世間以有情為本而惑者不解有情為性空之行聚取自我為實曰我見我見為生死之根本見淺者直聞無我即離欲若無有我何得復云是我之所塞其源而流自竭拔其根而枝自枯不勞説一切法空也見利者聞無我似解而未解執我所依我所取者以為實曰法見我所見法見乃死生之網羅為彼廣説一切法空一切法尚空何況我耶若取法相即著我人衆生壽者博學而能反約還自無我智入以無我我所故無餘斷吐盡離欲滅息沒餘苦更不相續不出不生寂靜勝妙捨一切有餘一切愛盡無欲滅盡涅槃涅槃寂靜義也涅槃者寂滅義樂生之愛盡死苦之有滅前蘊滅而後蘊不生若厲風濟而衆竅虛眩翳除而空華失了無蹤迹不復可以心行言語得之有情之所以能涅槃解脫者以一切法性自寂滅耳法性空似生而實不生不生不滅法如涅槃此以空義成立之空行生者生必滅盡以生滅故寂滅為樂此以無常義成立之不以無我智達我法空離三有愛雖空行生滅本來寂而幻幻相依化化相引此有故彼有此生故彼生無自性之緣有生生不已而衆苦永在以無我我所智達有情空見正法性離無明而得慧解脫不復染著三有離貪愛者得心解脫若所依蘊在而涅槃智生曰有餘依前滅後不生曰無餘依待彼生死之有生曰此無故彼無此滅故彼滅若直論涅槃非有無生滅非苦樂斷常以此皆世間有情事也或者見其為淡泊空寂而妙存之則曰真常妙樂言之非不成理聞者非不愛樂而不知由於有之永在生之不已樂之無涯乃世間有情心行之想像成之即空行聚而見三法印知厭離欲得解脫古仙人之道也惟此一道得清淨無二亦無三此所以空為無二寂靜之門離三解脫門無道無果若諸法不空者不動不出於性空緣起見三法印曰正見正見即般若之異名見正者一切正攝導諸行入一切智海諸有欲破魔軍離愛網越生死河以登涅槃城者非正見不為功識稠林深坑險隘歧道知魔軍窟穴知彼知此者乃足以克敵制勝即正見以端其志決其所行在厭苦離欲得解脫正志或譯正思惟也謀定而後發破釜而沈舟毅然成行離口四過翔實雅正讚佛法僧正語也離身三失舉止動靜合乎律光明禮敬正業也如法清淨以活命易養易滿正命也此三者守護六根起居有節飲食知量勿驚魔衆勿為魔擾此如行軍者之齊步伐精戰術嚴紀律充軍實敵人望風而披靡禪觀經行晝夜精勤勇猛不退止惡生善正勤也不以小勝而驕不以小損而怯直入無難克敵而後已眼所見耳所聞手足所擬莫非敵也語默於此動靜於此在厭苦離欲得解脫正念也破魔軍登涅槃城王師所過匕鬯不驚正定也慧因定發定得慧融寂然深入無生忍脫然無繫涅槃名為大定窟也於空行聚正見三法印導八正道行入涅槃解脫之道唯此一門然有情之根性非一有厭心切急求出離者聲聞也有徹見緣起悲心深入骨髓一切有情無始來相為親友盲無慧目沈溺苦海與我同我何忍獨出於生死於是充悲憫之心行悲濟之事不疾斷煩惱以求證但知行其所應行初不以自證之勝妙為心一切智智相應作意大悲為上首無所得為方便行六度四攝以利世菩薩也三鳥出籠三獸渡河三乘共轍智慧功德相距不可以道理計而其同入無餘涅槃為究竟則不復有勝劣之差釋尊之本教雖窮深極廣而亦簡易可知因為鉤玄探本述其法門之體系如此戒諸行無常解脫道以慧為本意諸法無我達諸行空正見涅槃寂靜定心厭苦向滅正志正語僧和事事當則心安正業正命業正勤繫心則心攝正念己利事心靜則慧發正定第四章聖典之結集第一節王舍城之第一結集佛滅後第一大事厥為結集聖典蓋佛在依佛佛滅則唯以法律為師佛之教授法教誡律雖傳布人間然求其持而不失純而不濫則有賴於結集結集等誦或會誦之義即於衆中推出精諳法律者因上座之問而誦出經律經大衆為之審定文句既定又從而編次之垂以為典則聖典之結集非一以王舍城之五百結集為始故此為佛典之根本結集也其結集之緣起者初摩訶迦葉知佛滅期近與五百比丘自王舍城首途由波婆赴拘尸那途次遇一手持曼陀羅華之異學得悉世尊已入滅七日比丘之未離欲者聞之多慟哭無學者亦默然不樂跋陀羅獨欣然曰大沙門在時是淨是不淨是應是不應吾等恆為所困今者得自在可適吾等意欲作而作不作而止大迦葉聞之慨然於拘尸那禮葬竟思所以住持正法以免癡人之穢亂以結集聖典謀諸衆得衆所贊許乃選得五百人以任其事迦葉以阿難猶在學地初不擬以阿難在數中衆比丘以阿難久侍釋尊多聞第一故曰大德迦葉應取阿難足五百數此是衆聖意也迦葉以衆議允之議定大迦葉與阿那律分率聖衆赴王舍城以結集事告阿闍世王請於城北七葉岩修建精舍以安衆並於結集期中日供飯食以免乞化之勞阿難一人獨行過毗舍離於大迦葉深致其悲感之思世尊已涅槃我今正欲依附云何持我作疥瘙野干心生不悅乃專精行道斷殘結得無學果證羅漢已往王舍城預結集是年夏安居中集和合僧以迦葉等為上座先推優波離登高座誦出毗奈耶次由阿難誦出修多羅達磨大衆共誦定為佛説凡三月而竣事覺音傳凡七月時佛滅初夏即阿闍世王在位第八年也根本結集之聖典或言唯經律二藏或言經律論三藏或加雜藏為四藏增一經序或更開雜藏為雜與菩薩而成五藏分別功德論成實論其雜藏與菩薩藏下當別論之經之與律其內容如何雖猶待考訂而阿難誦出修多羅優波離誦出毗奈耶為後代一致之説確實可信至於阿毗達磨論藏之結集則吾人不敢遽以為信史也何者微特大衆律五分律之所不載即載其事者如四分律善見律亦附見於經藏之末而不明結集之人即明結集之人者亦復傳説不一論及論藏之內容又莫不以自宗所尊信之論典當之傳説若此之紛紛其可信耶正以根本結集之無此也所據典籍誦者及作者論典之內容部別集藏傳分別功德論迦旃延撰以呈佛意指毗勒大衆部傳十誦律毗尼序不明有部傳智論阿難誦五戒等意指法蘊足論毗奈耶雜事西域記大迦葉波誦四分律毗尼母論不明有難無難等五分意指舍利弗毗曇法藏部傳善見律毗婆沙不明論事等七部阿毗曇銅鍱部傳真諦部執論疏富樓那誦不明不明五百結集大迦葉實促成之其豐功偉業澤被後世吾人無間言矣然未能集思廣益求其備且當而匆促成之雖聖者離欲心無染著如虛空而習氣所引究不無圭璧之玷也釋尊晚年上首弟子舍利弗目犍連先佛入滅其常侍佛左右歷草五年而不離稱逐佛轉法輪者允推阿難大迦葉不慊阿難佛世已啓其機佛滅而其迹益著佛諭迦葉以為衆説法每以有比丘聞所説法不忍不喜為辭曾於佛前指責目連及阿難弟子共相論義阿難告以且忍尊者此年少比丘少智而迦葉竟以汝且默然莫令我於僧中問汝事答之因衆以抑阿難辭鋒咄咄若不知有佛在者偷羅難陀尼不滿迦葉之先阿難説法諷以如販針兒於針師家賣迦葉即廣顯證德於阿難及尼衆中作獅子吼迦葉受窘於尼衆時即謂我不怪汝等我怪阿難蓋迦葉頭陀第一嚴肅而好遠離為耆年苦行者所重阿難則多聞第一和忍而樂化他為少壯悲解者所資一則薄視女性一則求度女人個性不同所見自難苟合也當結集之初迦葉不欲以阿難入數中有把臂推出之説雖以衆議而允之猶責阿難以六突吉羅竟以求佛度瞿曇彌出家不請佛住世等為阿難罪此豈持平之論哉於結集時阿難傳佛遺命大衆若欲棄小小戒可隨意棄迦葉以世人既知釋子沙門所當護持之戒矣今若棄小小戒人不將謂沙門瞿曇所設戒法以師逝而與煙俱消為免此譏佛所未制今不別制佛所已制不可少改其説雖持之有故而顯違佛訓拘滯不通馴致戒律之在後世務為繁文縟節而失其適應之能此猶可也又以阿難之不問小小戒判為犯突吉羅以地則王舍城為迦葉遊化之區以人則五百多頭陀苦行之侶阿難雖不見罪相敬信大德今當悔過被抑於上座而無可如何夫忍結不斷以侍佛忍上座之責以竟其誦出經藏之功柔和慈忍如阿難洵不可及也大法結集竟尊者富樓那引五百比丘自南山來大衆告以曇摩毗奈耶結集已了宜共許此富樓那曰諸德結集佛法自是然我從佛得聞之法亦當受持迦葉乃復與富樓那共論法律唯內宿內煮等八事五分律作七事富樓那謂釋尊制而復開迦葉則謂開而又制終於各行其是僧祇律則謂迦葉結集已喚千比丘入因有捨微細戒之諍總之五百結集僅為少數人之結集當時即未能得大衆之同意則無可否認者大迦葉領導之結集於初四百年佛教之小行大隱有關故特為摘發之此第一結集雖未盡愜人意然上座迦葉為時望所宗護法阿闍世為摩竭陀之主當時既無較完善之結集相頡頏故仍為一般所宗信惟律重根本道通兼濟之思想自由流布於人間而已第二節毗舍離之第二結集佛元百年間佛弟子傳持不絶聖教之化力日張自波吒利弗城或譯波利波多波多羅弗波羅離子沿恆河西上經拘舍彌摩偷羅而西北及於印度河流域西南達德干高原東方則毗舍離之佛教日盛與波吒利隔河相望形成東西兩系焉當第一結集衆意已未能盡同阿難慮摩竭陀毗舍離雙方之不滿乃於恆河中流分身入滅足以見分裂之機經百年之醞釀因人地之分化乃有七百結集之舉阿難弟子有耶舍者波利比丘也遊化至毗舍離於大林精舍中住見跋耆族比丘布薩日以金鉢盛水白衣來輒呼曰諸賢其施大衆以錢大衆將以此購易所需耶舍不以為然不受分且明斥為不淨申其理於白衣之前跋耆比丘以耶舍誹謗大衆啓白衣之疑議為之作擯羯磨耶舍乃西行受畜金銀為引起結集之因僧祇律即唯傳此事若依餘律則不止此一端謂跋耆比丘凡有十事非法云耶舍去摩偷羅訪三浮多於阿呼恆伽山謀有以糾正之又共訪精通法律之名德離婆多於僧伽奢得其贊可乃遣使廣集波利比丘之在阿槃提阿軬荼阿臘脾伐臘毗沙祇奢羯羅及摩偷羅等地者共下毗舍離以論之跋耆比丘聞之亦遣使四出以波夷那即跋耆波梨二國比丘共諍世尊出在波夷那願大德助波夷那比丘為言波利比丘既來衆口紛呶末由取決乃推代表九人薩婆伽羅離婆多三菩伽耶舍修摩那沙羅富闍蘇彌羅婆薩摩伽羅摩阿耆多以決之時參與結集者凡七百衆共會於婆利迦園離婆多就十事一一發問薩婆伽羅則一一答之判為非法傳説如此據覺音等所述當時之跋耆比丘不以彼等之判決為然仍遂行其所見集比丘萬人別為結集號大結集國王左袒之波利比丘乃被逼西避僧祇律謂陀娑婆羅優波離之弟子疑即婆薩摩伽羅摩誦出律藏錫蘭島史及覺音則説七百比丘斷定十事非法後即誦出法律以八月終其事比較衆説而觀之則七百比丘即波利比丘之東下及同情加入者九代表之共論十事實未獲得定論相持不下乃各行其是一則西方比丘之上座結集一則東方比丘之大衆結集國王不滿客比丘之少數固執下令逐客或亦有之十事之判為非法實波利系比丘片面之辭於此有不可不知者則後世之所謂正統佛教乃受波吒利城阿恕迦王之護持而形成者吾人今日所據之史料多為波利系之説求其當於事理蓋亦難矣即十事為論一角鹽淨聽許貯鹽於角器中食時取著食中食之淨即聽許之意二二指淨日影過中橫列二指之長亦得進食三他聚落淨到他聚落得復食四住處淨在同一界住者不必一布薩得隨所住而各別行羯磨五贊同淨得先為議決後於僧中追認之六所習淨即聽許先例七不攢搖淨未經攢搖之乳即未去脂者得取飲之八飲闍樓凝淨未醱酵及半醱酵之椰子汁得取飲之九無緣坐具淨造坐具得不用邊緣而隨意大小十金銀淨即受畜金銀此十事現存各律並判為非法然以吾人所見則一二三七八九事關飲食應即小小戒可捨之例六為環境慣例之適應其不礙解脫可矣正不必一一與世俗爭也四五疑出於僧事日繁而多衆和合之不易受畜金銀寶物之戒緣起於摩尼珠髻聚落主蓋禁其為嚴飾也故曰若自為受畜金銀珍寶清淨者五欲功德悉應清淨其銅錢貝齒等課幣縱有所禁亦突吉羅而已然則商業發達金銀成為社會常用通貨之時乞以購易所需是否如耶舍所見之絶對不可亦有所難言矣於此結集中有薩婆摩伽羅婆或譯婆颯婆婆沙藍等阿耆多或譯阿夷頭其人藏傳當時有上座婆娑波受納金鉢夜遣比丘持赴市中收集金寶施物應即薩婆伽羅婆跋耆系比丘之一也真諦等傳説五百結集時別有界外結集聚衆萬人以婆師波羅漢為上座殆亦即此人後之大乘學者欲托古以自厚故移婆師波領導跋耆系之史迹結合富樓那等五百人事以成王舍城界外結集之説也阿耆多譯無勝或難勝與彌勒菩薩同名四分十誦並謂阿耆多受戒五歲本難預結集之席以其堪任教化精識法律乃立為敷坐具人實為九上座之一其青年明達廁身上座之席可謂創舉增一經序謂第一結集時有彌勒大乘者每謂阿難與彌勒集大乘藏固亦事出有因阿耆多應是跋耆系之青年英俊與大乘佛教之關係特深惟移此佛滅百年頃事屬於第一結集有未盡然耳參加此第二結集之上座除阿耆多外不出阿難阿那律優波離之弟子其時代不能後於佛元百年也第三節傳説中之第三結集第一結集有意見之異而未分裂第二結集則上座大衆已各為結集依佛教之傳説則更有所謂第三結集者考其實乃上座所出之三大系根據舊傳而各為自宗聖典之整理此固事所必有然傳説紛亂事多難憑其時代與經過卒莫得而論定焉有云佛元一百三十七年波吒釐子城有魔名衆賢者作阿羅漢形致僧衆共諍凡六十年有犢子比丘集和合僧而息其諍事名第三結集時護法為難陀王云此犢子系之傳説也或云佛元四百年迦膩色迦王信説一切有部集五百大德於迦濕彌羅集三藏裁正衆説此説一切有系之傳説也此皆不盡無稽而事多錯失華氏城與迦濕彌羅之結集下當更論之第四節法毗奈耶之初型釋尊之教法唯一達磨法貫攝義理無非經也以遮顯之相待而成漸分流為二即法之行善以悟入真實者曰教授曰法法之止惡以調伏妄念者曰教誡曰毗奈耶律法之與律初非判然之二物然釋尊晚年此二者已大異其趣教授之法即憶持釋尊斷片之開示精鍊為定型文句轉相教授曰句法此種種之句法佛世已有編次集合者如億耳所誦之義品八章或云十六章即其一也以文字為斷片之記録容亦有之其教誡之律隨犯而制為定文半月舉行布薩朗誦佛制即波羅提木叉戒經是佛入滅已弟子集種種句法為經藏以戒經為主間及僧團之種種規制集為律藏蓋即承此法律分流之餘緒而編集之後世所傳之經律雜以學派之言互有出入增減編組之次第亦不同孰為聖典之舊孰為演繹引申或羼入者極難言其實然彼此仍有其一貫之迹吾人即其同者以推論為聖典之舊要無大過略言之佛滅百年當部派分裂之頃必有一共許之經律在逮部派分流而經律乃日形改觀也先就律典言之以僧祇律之製作為近古彼分比丘律及比丘尼律為兩大綱又各分毗尼雜跋渠威儀法之三此以比丘律為主次出尼律之不共者頗合於當時佛教之精神較之上座分別説系諸律次尼律於犍度之前者為當即其三類之分既合於學威儀學毗尼學波羅提木叉之三學亦與受戒聚相應雜聚威儀聚之三聚合毗尼部乃戒經之分別解釋即巴利律藏之修多羅毗崩伽也戒經分波羅夷等八類諸律無異即出入最大之衆學法著衣及受食等事亦大體從同分別戒經以下諸律極開合之異僧祇律作雜跋渠與威儀法之二雖不必即古本之真亦較為近古何者一僧祇律之雜跋渠標偈而牒釋之隨事類及簡朴而次第微嫌雜亂此初編之應爾也二雜跋渠即相應品即隨事之相類而類別之威儀法多為日常生活之拾遺此與五分律之十九法四分律之二十犍度十誦律之十八事雖次第不盡同而內容多合此可以覆按知之三法藏部之毗尼母論薩婆多部之毗尼摩德勒迦之雜事即雜跋渠十誦律善誦之初分並牒句而為之釋其牒句與僧祇律雜跋渠及威儀之牒釋雖次第或異而文義相當其顯然可見者則以五百結集及七百結集廁其中也此毗尼之本母淵源有據準此以比較諸家之廣律則開合演變之迹歷然可指一嫌其次第之微雜而改組之演繹補充之集出受具布薩安居等大事已雜跋渠中所遺之雜事與威儀五分律集之為雜法及威儀法四分律集之為雜犍度及法犍度猶沿用其舊名有部律合之為雜事其雜跋渠中之結集事四分五分律並以之殿犍度末此因雜跋渠及威儀之舊而改組之故雖緣起次第各異而大體猶同二即此整理者嫌其未盡而施以抉擇分別初附於諸事中或分別波羅夷及僧殘及於波羅提木叉之全或及於犍度或增一為次如四分律之調部毗尼毗尼增一或十誦律之優波離問善見律之舍利弗問並僧祇律五分律之所無此蓋後人之分別藉優波離等以自重文既後出宜其有無出入邈不相及也十誦律之善誦本抉擇分別之作而保存雜事之古述於其中使吾人得以推見僧祇律之近古何幸如之此猶學派分裂頃之律典未足以言初型請更進而論之戒經之編次以罪相之輕重為類有犯而宜擯者集為波羅夷犯而宜治罰者集為僧伽婆尸沙雖可決其犯重而判別未明者集為不定此三重罪也有犯而宜懺悔者集為波逸提波逸提中有以資具之與他屬己而成犯者則物應捨而罪宜悔別集為尼薩耆波逸提而列之於前有犯輕但向他悔即可者集為波羅提提舍尼此三輕罪也六者之文句次第因部派而或出入然察其演變之迹猶得想見其為古型也各家律此下並有衆學法與七滅諍然衆學法出威儀法中結句云應當學與前六者之結罪不類七滅諍乃悔過息諍之作法出雜跋渠中與波羅提木叉之名義不符此二者宜為後學者誦習之方便而附益焉古本之戒經應為四波羅夷十三僧伽婆尸沙二不定三十尼薩耆波逸提九十二波逸提四悔過凡百四十五戒而已婆沙引經云跋耆比丘聞誦戒一百五十事漢譯改為二百五十蓋波羅提木叉之古本也雜跋渠與威儀以五百結集七百結集事廁其中則亦非七百結集之舊原始結集僧事連類而鳩集之曰雜跋渠末附以五百結集之記載猶書籍之後記也七百結集者取而詳審董理之又附記七百結集事於後此下之種種多威儀事附麗於雜跋渠之下殆七百結集之後阿恕迦王之世乎諸家雖分之為二有部俱總名之為雜事猶可見古型之唯一也錫蘭島史謂大衆之徒棄甚深經律之一分可謂以不病為病者也跋耆比丘受百五十事之戒本或已包括七滅諍在內實即暗示七百結集時之跋耆系彼等繼承小小戒可捨及富樓那系之精神貴得大體而不務瑣細傳習舊傳之律文為已足參考學派之分裂若波利系比丘則反是深入微細而流於繁瑣比丘慣習之生活事無巨細一一為之審定而附於雜跋渠之後次第之雜亂者整理之事理之不詳者分別之上座系重律而律之古型失雖然此威儀等事非謂事事後出固亦有佛世而習行者大衆系於律本為守舊者逮波利系得勢大衆系亦不得不稍事更張矣七百結集之律典猶可得而議古則吾不知然學派未分要當無大異也緣起經分別波羅夷僧殘不定捨墮墮對悔衆學法七滅諍附比丘律雜事毗奈耶雜跋渠結集後記威儀法附比丘尼律出其不共者達磨即修多羅藏之結集據典籍所載僻處西北印之薩婆多部唯雜亦譯相應中長增一四阿含餘部則有第五部之雜藏雜阿含隨事義之相應者而類別編次之如處與處相應界與界相應義相應而文則雜碎中阿含經文不長不短長阿含則經文甚長增一阿含以數相次而集經一而二二而三乃至多法雜藏或為四含所不攝或自四含中集出內容多出入諍論之所在也四含之次第既有異説各家所誦之經文亦具缺不同編制亦異學派之異見固不僅解釋不同而已銅鍱部化地部法藏部大衆部有部長阿含一梵動經等一增一增十大因緣至梵動一梵動增一至增十帝釋問經一二中阿含二根本説經等二二二三雜阿含三五十六相應三雜為四衆天子天女説四雜比丘比丘尼優婆塞優婆夷雜天雜帝釋雜魔雜梵王四根雜力雜覺雜道雜等一蘊品處界品緣起品聲聞品佛道品伽陀品增一阿含四一集至十一集四一增至十一三一事至十一事三一增至百四一句事至十句事五小誦法句無問自説如是語經集天宮事餓鬼事長老偈長老尼偈本生義釋無礙解道譬喻佛種姓經行藏凡十五部五其餘雜説五生經本經善因緣經方等經未曾有經譬喻經優婆提舍經句義經法句經波羅延經雜難聖偈經五辟支佛阿羅漢自説本起因緣無附記毗尼母論云修多羅乃至優波提舍與雜藏相應者集為雜藏分別功德論云或佛説或弟子説或諸天讚頌或説宿緣三阿僧祇菩薩所生文義非一多於三藏故曰雜藏雜藏中之本生本事等薩婆多部亦有之然以此為經律所固有無有出三藏外者此雜藏之離四含而獨立非結集之舊雖有目之為小阿含者然律文但曰集為第五雜藏不名之為阿含是異之也雖然雜藏後出而內容則有極古者此不可不知也雜藏之內容與舊傳九部經依法華説之名目多合不許雜藏者以九部為聖典內容之分類非部帙之別然許有雜藏者則本生譬喻等確有部帙之差別可指九部之説各派所共信而解説殊曖昧即名目亦時異其與雜藏及四阿含之關係尤多異説古史無徵難期精確之論定然詳契經之內容尋學派之流別則大意猶可説也修多羅之結集沿革略經三期而後大定一集佛陀言行為九部經佛之世斷片教授之文句遞相教授曰句法有為之類集者如法句嗢拖南義品阿達婆耆波羅延過道等餘則釋尊及弟子之事迹與句法共傳人間佛滅已弟子取佛之言行類集為九部修多羅即説法之以散文者祇夜即以韻文而重頌散文之所説者伽陀即説法之全以韻文出之者此三雖就文字之形式分類而實為釋尊言教法義之類集今之雜阿含經雖多所演變猶存當時之舊何則瑜伽論雜糅大小而古意猶倣佛可窺其説四阿含以雜阿含經為本事餘經則依此而為不同方式之編制故曰即彼相應雜教復以餘相説云云其敘雜阿含經之內容曰世尊觀待彼彼所化宣説如來及諸弟子所説相應蘊界處相應緣起食諦相應念住正斷神足根力覺支入出息念學證淨等相應又依八衆説衆相應即彼一切事相應教間廁鳩集是故説名雜阿笈摩此與諸佛語言九事所攝之説正合此事相應教大別為散文之修多羅與韻文之伽陀祇夜則隨文義兩攝之瑜伽謂思擇聖教有二一思擇素怛纜義二思擇伽陀義思擇素怛纜義如攝事分及菩薩藏教授中説其攝事分所説即雜阿含之蘊相應事等其思擇伽陀義則十九為雜含八衆相應文釋尊法義之教授初類集為修多羅祇夜伽陀三部經與今之雜含相當實無可疑者雜含之雜即相應義與毗奈耶雜跋渠之雜正同隨義類而鳩集成編固原始結集之舊制若嫌其文段之無倫次陋矣因緣者記佛及弟子之事迹始終本末歷然有敘約現生説後之賢愚因緣百緣雜寶藏經之一一事緣即其例以事緣常為説法之緣故後人每以因人因事而起解之譬喻者不但取譬以説法凡因事而興感亦譬喻也本生者説釋尊兼弟子之宿行本事者敘古佛之化未曾有者明佛及弟子不思議之證德奇迹此五部為釋尊景行之類集與前三部迥異優波提舍者於法義之深簡者藉問答而解説之後世之論藏即胚胎於此其傳十二部或較九部經略後經者於佛弟子之聞修多羅祇夜而證果者別出而題為記別佛世句法之類集雖已攝入修多羅祇夜伽陀而小型類集之風未替五部沙門競集法句或有更張要皆佛典之極精要親切者此類之編集淵源極古而內容亦雜梵本之根本有部律舉無問自説波羅延諦見山人頌賢人頌義品六種梵本之譬喻集即集此而成漢譯省略藏譯又增男上座頌女上座頌二種於義品之前根本有部律之藥事舉嗢拖南諸上座頌世羅尼頌衆義經義品四種銅鍱部之雜藏將此數種攝為法句無問自説經集義品波羅延等長老偈長老尼偈等四分律之説雜藏除優波提舍等七部外有句義經法句經波羅延經雜難經聖偈經獨缺嗢拖南此等並法義精要之小集於十二部經中嗢拖南攝也如漢譯之法句藏譯即題嗢拖南智論云優陀那者名有法佛必應説而無有問者佛略開問端又如佛涅槃後諸弟子抄集要偈諸有集衆妙事皆名優陀那優陀那有集施義小集皆優陀南之類後世偏以此優陀南為無問自説非也是法義之小集列伽陀之後方廣經與大乘之方等方廣關係特深古迹雖不詳似為大行之綜合如是集釋尊言行為九部經修多羅之初型是部帙之部也二演九部經為四阿含五百結集人少時暫釋尊遺言景行之未見結集者所在而有則宜為之拾遺碎金雜錦非不燦然可觀而雜碎難持説理者簡淡而中下不及紀事者渲染而或傳聞失實則宜為之聯比綜合於是或本相應之舊文或取傳聞之新義演繹引申聯比之糅以因緣譬喻本生本事未曾有之紀事構為較長之篇幅以篇幅之長短得名曰中阿含曰長阿含其原始結集之事相應修多羅祇夜伽陀沿用相應之舊名曰雜阿含增一之制便於誦持佛世已有之逮長含之增一增十集異門經已日臻發達增一阿含即全以此數目之相次而組織之者凡一事而再見於四含者雜含則簡潔平淡中含猶大體相近長及增一則特詳化簡潔為長漫平淡為瑰奇蓋去佛日遠傳説久而想像富此不難比觀知之同一之記載長含輒移其説處於毗舍離增一則又每移於舍衛殆與編集之地點有關演相應教為四含與律典之更張頗見一致律則以雜跋渠為本糅以因緣譬喻本生等集為諸犍度別之為七法八法或大品小品而仍名其遺餘者為雜事法則以相應教為本糅以記事演為長含中含而名其本教為雜含阿含之有增一亦猶毗奈耶之有增一也四阿含之類集時地不詳惟傳聞阿難彙佛説九分教而為四阿含事則應有人不必阿難以各派共許四阿含而論之則猶七百結集以前事也三依四含而立雜藏演九部經為四阿含四含興而九部經之古型失然優陀那小集本生等傳説當仍有離四含而鳩集者七百結集聖衆初破跋耆系與波利系分化於東西阿恕迦王時因五事之爭而思為融合惟波利系之深入西北者西系與遊化中印者中系意見殊不一佛教乃啓三分之勢時彼此聖典亦多所出入西系尊雜含中系推長含東系跋耆系則重增一或作長含增一阿含經西系唯十事中系凡十一事東系則推衍繁廣舊傳百事之多西系與東系若不兩立優婆毱多不與大天共語中系則受東系之熏染態度和緩而折中華氏城之第三結集雖猶待證實然中系之帝須似得東系之合作大抵以中系為主而分別取捨東西之善説分別説之得名其在此乎優陀那小集本生等傳説雖小異亦視為可留附於四含之末集為第五雜藏次四含為第五而不名阿含何也源本佛説展轉傳來為阿含不名之為阿含是異之也分別功德論謂文義非一多於三藏故名雜藏其部類龐雜更非雜藏之舊矣西系學者堅拒雜藏雖知佛法多所零落而寧缺毋濫中系東系則佛法務求其廣備托拾遺聞未可厚非彼此所見各有所是及其弊也一則以固一則以濫抉擇而取捨之在善學者阿恕迦王時文字之用漸宏聖典傳有大部之記録自此而後四含雖或出入而大體已定惟雜藏一門日見弘廣初離修多羅藏而別為第四雜藏又漸遞演而出摩訶衍藏及禁咒藏也第五章阿恕迦王與佛教第一節法阿育與黑阿育佛元百十六年摩竭陀王阿恕迦即阿育立迦王出佛滅百年後為大小各宗所共信自上而下佛滅於阿闍世王八年闍王子曰鬱多耶跋陀羅王自下而上則阿恕王以前有頻頭沙羅王旃陀掘多王難陀王其間之王統不詳信古而闕疑如此而已銅鍱部者則謂王即位於佛滅二百十八年自鬱多耶跋陀羅王以下有阿䨲樓陀王閔蹰王那迦逮寫迦王修修佛那迦王迦羅阿育王迦王十兒此下乃與難陀王接詳記諸王在位之年合於錫蘭王統五師傳承一若信而可徵者宜今之學者多依之然常傳迦王出百年後銅鍱者亦傳此時有迦羅黑阿育王其人並謂七百結集時之助跋耆比丘者即此王云彼於黑阿育後隔百年別有達磨法阿育出二阿育之説可疑考迦王之初立脅父於死陷兄於坑置地獄之刑其伐羯𩜁伽也虜殺無算鐵輪王以鐵血定閻浮暴力可畏人皆稱之為旃陀阿育旃陀暴惡可畏義也黑亦惡義逮熏陶佛化一變力政而為德化人復以法阿育稱之猶言賢德者阿育也是則迦羅阿育言其即位之初達磨阿育指其信佛以後銅鍱傳誤以為二人視為有百餘年之隔非也或者雖覺二阿育之無稽猶以銅鍱傳之年代為可信以迦王為佛元二百年後人尋統一閻浮之迦王與優婆毱多末闡地同時銅鍱部之善見律亦作此説末闡地為阿難弟子毱多則其再傳分別功德論謂阿難傳優多羅優多羅弟子善覺與迦王同時迦王與之同時其不能後於佛滅二世紀無疑即以五師傳承而論七百結集之阿難弟子耶舍即第二師之須那拘此可於善見律知之彼稱耶舍為耶須拘迦次又曰第二須那拘集毗尼藏須那拘於優婆離為再傳律於阿難為弟子法與阿難弟子商那和修同時優婆毱多出商那和修之門與須那拘再傳之帝須同時雖銅鍱部所傳詳五師傳承之年使合於二百餘年之説然此數人與迦王並世其不能後於佛元二世紀可斷言也優多羅善覺晚年弟子末闡地阿難商那和修優婆毱多佛同時優波離馱寫拘須那拘悉伽婆帝須銅鍱部之傳説求於迦王之仁暴而疑求於同時之大德而疑其似若可信者則印度錫蘭之王統年代耳然印度為無歷史國銅鍱者何知之獨詳此蓋由誤會而以意為之非事實也大史及錫蘭島史亦銅鍱傳也詳記王統之年代然準彼推算則佛滅於西元前五百四十三年與善見律亦有五十餘年之差如彼等所傳錫蘭建國於佛滅之年托始云爾何必可信七百結集舊傳在佛滅百年概説此後百十餘年有阿恕迦王出銅鍱之學者必誤以此為百年後之百十餘年乃有阿育王自拜為王時佛涅槃已二百十八年之説迦王出於佛後百年亦為彼等所熟聞而無以明其故乃誤會迦羅阿育與達磨阿育為二人取傳説中之諸王諸師製年譜以自圓其説百年之差其以是歟於聲聞四大派中於分別説系四部中惟銅鍱部作此説吾信古以闕疑王統不明曰阿恕迦王惟一登位於佛滅百十六年也釋尊入滅之年代且附此一論佛滅之年代傳有七十餘家我國古德惑於星隕地動之變多用周穆王壬申入滅説然此實渺茫難憑時賢無信之者推論佛滅之年莫如依迦王即位之年而逆算之蓋迦王即位於周赧王四十三年已為史學所公認則加以去佛之年代即佛滅之年矣近人多信善見律衆聖點記銅鍱部所傳等故出入於西元前四百八十年左右今衡以迦王時代住持佛教之大德派遣之傳教師不立迦羅阿育王固有小乘各派之共説除銅鍱部馬鳴大莊嚴論龍樹大智度論之説信迦王惟一人出佛後百年此佛後百年部執異論及十八部論明定為百十六年則知釋尊入滅之年應為周安王十四年西元前三百八十八年本書據此為佛元與拉斯之西元前四百年頃克引及威士達之三百七十年頃説略同第二節阿恕迦王之政教佛元六十一年馬其頓名王亞歷山大以呾叉斯羅王之請時印度內亂甚引兵侵印度抵五河已更欲東窺恆河之平原後以將士不欲東行乃留守而歸時有旃陀羅掘多月護者出冒狸孔雀種姓乘間糾合西北印之士族逐馬其頓守兵而獨立又東下廢難陀王統一中西北三印再建摩竭陀帝國是為孔雀王朝都於波吒釐子城時佛元六十七年也越四年敘利亞王塞留克斯為旃王所敗退還阿富汗斯坦以和並遣使美迦斯迭纍斯駐波吒釐子城其人記當時見聞為一書殘篇猶存故得考見旃王之年代旃王力護佛教政治修明治國凡二十四年子賓頭沙羅王克承厥業又二十五年而阿恕迦王立時佛滅已百十六年矣迦王未立頃嘗平呾叉斯羅之事變頗得臣民之好評賓王病篤群臣擁立迦王拒太子修私摩而死之賓王用是憤憾死迦王承祖父之餘緒雄才大略討伐不臣開印度統一之局威聲驚域外東之緬甸南之錫蘭西北之馬其頓敘利亞埃及等並畏威懷德遠承其聲教孔雀王朝大業之成外由希臘文明之輸入而得力於佛教者尤多嚴階級崇祠祀信咒禁尚苦行凡此印度文明之積弊而幾乎無可救藥者初期佛教無不反其所行佛教初行於恆河流域次及西北印孔雀王朝則據此而崛興者亞歷山大來侵受恆河流域聯軍之抗拒卒阻其東進之心亞歷山大去北印即起謀獨立以視二百年來一任波斯王朝之蹂躪剝削印度民族之融合精神已有極大之進步非佛教民族平等論之影響而何印度民族沐佛百年之化而孔雀王朝興其盛衰與佛教相終始吾人於此不特引為佛教之光榮亦引此為後期佛教之遺憾也迦王初立群臣以擁戴功多有以此驕王者乃大殺以清反側兄弟多被殺即毗地輸迦亦作帝須出家為道似亦不得其善終兵烽所至虜殺無算初期之暴力政治縱不若記載之甚要亦無容諱飾者王灌頂之第九年始歸三寶為優婆塞並刻石以志悔為王者必先自治而後能伏敵人而不能勝自身之欲焉能勝敵人啓發其信心者或云護比丘或云善覺或云修私摩稚兒泥瞿陀出家為沙彌王見而有感乃歸心佛教云就王於佛教事業熱誠觀之則王之正信佛教無可疑然於婆羅門教耆那教等亦豫以尊重維護蓋迦王之心目中宗教乃廣義之道德雖有淺深其間而同以導人為善心胸廣大信佛而能豫異教徒之信仰自由以尊重非褊急政治家可及也王沐佛之化已誠信為法仁慈為政寬刑賦施醫藥廢漁獵睦友邦為正法之興隆人民之安寧與幸福計歷訪各地之名德沙門及婆羅門於國內國外置正法大官以主其事自灌頂後之十三年至二十八年凡數發敕令謂真正之勝利在宗教而不在武力云王有為佛教四衆弟子特發之敕令名婆伯那者敕刻石於巴羅特帝附近之山頂敕文舉佛説之七種法門以勸弟子修學者毗奈耶要略聖者之自在未來之怖畏牟尼歌寂默經塢波底沙之問始於妄語之羅睺羅教誡王灌頂後二十年巡禮佛陀及佛弟子之聖迹自波吒釐子城北上經毗舍離至釋尊誕生之藍毗尼園後循釋尊最後遊行之舊道至拘尸那之佛涅槃處於道中建大石柱五處其藍毗尼園之石柱上刻馬像今猶存下截刻文亦明白可辨略為某年王自來禮釋迦牟尼誕生之處此巡禮之事備載於阿育王經蓋從優婆毱多之教而為之今得刻文益見巡禮之説不虛王禮菩提樹廣施供養並建八萬四千塔分置佛舍利遍布閻浮王所建之佛教精舍今無有存者所造之塔婆唐代玄奘目擊者不下五百餘現已發現者惟桑琪之一聚婆爾呼之一塔又王所建之石柱分有銘無銘二類玄奘所見者凡十六處現存止九處其中六柱各刻敕令七條其他刻全同或全別之敕令王之石刻於印度之宗教宣傳至今仍有極大之價值也王信佛法切三以閻浮施兒摩哂陀女僧迦密壻阿耆並先後出家派名德宣化於各地晚年王被抑於王子及大臣悵悵不得志以半庵摩羅果奉雞園寺僧而卒崇高必墮落合會要當離無常法爾迦王之所信所行為不虛矣時佛元百六十二年也第三節阿恕迦王時代之佛教七百結集時某王助跋耆系而有大衆之結集迦王都波吒釐子城波利系大興然跋耆系亦日形活躍説一切有部傳王因耶舍之説迎優婆毱多於摩偷羅之優留蔓荼山王之禮聖迹建塔婆胥毱多等教之善見律僅謂因婆毱多知僧事助王營建云銅鍱部傳王因積疑求決迎摩偷羅阿烋河山之目犍連子帝須凡此皆波利系也王子摩哂陀出家奉帝須為和上有部之末闡地大衆部之大天為阿闍梨其後並授以化導一方之命此足見迦王之於佛教雖或尊帝須而實無所偏黨付法藏傳謂一曾犯逆罪而精通三藏之比丘與婆沙論之説大天相合往見優婆毱多毱多不與語有部學者之於大天備極毀訾並謂迦王黨於大天聖衆相率西避迦濕彌羅云此又可見深入西北之波利系與跋耆系積不相容當迦王之時王意平等而有部系為跋耆系及波利東系之協調所抑實不勝其憤慨也目犍連子帝須舊傳所不詳惟識身足論破目犍連之過未無體似即此人善見律之名帝須者不一王弟毗地輸迦善見律亦作帝須然則帝須即毗地輸迦之音轉大悲經云摩偷羅優樓蔓荼山有僧伽藍名那馳迦於彼當有比丘名毗地奢廣行流布我之正法其即指此帝須歟説一切有者傳迦葉至優波毱多凡五師相承銅鍱部重律傳優波離至帝須之五師見上表實則帝須即阿難之三傳弟子初與有部同以摩偷羅為中心逮後一東下一西上乃分裂為二若不相涉耳銅鍱部者説真諦浮海來所傳亦當本此迦王尊信佛教外道窮於衣食多濫迹佛門以外道義入佛法中佛教因此起諍摩竭陀大寺雞園內不能和合説戒者凡七年王遣使勸和不聽使者怒殺僧衆王聞之大驚至寺悔過問使者以應得之罪或曰依王所命應王得罪或曰王無殺意使者得罪或曰兩俱得罪王大惑曰誰斷我疑諸比丘推目犍連子帝須於是遣使迎之於阿烋河山王從之咨受佛教知其為分別説者即依之沙汰僧侶賊住比丘多逐歸本宗時博達者猶數百人以外道朋黨盛恐剪除之為害佛法乃別建寺以處之僧衆清淨已集學德兼備者千人和合説戒並結集三藏即銅鍱部所傳之第三結集也然此事可疑試舉其異説而辨之銅鍱部傳説諸學派傳説除大衆系佛滅百年毗舍離七百結集迦羅阿育王時分二部佛滅百年毗舍離七百結集國王不明佛滅百十六年後舶主兒大天諍五事阿育王時分二部佛滅二百卅年頃賊住比丘起諍達磨阿育王時佛滅二百年滿大天諍五事國王不明或作妙雲王時大衆部分出東山等六部華氏城第三結集大衆部分出東山等三部銅鍱者所傳賊住比丘之爭為東山部等之因為佛滅二百年許事與有部者所説大同然有部以此為後於迦王四五十年亦不言賊住銅鍱者以此為法阿育王時頗不合詳東山等部銅鍱者目為安達羅學派安達羅為大天教化之區時大天未行何得有安達羅學派之分且銅鍱者傳佛滅百年至二百年佛法成十八部則十八部之分先於迦王矣迦王所遣之傳教師與五部等分裂有關灼然可見迦王既不應後於佛元二世紀當時之爭亦不應與安達羅學派之爭相濫舊傳優婆毱多後律分五部時毱多猶在五部將分應為分出東山等末部之爭也雖然迦王之世有諍論則無可疑者在所諍何事耳有部系與犢子系並説佛元百年後有五事之爭分根本二部然據大衆系所傳者察之此實三系大衆分別説一切有或四派大衆上座一切有犢子之分爭也此不具論當於下學派分裂中辨之銅鍱者分別説之在當時實與大天等相提攜合力以除大衆系之極端者或亦有之如共許雜藏即是其例現存之僧祇律亦與銅鍱者相近波逸提九十二衆學法僅七十左右大衆系稱惟大天一人是大士諸餘皆小節銅鍱者亦尊為名德之一有部傳當時王黨大天帝須亦取得迦王之尊信而有所論説迦王時佛教之爭乃大衆系與分別説系相協調與波利之西系共爭五事也銅鍱者誤迦王為二百年後人因與二百年後之爭相混傳説帝須於此時集千比丘結集三藏餘部無此説似亦渺茫難信或可共論三藏之義遮他立自以成書如所傳論事之類迦王之前佛教猶局促於恆河流域間及印度河以迦王之誠護佛教乃一躍而為世界之宗教迦王之賜豫佛教不可謂不深且厚矣迦王初置正法官融道德宗教於政治以促進民生之和樂次派傳教師專力於弘布佛教努力於國際之和平王與敘利亞埃及等王國締結友善之邦交並藉佛教以宣達國際間之信義和平雖維持和平僅五十年然實開國際和平運動之先聲也迦王之傳教事業以西北及東南為最成功正法官所至之國家及國王之名見於敕令之刻文者有敘利亞之安提柯斯埃及之度萊梅馬其頓之安提谷那斯克萊奈之馬迦斯愛毗勞斯之歷山王此上即希臘五王國以及北印之健馱羅南印之安達羅錫蘭等可見此皆佛教宣揚之地也佛教傳入希臘五國頗為時衆所歡迎遠至佛元千年波斯猶有佛教僧在晚近各該處之考古及發掘並發現久已湮失之佛教希臘五國乃耶回發祥之地彼二之自猶太教而演化為世界宗教不應忽略佛教深大之影響尤以基督教為甚不特博愛和平即耶穌及彼得等之獨身亦染有濃厚之佛教色彩也或謂基督教稱上帝為喬達亦即喬達摩之音轉云其在東南者南印佛教日發達促成安達羅民族之勃興王子摩哂陀王女僧迦密他之去錫蘭其成功尤大錫蘭王國接受佛教且更傳播於緬甸暹羅等地巴利語系聖典之保存維持初期佛教之形式以迄現在皆難能可貴也其東北方隔於崇山峻嶺弘布稍難舊傳秦始皇時有室利房等十八人來化雖傳説無徵然適與迦王之時代相當或即所派傳教師之一也佛教至迦王而一變前此之雖有二部猶能大體和合者此後則學派分流不復如前矣蓋學者之間已有不同之見逮受命而分化一方適應不同之民族文化學派乃競興迦王所派之傳教師亦不必盡為受命而後成行在一方弘化之名德即因而授以一方化導之命如末闡提等應是此類諸上座受命已各率其弟子以行此與學派之分裂顯灼可見如摩訶提婆之與大衆末系曇無德王弟帝須之師之與曇無德部迦葉波之與迦葉波部摩哂陀之與銅鍱部末闡提之與薩婆多部在當時雖未有學派之形成然經一期之分化即形成分立舊傳優婆毱多後律分五部蓋紀實也以此銅鍱者以達摩阿育出十八派分裂之後非吾所敢信茲附迦王派遣之傳教師及其教化區於下布教師布教地即今末闡提罽賓犍陀羅北印之克什米爾等摩訶提婆摩醯沙慢陀羅南印之賣索爾等勒棄多婆那婆私未詳或云在南印曇無德阿波蘭多迦西印之蘇庫爾以北摩訶曇無德摩訶剌陀南印之孟買摩訶勒棄多臾那世界阿富汗以西末示摩迦葉波雪山邊尼泊爾等須那迦鬱多羅金地緬甸摩哂陀等師子南印之錫蘭第六章學派之分裂第一節二部三系四派佛世一味之教以七百結集初分為聖大衆部及聖上座部謂之根本二部次於佛元百三十年頃於上座部出分別説者合為大衆上座分別説及上座之三系成鼎立之勢逮大天等率衆南行其上座系之沿恆河北岸及雪山麓而東進者別出犢子部其在西北印者自稱説一切有部以別之成四大派寄歸傳云諸部流派生起不同西國相承大綱唯四蓋謂此也其弘布之區域略言之則大衆系在南印説一切有系在西北印分別説系在中印犢子系則在中印之東北亦間及西南也犢子部上座系聖上座部説一切有部一味之佛教上座分別説系上座分別説部聖大衆部大衆系大衆部五百結集時多聞第一之阿難説小小戒可捨辨才第一之富樓那説內煮等八事可開以視頭陀第一之迦葉持律第一之優波離誠有間矣經律多不滿阿難之辭佛滅且數年迦葉猶責阿難以不諳律制如童子陀娑婆羅猶責其袒釋種而啓諍不必有此事而戒勝於聞戒律第一者之上座獲勝則顯然可見也時釋尊涅槃未久未有部別之名而戒慧之各有所重實啓分化之緒矣後之學者法宗阿難律推優波離仰之如日月法律雖等學而未嘗不軒輊其間七百結集時波利系與跋耆系相左亦不出重戒重慧之爭律典惟傳其判決十事一若聖教還復其和合清淨者然依銅鍱者所傳波利系未能屈跋耆系就範且或受黜於毗舍離跋耆系自行結集初為二部之分波利系多耆年上座稱上座部跋耆系衆至萬人稱大衆部佛教僧制尊上座而重大衆行坐食宿以戒臘為次尊上座也羯磨則集衆斷諍則從衆重大衆也僧制尊上座而重大衆合之則健存離之則兩失必相資相成而後可以上座多耆年急於己利重律則貴乎受持謹嚴篤實是所長而常失於泥古大衆多少壯重於為人重慧則貴乎巧便發皇揚厲是所長而常失於好異佛世之相資相成者百年而相爭惜哉僧事決於大衆大衆之勢必日張非上座者傳統之可限也然輕上座而重大衆必至尚感情薄理智競新好異鹵莽滅裂而後已此二部之分大衆系及分別説系謂因於戒律之歧見説一切有及犢子系則視為教理之爭理應兼有之然二部分裂之初律猶重於法蓋多聞者起與持律者異也大衆系於律貴得其大體而上座系深入其微得大體則開遮貴通作法務簡或不免於脫略入微則開遮從嚴作法惟密未免拘滯瑣碎法則反是大衆好博得力於歸納直觀上座則尊舊得力於推衍分別一則多聞求悟學貴化他一則持律守寂學務律己此二系精神之異其初甚機微及其至也已將背道而馳而況加之於師承之別語言交通之礙民族文化之激蕩於其間哉七百結集乃分裂之一緣非其本也大衆系所傳如舍利弗問經參僧祇律後記説中印佛法經一度破壞已後有善王信佛佛法乃復興一長老比丘增益迦葉結集大衆常用之戒律佛教以是起諍行籌以公決之學舊者多從以為名為摩訶僧祇部學新者少而是上座從上座為名舍利弗問經置此事於弗沙密多羅滅法之後固犯有時代之錯誤然其以較簡要者為舊來大衆所常用以上座之推衍繁密為後起則深得其實與上座者所傳若相反而實同也錫蘭島史云大衆之徒違背佛教破壞根本結集別為結集雜亂經文壞五部四含及雜義不知異門説無異門説了義未了義及密意説變更其義附會解釋於是棄甚深經律之一分別作疑似之經律又廢波利婆羅律之眷屬六分阿毗曇波致參毗陀無礙解道尼涕娑義釋及本生一分別為更作而用異名別為僧服條色皆異各自集會上座學者責其廢波利婆羅等蓋亦言其略也此等典籍若例以儒家猶易之有翼春秋之有傳詩之有序禮之有記學有師承而不無推衍附會尊為根本結集之舊固不可直棄之亦無當也本生之別作則傳説之或異服色各異亦諸部同風別為制作即別為結集得大者好略入微者從詳正不必據此為是非也次二部而起者傳説不一以大衆部之傳説藏傳為近似即次成大衆分別説及上座三系彼不明分別説之所出然尋其流出之學派證以錫蘭之所傳分別説之一可見其出於上座部而取捨大衆系之善説成之次於上座出一切有及犢子此即合於義淨大綱唯四之説上座系學者馬鳴於大莊嚴論序云富那脅比丘彌織諸論師北方分別説系之主流薩婆室婆衆一切有部牛王正道者犢子是等諸論師我等皆隨順此亦於敬禮其師長富那及脅尊者而外等視上座三系而尊敬之上座有此三系為探究學派源流者所不容忽略者自二而三三而四其經過不詳分別説系之形成即跋耆系之學説影響於中印之波利系當迦王之世帝須即以分別説者自居折中於東西之間其成立應略早學説之傳承銅鍱者自謂遠承阿難優波離近接耶舍悉伽婆之統也犢子部真諦譯可住子弟子勘梵文有弟子二字之法系真諦曾敘之羅睺羅是舍利弗弟子皤雌子犢子是羅睺羅弟子此部衆又是皤雌子弟子藏傳説一切有部律傳自羅睺羅婆沙論謂犢子部所説多同説一切有惟五六事少異則犢子與有部為同源者然犢子系發揚之地多初期大衆遊化之區犢子之梵語婆蹉弗羅與跋耆子之梵語同亦與七百結集九代表之婆颯婆同不可説之真我亦略與大衆系之一心同古今之論學派者無不以犢子為上座系則殊可異也今以犢子弟子部為波利西系之東下多少折中大衆系者當無大過依有部之傳説迦王之世因大天五事之諍佛法初裂為二部犢子系之正量部亦謂佛滅百三十七年魔化比丘以五事破壞佛教成二部實則分成兩派非初裂也宗輪論以佛滅百十六年迦王居位正量以五事之諍在百三十七年此與善見律之達磨阿育灌頂於佛滅二百十八年滅諍於二百三十六年相距適為百年當時有大德大天在則知同其所指惟銅鍱部多算百年之誤耳迦王之世非三部初分已破為四衆此如異部宗輪論云是時佛法大衆初破謂因四衆共議大天五事不同分為兩部異譯之部執異論云如是時中大衆破散破散大衆凡有四種羅什古譯唯三當時有四衆之存在固明甚者調伏天蓮華等並謂佛滅百十六年佛弟子以四種語誦戒佛教乃裂為大衆上座説一切有犢子四派與大衆破散凡有四種之説合其説四派云一切有部以雅語誦戒承羅睺羅之學統大衆部以俗語承大迦葉之統正量部犢子系之盛行者以雜語承優波離之學上座部以鬼語承大迦旃延之學統此以師承及言語之別敘四部分裂之因頗有合佛子內以師承之異外緣不同民族之語言文化而聖教乃為離破之實奘譯宗輪論之四衆即一龍象衆二邊鄙衆三多聞衆四大德衆述記或釋之云即持律者名龍象衆尊者近執優波離之學徒也惟是凡夫諸破戒者名邊鄙衆大天之類也善持佛語諸經師等名多聞衆尊者慶喜阿難之學徒也深悟幽宗有道可稱名大德衆即阿毗達磨諸大論師尊者滿慈富樓那之學徒也此以師承分四衆與藏傳大似或譯龍象衆為大國衆與邊鄙衆相待尤富區域之色彩此四衆之別配四部確定其師承無關宏詣知當時有師承區域語言不同之四衆存在可矣四衆諍五事而分二部者以雖有四衆共諍其或贊或否不出兩大流也有部與犢子部否決之大衆及分別説部後之雪山部許此有明文飲光法藏等或亦許之贊同之有兩大流則可直視為初分大衆上座二部則非也自二而三三而四四衆諍五事形成兩大流之對峙有部犢子部被抑迦王同情於大衆及分別説系五事之唱自大天有部及犢子部乃咒詛之如惡魔也第二節大衆系末派之分裂自根本二部分流為十八部傳説多不同略舉其要者世友之異部宗輪論所説可簡曰有部傳文殊師利問經舍利弗問經藏傳之上座部説並大同錫蘭島史及大史等所載可簡曰南方分別説傳藏傳犢子系之正量部及大衆部各存一説可簡曰正量傳大衆傳四大派之傳説猶大略具見餘若藏傳調伏天及蓮華之説我國古三藏之説並遊説無稽不足信分別説傳大衆部初出雞胤一説二部又從雞胤出多聞説假二部後又從大衆出制多山本末共六部此與正量傳之本末六部同特正量傳名雞胤曰牛住及以制多山為牛住部所出而已有部傳謂大衆初出一説説出世雞胤三部又從大衆出多聞部説假部後又從大衆出説制多山北山西山三部比觀三傳則知有部傳於初分出者多説出世部後多北山西山者真諦舊譯缺西山文殊問經有東山而無西山藏傳之上座部説有東山西北無北山殊出沒不定分別説者謂佛滅二百年後又出雪山東山西山王山義成山西王山等六部則知本末六部據其初分而言後時末派之分要不出六山之外也大衆傳謂大衆本末凡八部即大衆牛住制多雪山東山西山王山義成山於六山不舉西王山於初期流出之學派獨遺一説説假多聞説出世四部轉不若上座三家所傳之一致其説出世等不久即式微歟轉化為大乘歟依分別説者所傳列表如下一説部説出世部有部傳等多此部大衆部雞胤部説假部説制多部多聞部雪山等六山部各傳增減不一末派分裂之時節因緣多難確指其為內積異見外受熏染經一期之醞釀藉某一現緣而分裂則大致同也茲依傳説而略辨之大衆部學者住王舍城北之央掘多羅以所見不同初分三部有好作概略之説者如以一音説一切法以一切法皆了義者別出一説部有説一切佛語皆是出世間者別立説出世部有以毗奈耶在調伏煩惱衣食住小事但求適宜可勿拘於舊習故頌曰隨宜覆身隨宜住處隨宜飲食疾斷煩惱又以達磨在即解成行以求證學者為己非為人也故頌曰出家為説法聰敏必驕慢須捨為説心正理正修行從彼部主種姓為名曰雞胤部雞胤部學者多聞精進勝餘部其學風頗與中國之禪者合菩提達磨從南天來疑多所承襲也探法律之本是能尊法律者然一切隨宜其勢亦不可長矣大衆學者理貴多聞行務要約故初期學派多見理精深行踐篤實未可以末派之濫而薄之次有阿羅漢祀皮衣者本外道仙人值佛出家能持佛法佛滅時於雪山中坐禪不覺佛元二百年從雪山來央掘多羅國見大衆部惟弘淺義乃具足誦出淺深之義於深義中有大乘云以所傳誦者多於大衆之舊聞曰多聞部次有大迦旃延佛之大弟子以論義見稱初住阿耨達池側入禪佛元二百年頃來摩訶羅陀國分別大衆傳之聖教此是假名説此是真實説此是俗諦此是真諦等即多聞而分別之故稱多聞分別部多聞部以無常苦等五音為出世今分別謂亦是世間假施設故亦曰説假部多聞説假二部並料簡舊説融合新知並以釋尊及門弟子從雪山來為分部之緣其機甚微其事則可畏何者釋尊遺教之湮沒者事之所必有然博采舊聞其取捨應如何其嚴掘發新知料簡舊説探釋尊之本懷推陳出新以覺世亦理所應爾然不應濫同佛説用為教證以阿毗達磨為佛説者同失古德不此之圖竟概歸諸釋尊及門弟子之所傳此風啓而淳源失昔之言釋尊及門弟子者今則言長壽天龍夜叉昔之言雪山者今則言天宮龍宮夜叉宮古塔鐵圍山馴致夢中之所見定中之所覺一一視為佛説相拒則部執紛然相攝則瓦玉雜糅佛弟子何可不深思之祀皮衣仙人與唱優波尼煞曇哲學者同名或謂此即暗示外學之濫入佛法云二百年滿已承大天之學者又多所分裂迦王之世大天創説五事大天住雞園於布薩時誦其五事之頌云餘所誘無知猶豫他令入道因聲故起是名真佛教波利西系之學者指為異端因此起諍有部等為大天系所抑乃譭其造三逆罪以五事邪見欺學衆如大毗婆沙論九十九卷説大天之學德毀譽不一其所傳五事亦解説或異姑略言之餘所誘者天魔能嬈阿羅漢令於夢中漏失銅鍱者作餘附與意謂天魔化作不淨以啓羅漢之疑也無知者阿羅漢有不染污無知不明事物之相猶豫者阿羅漢有處非處疑即疑事物之是否如此他令入者阿羅漢不能自覺要由師之開示而後能入道因聲故起者要痛感生死誠唱苦哉聖道乃得起銅鍱者謂證初果之聖者於定中唱言苦哉前之四者蓋以聲聞無學果為未盡説一切有部等以不染污無知處非處疑等阿羅漢已斷而猶現起不由他悟自覺自知大天則指以未斷不知此其所以諍也道因聲起藉語言以導悟心開音聲佛事之端亦非上座系所許大天受命傳教於摩醯沙慢陀羅今南印之賣索爾流衍於安達羅馱那羯磔迦今之海得拉巴承大天五事之學者又分為多部如在東山者名東山部在西山者名西山部並從所住得名西域記謂馱那羯磔迦一名大安達羅大城側之東山西山有二古寺鑿巖所成舊屬於大衆部應即東山部西山部之道場也覺音之論事釋稱東山西山王山義成山四部為安達羅學派其為大天系之後學甚明其分裂之緣有部傳謂二百年滿時有一出家外道捨邪歸正亦名大天於大衆部出家受具多聞精進居制多山與彼部僧重詳五事因茲乖諍分為三部銅鍱者以此為達磨阿育王時事不言大天已見前説島史謂以迦王時賊住比丘之爭乃有雪山等六部參詳衆説其事實亦約略可知大天乃迦王時之名德遊化南印數十年後學者以環境之熏染不無羼入達羅維荼神祕表徵之文化學不厭博立説務新大天系之學者本此大衆部之精神乃形成種種之派別有部歸之於大天蓋深惡大天之開其始也其以重詳五事起諍不可信設以共諍五事而分部如何東山西山等並以五事為善説迦王逝世不久南印諸國即宣告獨立而安達羅尤強佛元二百二十年且北上以攻摩竭陀大天學者之擴展分裂以在安達羅政權之所在地為近情銅鍱者以此為迦王及波吒釐子城事揆之事理有不可信者矣第三節上座系末派之分裂上座系末派之分異部宗輪論説經爾所時大衆系分裂之時一味和合三百年初有少乖諍或者據此謂上座部多耆年思想多保守乃得歷久而無異然銅鍱説二百年頃佛教已成十八部則是上座末派之分實與大衆系同時於迦王之世上座已有三系之分法藏飲光銅鍱一切有亦即於此時而顯然分化優婆毱多之後律分五部凡此皆與上座系之分裂有關也上座思想多尊舊聞此無可疑然即舊聞者而分別推衍之於律學尤甚較之大衆系無多讓也彼有部傳之説特自讚其所宗耳上座系末派之分衆傳不一尤以關於分別説系者為甚茲先舉示於下而後辨之説一切有飲光説轉説經化地法藏分別説傳上座法上犢子賢胄六城正量紅衣一切有分別説多説師長法藏正量傳上座雪山飲光法勝犢子大山賢道正量紅衣法藏分別説飲光化地大衆傳上座一切有説經正量法勝犢子賢道六城法上賢胄犢子正量密林山説一切有化地法藏有部傳上座部飲光雪山經量上座系末派之分衆傳之不一如此然若即衆傳而除其自尊所宗之成見則學派之分猶大略可見正量法勝法上賢道賢胄六城大山密林山四部從犢子部出衆傳所同犢子部則有部傳謂其從一切有部中分出餘傳則謂其直從上座部來此可解有部者素以上座之根本者自居宜其以弟兄行之犢子視為自宗之子派也經部師長説轉自有部中出衆傳無諍分別説傳説轉與説經為二部餘傳則視為一部詳説轉部之宗義與經部譬喻師異應有本末之分如分別説者説有部傳與正量傳謂本上座部轉名為雪山大衆與分別説傳則判為大衆之末派此以有部傳之所説為當化地護地多説飲光法藏紅衣銅鍱四部依大衆傳及正量傳系出分別説部此分別説部大衆傳謂其與一切有犢子為弟兄行且分出為早而正量傳則視為一切有之子派有部傳與分別説傳同唯化地飲光法藏三家無紅衣亦無分別説部之名化地等與有部之關係有部傳謂化地等為有部之支裔分別説傳則謂有部從化地部分出大衆傳則謂其同從上座部出相為弟兄傳説之紛亂至此而極諸傳中以大衆傳為當以彼於上座系學派之分流處身事外不以自尊所宗之成見羼入其中也於中分別説部之地位應先豫審定否則無從論之銅鍱者雖不言分別説部而實以分別説部自居有部傳之宗輪論雖無分別説部而大毗婆沙論則有之即分別論者是分別説與分別論其實一也婆沙之分別論者古今學者多不明其所屬以婆沙抨擊之或者乃以諸邪分別皆名毗婆闍婆提解之見宗輪論無分別論者之名見其立心性本淨等同大衆部或者乃以為即多聞分別部或以為大衆上座二部末派之合流不知即分別説部即波利之東系為化地等四部之本亦為分別説系學者之總名其初稱上座分別説者嘗與大衆及上座除分別説之餘鼎立而三蓋上座三大系之一也攝論無性釋云上座部中以有分聲亦説此識如是分別説部亦説此識名有分識此上座分別説部成唯識論卷三即作上座部經分別論者大乘成業論謂即赤銅鍱部經中建立有分識錫蘭傳來之清淨道論亦有有分識之文此實銅鍱部者彼以上座分別説部正統自居故或作上座或言分別論者或言銅鍱其實一也順正理論五十一卷之分別論者立業果已熟則無即飲光部婆沙分別論者之羅漢不退六十卷定無中有六十八卷隨眠異纏六十卷緣起無為二十卷有五法遍行十八卷等多與化地部合或者見分別論者之與大衆部多同想像其為大衆與上座末派之合流而不知法藏部之餘義多同大衆部執飲光部又餘義多同法藏部執論事及宗輪論所敘之化地部義同大衆系者十八九分別説系之化地等部其所以與大衆近者非必轉向大衆亦非合流正以學派初分大義猶近本不如後代所傳之甚也若解上座三分論知分別説或分別論者之地位則於各傳異説渙然可解有部傳以飲光法藏化地從有部分出此以有部者之以上座根本及正統自居也不言分別説而言雪山者以分別説部自銅鍱部之南移於錫蘭化地飲光法藏之離本宗而分化於大陸上座分別説部之本宗日就式微移化雪山因之轉名雪山部彼之用大天五事猶分別説者之舊學派初分大義多同逮後學派競興於此式微之舊宗或判為大衆或攝屬上座不復能詳也正量傳出入於大衆傳及有部傳於上座系中舉雪山又言分別説誤有部傳不言銅鍱者一在北印之山國一在南印之海南少所交涉而淡忘耳銅鍱者之分別説傳以上座分別者之正統自居上座與分別説及銅鍱視為一部之異名故但舉上座不復言分別説及銅鍱既自以為上座正統則以有部及犢子等為其屬派亦自尊所宗之通病正量傳與有部同源除以自宗之母部犢子部直承上座餘即隨有部説之知上座三分之説知分別説者之真則能不為三傳宗派成見之所拘見大衆部所傳為平允而最得其實也學派之分裂乃思想集團之分化雖有師承可談而實不僅一二人事其分裂者彼此仍多有所同即和合一派之中亦未嘗不蘊有異見此吾人所應深切記取者也跋耆系得勢於毗舍離而後知務廣博行貴要約之大衆精神益趨發揚波利系之先見者起而折衷之成分別説部分別説者學無常師理長為宗分別取捨而求其當也繼之而起者上座部除分別説之餘又裂為説一切有及犢子二部説三世及無為法皆有體與上座分別説及大衆系之過去未來無現在無為有者不同一切有本於佛説惟何謂一切有則彼此異解一分學者乃舉一切有以顯自異他名説一切有部然一切有宗不必即為發智婆沙師彼特依三世實有之義分別推衍而至於極端者舊以發智論作者迦旃延尼子出佛滅三百年乃以説一切有部為三百年始出非也自三大系再分經過不詳疑分別説系之分派為早即迦王所遣布教師之分化一方可謂即法藏等分部之始也有國師或云國王化地者通吠陀聲明之學出家得羅漢果間取吠陀及聲明以莊嚴佛法視同佛説信其説者從部主為名曰化地部又有法藏曇無德阿羅漢者自稱以目犍連為師習經律論咒菩薩五藏云漢譯法藏部之四分律但明經律論雜四藏然卷十一云字義者二人共誦不前不後阿羅波遮那阿羅波遮那乃文殊師利之陀羅尼四分律有之則法藏部之有明咒信不誣也信其所説者從部主為名名法藏部又有飲光羅漢者撰集佛語以破外道為一類對治煩惱為一類亦從部主得名名飲光部此三部化行大陸於聖典多有改作或融入吠陀而尊為佛説或仰推目連神通以證明咒之可信或以破外對內而別為撰集與大衆之多聞説假同其作風紅衣即銅鍱部由迦王子摩哂陀傳入錫蘭得國王之信奉改建眉伽園以居之大陸佛法之變化所受者少故今巴利語系之佛教較淳朴吾人亦得據之以想像分別説系之初型上座分別説者重律故每一分派即有一不同之律古傳律分五部即上座分別説系所出之飲光法藏化地三部及一切有摩訶僧祇律也次犢子系之分裂者犢子學舍利弗阿毗曇特重論議於本論之有所不足者各取經義補充之立義既異遂分四部賢阿羅漢之後學名曰賢胄以法上為部主名法上部正量言其法之正確密林山以住處得名四部中正量部之信者尤多儼以犢子之正統自居故後之言四派者每以正量代犢子也次從説一切有出説經者犢子與有部同源信守師承於阿毗達磨漸為偏頗之發達犢子亦以三世無為為實有者唯依蘊施設補特伽羅之假實及阿毗達磨之師承與説一切有者異逮犢子分離已説一切有中之一分學者不滿於論典之偏重乃宣稱以阿難為師以經為量成説經部亦名説轉部以彼立勝義補特伽羅自此世轉至後世與犢子之不可説我大同此説轉之經量成立亦早立義多同説一切有及犢子如以五根為世第一法即其一例宗輪論之所説者即此大毗婆沙論亦嘗析持經及譬喻者為二佛元三世紀之初一切有部中迦旃延尼子於至那僕底東造發智論阿毗達磨之面目一新其貫通舊説演繹新知頗多善巧與之前後者有鳩摩羅陀童受住健陀羅西步説轉部之芳塵亦以經為量作喻鬘論等因得經部譬喻師之名西域記傳鳩摩羅陀曾受迦王之敬禮後朅盤陀國在蔥嶺之東南境王突以兵入健陀羅迎之移住朅盤陀則亦佛元二三世紀間之大德也法顯傳佛弟子之沿印度河上流由烏萇國度險道以入蔥嶺而東來者在佛元三百年迦王之世雖或未能越崇山宏大法於東北之大陸然二三世紀之間已通蔥嶺之道佛教之流布東方固不待迦膩色迦王之世也第四節五部十八部舊傳律分五部而義淨獨闢之曰不聞西土別舉大衆説一切有正量上座四宗以正量當犢子而舉四宗固後期佛教之常談第據此以斥五部則失之傳五部者不一大集經以曇摩毱多薩婆帝婆迦葉毗彌沙塞婆蹉富囉為五部次曰廣博遍覽五部經書名為摩訶僧祇則是以五部為一枝以摩訶僧祇為綜貫遍達者其為大衆部之傳説無疑薩婆多師資傳以曇無德摩訶僧祇彌沙塞迦葉維犢子為五部有大衆而無薩婆多與大集經異其故亦可知蓋薩婆多學者以迦葉至優婆毱多為自宗之師承優婆毱多後而律分五部則五部為末而薩婆多為本此與大衆者之自尊所宗初無二致僧祇律私記舍利弗問經大比丘三千威儀佛本行集經又別傳一説以曇無德彌沙塞迦葉遺薩婆多摩訶僧祇為五部獨缺犢子僧祇律私記以大衆律為舊來所常用舍利弗問經譽摩訶僧祇其味純正並大衆部之古説佛本行集經屬法藏部律分五部似以此説為能見古意蓋分別説之上座初與大衆及餘上座鼎立為三分別説者重律又出化地法藏飲光三家律其銅鍱部之傳於海南者與大陸之關係不深故傳者略之大衆部律務要略雖分派而律唯一餘上座又分説一切有及犢子二派犢子重論義疑初與説一切有者同用一律於分別説三家加大衆一切有為五部為大陸佛教律典之初分逮後犢子別成一律即成六家大衆及薩婆多學者習聞五部之説乃以犢子入五部中而自居於根本綜貫之位古今未見五六之別乃疑惑於大衆及犢子之間舊傳十八部之説各傳共許而所説不同玄奘承後期之説以十八部為末派上座大衆為根本合於文殊問經十八及本二之説真諦支離其辭除大衆而言十八文殊問經無説假部依錫蘭所傳之十八軌範説合上座大衆於十八部非二十也若加後起之學派其類實多藏傳各説一一求合於十八而亦彼此不定總之佛教演為十八部於佛元二三世紀間為衆所周知之事實逮學派更多興廢不一言十八者多無從確指或加本二成二十也其最初者究何所指除衆傳一致者外似難得決定之第七章阿毗達磨之發達第一節優波提舍摩呾理迦與阿毗達磨佛學之發展阿毗達磨之隆盛實有以致之蓋各承師説競為論議思想乃日趨分化也佛之世釋尊以義解説其法者有之標要而大弟子為之解説者有之佛弟子之共為論議而組織者有之如中阿含經根本分別品等即九部經中優波提舍論議之類其中即有佛説者在論議第一之摩訶迦旃延智慧第一之舍利弗尤多用力於此宜後世之言論典者仰尊二氏為師宗也現存巴利語雜藏之尼涕娑義釋亦是其類佛滅後論典漸出與經律並立而三者有摩呾理迦與阿毗達磨此二者以傳説之紛歧辨別甚難智論謂佛世有持摩得勒迦比丘無阿毗曇瑜伽論亦以摩呾理迦為如來三種言音之一然此不獨阿毗達磨論師所不許即依攝事分毗尼母等而觀之則所謂摩呾理迦亦一家之師説非佛世之制瑜伽以聲聞隨轉理門列阿毗達磨於三藏之次世親釋攝論則謂説阿毗達磨即顯論是大乘藏攝今謂摩呾理迦本母依經立論釋難句明教意通血脈抉發其宗要為法義之所本阿毗達磨分別法依經作論分別法門之自性共相抉擇諸法之相攝相應相生摩呾理迦即一一經而握其宗要阿毗達磨即一一法而窮其深廣二者初非隔別佛世之優波提舍兼此二佛後初出之論典亦多兼及逮阿毗達磨大盛推衍分別或流於枝漫於是一分學者乃宗經為量撥阿毗達磨而意存摩呾理迦為佛説實則二者並多少淵源於佛説演繹變化於佛後未可輕為是非也阿毗達磨有廣略二義此可於智論知之廣則阿毗曇藏攝一切論典略則唯是三門中之毗曇門也原阿毗達磨之名阿含已有之然究其所指則既非三藏之一亦非是無漏慧實以阿毗稱美達磨之極甚深玄者古人以增上義讚歎義超越廣大無比之長義釋阿毗頗得其實佛法唯達磨毗奈耶之二故佛亦嘗以阿毗達磨阿毗毗奈耶形容法律之深玄者此釋阿毗達磨者所應知也後世之阿毗達磨論師以無漏慧為阿毗達磨自性者以阿毗之毗有明了分別義聲論者謂毗謂抉擇上座分別説系自稱分別説者梵語毗婆闍婆提錫蘭傳有分別論原語毗崩伽即毗婆闍其分別即阿毗之毗此阿毗之明了分別有直接親切意如言直下領會洞然明白故古人又釋阿毗達磨為對法照法現法此分別又有明晰條理意如言文理密察故古又釋之為分別法抉擇法若以明鏡當前幽微畢顯為喻頗切阿毗之義也上座稱分別説者不特取捨於東西二系實即阿毗達磨者之異名惟毗之分別或又引申為推度妄計而後説一切有部自稱應理論者而彈分別論者攝論釋即釋阿毗為無分別阿毗達磨者即分別論者世人忘之久矣諸論議師或直觀法相或抉擇分別法相就其論理體悟之所得者師資授受以名句文身而分別安布之以其分別法門有合於阿毗達磨之含義乃即以阿毗達磨為論典之名終於與經律並峙而為三藏之一也第二節阿毗達磨之流派及發展阿毗達磨雖隨學派之分裂而日多然惟特重阿毗達磨之説一切有部為最繁餘則寥寥可指當佛法之初分二部即有二種論典之不同在大衆部為迦旃延之鞞勒如智論敘各家之論典時謂佛世之大迦旃延造鞞勒後世得道人重為刪略大行於南印分別功德論謂迦旃延子撰集衆經抄撮要慧呈佛印可故名大法即阿毗達磨藏南印乃大衆部發揚之區分別功德論是大衆部之論鞞勒之為大衆部根本論典確然無疑上座部用舍利弗阿毗達磨然自上座三分而後其原本已無從確指大抵依同一本論而相為出入智論謂舍利弗阿毗曇犢子道人等誦習之宗輪論述記傳舊解正量等四部釋舍利弗阿毗曇稍異則犢子系本末五部並用舍利弗阿毗曇也四分律及毗尼母論謂原始結集之論藏為有問無問攝相應處所五分此與現存舍利弗毗曇之品目合四分律是法藏部律則知法藏部亦用此論現存之舍利弗毗曇立無中有心性本淨九無為等與婆沙之分別論者多同可知本論不但為法藏部所宗化地飲光等分別説系無不仰此論為宗本也今存之舍利弗毗曇多言五道無我與犢子系不盡合與分別説系近二系並用舍利弗毗曇而現存者乃大陸分別説系之所誦也其分別説系之南傳錫蘭者僻處海南另為獨特之發展有法聚分別界説雙對發趣人施設論事之七論近人勘七論中較古之分別論等見其組織形式與舍利弗阿毗曇有類似者説一切有系以六分阿毗曇為本然此為發智婆沙學者一偏之見六分既但為發智婆沙學者所宗而六分以外更別有極重要之論典也即以六分最古之法蘊足論而言與錫蘭傳之法聚同名其論題與舍利弗阿毗曇之問分非問分十同六七三科之以處為第一尤見其一致此法蘊足論稱友俱舍釋及西藏傳謂是舍利弗造婆沙尊舍利弗為佛世大論師可見其亦以舍利弗毗曇為本而出入之也説一切有系六分毗曇海南系七部毗曇上座舍利弗毗曇系分別説系大陸系舍利弗毗曇犢子系大衆迦旃延鞞勒系鞞勒大衆系之阿毗達磨以鞞勒此云篋藏為根本智論以之為三種法門小乘三系之一其解經有隨相門對治門等在舉一反三要約易見不若上座毗曇之推衍分別又謂不解般若入鞞勒門則墮有無見中其立論之備明有無與説一切有之毗曇門及分別説系之空門異然有無難解傳説摩訶迦旃延開宗之説假部以聖道為福力所引顯而體常不壞世間法虛妄無實出世法滅道真常實有此其所以名有無歟大衆系之論典見於記載者僅分別功德論及覺取之集真論餘無所聞可疑或謂大衆部等本不認佛説有不了義經解經之阿毗達磨無關輕重其籍自鮮非篤論也詳大衆部許有雜藏文義非一多於三藏部帙之龐大蓋不僅博采異聞已也法律並出弟子之持誦傳來以三法印及佛語具三相為準則入佛法相者以佛説視之可也大衆部學者以體悟論理之所得者或依傍古説或托拾遺聞或融攝世學大抵編集為經律之體裁以行世大衆系唱佛身無漏佛壽無邊際心性本淨道體真常吾人固嘗廣讀之矣大衆系論師及論典之鮮聞於世實以此耳分別説系之在大陸者與大衆系之作風同故論典鮮出犢子系學務通俗於舍利弗毗曇多少改作而不若有部之偏重漢譯有三彌底正量論傳瞿波作聖教要實論要皆斤斤於有我無我之辨未及其餘舊傳正法念處經龐然巨製云是正量部所誦其內容多長壽天之傳聞古佛説則亦受大衆分別説系之化也銅鍱部僻處海南受大陸佛教之影響不多故雜藏猶未大雜説一切有部不立雜藏佛弟子所作多入於論藏於阿毗達磨特多製作雖尊發智為佛説推衍頗嫌支離而佛説之法賴以較淨説一切有部之迦濕彌羅師以法蘊等六論為六足論法蘊足論奘傳目犍連作稱友之俱舍論釋謂是舍利弗作凡二十一品品釋一經與舍利弗毗曇之問分非問分大同有部之言結集者輒舉近事五戒為論藏即指此論六足論中此為最古次集異門足論釋長含之集異門經奘傳以經出舍利弗所集因以論為舍利弗造稱友則以為拘絺羅作文義明淨瑜伽論聞所成地之內明即演此成之次施設足論智論傳從樓炭經長含之起世因本經出目犍連造與稱友釋同奘傳則作迦旃延造本論初惟分別世間藏譯者有三品而未盡疑後人所續也起世因本經巴利文之長含中缺俱舍十一云世施設中説舊譯即作分別世經説婆沙引此又作如施設論説經之內容與立世阿毗曇大同出後人編集故或經或論不定巴利本無此則應出迦王之後施設足論據此而分別之出世應更遲傳説之目連或迦旃延造未可信也次有識身足論提婆設摩造本論初品目乾連蘊破過未無體似對目犍連子帝須而發次品補特伽羅蘊破犢子不可説我而歸於六識與帝須論事初章之破我相似提婆設摩應後於帝須以出佛元三世紀為當更後品類足論四品是世友作四品是迦濕彌羅論師作頗為學者所重世友是佛滅五世紀人則本論之出世遲矣次界身足論以十大地為本事而諸門分別之奘傳亦世友作稱友則謂是圓滿造此上六論性質既不一時代亦殊以婆沙師尊發智為本論身以六論為輔翼足而其名大著或者即以此六論乃有部初期之阿毗達磨先於發智心論誤矣詳説一切有之論典同源於舍利弗阿毗曇以法蘊集異門論為早出其後即演化為三大流一佛元三世紀至那僕底之迦旃延尼子作發智論於舊師之説多所裁正揚三世實有之宗分別諸法之自相極於微茫不以三科為本事常以色心心所心不相應行而辨其攝相應成就極繁衍之能事凡八蘊四十四納息次第雜亂不以組織見長繼之而起者如世友之品類足論尊婆須密集論並承其軌則品目亦倣之二瞿沙尊者妙音西域記傳與迦王同世源舍利弗毗曇而作甘露味毗曇多存古迹並依經文作之別有生智論未詳吐火羅國之法勝論師依甘露味毗曇而編次之末附論品一一以頌文標舉作阿毗曇心論凡十品以組織見長婆沙論所指之西方尊者外國諸師並此論之學者也為之釋者不少有四卷之極略本有優婆扇多之八千頌本一師之萬二千頌本古世親之六千頌本與迦濕彌羅之發智系隱然東西並峙焉法勝之心論古人誤以為婆沙綱要乃謂法勝五百年或七百年人焦鏡序謂出秦漢之間近之三與迦旃延妙音相先後者有犍陀羅之譬喻尊者鳩摩羅陀童受作喻鬘論等宗經為量不以發智論為本於佛説特唱無為無體過未無體不相應行無實夢影像化無實等以抗發智論三世無為實有之偏有大德覺天尊者並承其遺意如大德之諸心心所是思差別異生無有斷隨眠義諸所有色皆五識身所依所緣化非實有等覺天之色惟大種心所即心等並與譬喻義同經部非無論但不以為佛説不以為權證此三者皆説一切有系之分化而譬喻系則近於大衆分別説系佛元六世紀初發智系學者集大衆造毗婆沙論以釋發智羅列三系之説而一一詳正之近世友説而亦多不同妙音説猶有取捨於大德覺天譬喻尊者之説概加破斥態度專橫獨尊發智而以六論助成之婆沙出而譬喻師之分化日深發智系與心論系亦不無諍論於是心論系之學者達磨多羅出佛元七世紀不以譬喻者之離宗為然亦以婆沙之繁廣瑣碎為難乃取婆沙之精義增補心論而成雜心論以溝通東西二系存有部之真凡六百頌十一品多心論之舊而增一擇品惟時大乘之説日昌室利邏多著經部毗婆沙經部之學日盛有部學之弱點已無可諱飾有部學者猶存自尊之故習守舊而莫之能改世親論師乃依雜心論而著俱舍論宗有部而取經部義以格量之有部之衆賢論師不忍己宗之被破作順正理論以救之此當別為論述也第三節阿毗達磨之組織明阿毗達磨之組織可窺其性質之一般即諸論遞演之迹亦得因以見之上座毗曇以舍利弗毗曇為近古法蘊足論亦其一本凡五分可析為二類一分別諸法之性相有分別法相者依一法而分別其體性以諸門問答以明其共相即問分凡十品有解説經文者即非問分之第五緣起品第六念處品第七正斷品第八神足品第九禪定品有隨類總集者即非問分之餘六品釋經及類集者並無諸門問答故合為非問分二分別諸法之關係又三明諸法之自性相攝即攝分明諸法之自他相應即相應分明諸法之因緣相生即緒分而有多品遍品因品總明十緣十因名色集故識集立名色品喜愛集則色集立結品觸集則受想行識集立觸品隨業感善惡報立行品心尊心導心垢心淨立心品餘有十不善業道品十善業道品解説經文定品則隨類總集與非問分之體裁同不知何以列於諸分之末也又舍利弗毗曇之問非問分隨類總集之六品實後代論典之初型餘十五品即有十二論題同法蘊足論然法蘊足論偏於解經不足以賅阿毗達磨以意論之原始之阿毗達磨並探阿含而為之分別解説次以一經為主而類集之問與非問似出有先後而難確指若糅合之則諸論之原型宛然見矣分別性相問分分別諸法性相解説經文隨類總集非問分舍利弗阿毗曇之組織自性相攝攝分分別諸法關係自他相應相應分因緣相生緒分且舉甘露味毗曇系諸論次以比觀前論甘露味論凡十六品法勝即依之而作阿毗曇心論以甘露味之第五陰持入品為界品以第六行品為行品以第四業品為業品以第九結使禪智品為使品以第十三十七無漏人品為賢聖品以第十一智品為智品以第十二禪定品十三雜定品為定品此七品之內容幾無一不合以甘露味毗曇前十五品之餘七品及第十雜品之前分為修多羅品以雜品之後分為雜品其內容次第亦十同八九以是或謂阿毗曇心論之前七品明經義而修多羅品分別其經者非也蓋甘露味毗曇之前十五品並依經而成論心論抽出其中之八品合為七品次隨次而明其餘因仍以修多羅名之心論第十品之論品則論師增附之法救之雜心論組織內容大同惟取婆沙義以莊嚴之為異別立擇品於雜品之後詳其義趣則即演繹抉擇修多羅品以成之世親之俱舍論出與甘露味之原型轉遠甘露味第一之布施持戒品俱舍入之於業品第二界道品第三住食生品第七因緣種品俱舍依之別立世間品第八之淨根品列於行品之首因改行品為根品第十四之三十七道品第十五之四諦品入於賢聖品因之心論之修多羅品即失其存在餘雜品擇品論品散攝其義入諸品中俱舍精練為八品世但知其承心論雜心而來而不知本於甘露味毗曇也即甘露味而溯其源以舍利弗毗曇之問非問分勘之無不相合惟缺第十六之雜品以此非修多羅之舊而論師附益之又缺第六行品細尋之恍然知行品之即相應分緒分也蓋舍利弗毗曇以問非問之二十一品為法本次以攝相應緒分明其關係甘露味毗曇則獨取陰入界三科為本事於陰持入品之末明攝法如心論之諸法離他性頌即當舍利弗毗曇之攝分次行品初明不相應行之四相心相應行之十大地等及色法論其相伴共成即相應分次明四緣六因之總又明善不善無記心所攝為三處以成行即緒分其開合之迹論典之源不亦灼然可見乎心論等之前七品除行品餘並與非問分之隨類總集之六品全合則尤為明確無疑者茲列表示之舍利弗毗曇甘露味毗曇阿毗曇心論問一入問二界非問一界總集五陰持入一界品末有相攝當攝分問三陰相應分緒分與行品相當六行二行品非問二業總集四業三業品二界道八經二界三住食生又諦雜品之一分八經三識住衆生居八經九四預又八經四之一分非問三人總集十三十七無漏人又諦雜品之少分五賢聖品八經六果道證淨非問四智總集十一智六智品問四諦十五四諦八經五諦非問五緣起七緣起種八經四十二因緣六界問五根八淨根八經十二根問六覺諦之四聖種非問六念處十四三十七品八經八如意足正斷念處聖種三十七覺品非問七正斷非問八神足非問九禪定十二禪定七定品非問十道總集十三雜定八經十三三昧八經七四修定問七不善根非問十一煩惱總集九結使禪智四使品問八善根問九大問十五戒一施戒八經一施戒修十五諦之餘十六雜上八經十一顛倒見八經十三識所識等十六雜下九雜品十論品次以舍利弗毗曇而觀發智論則其間亦不乏密接之聯絡發智凡八蘊以雜蘊為初此與甘露等之後出雜品適相反諸論次第每顛倒如問分以五戒為終而法蘊等舉以為始實無何意義可言也結蘊智蘊業蘊定蘊出非問分二十二根法蘊論有經甘露味論有諸門問答然不以為類聚發智以二十二根為一蘊亦唯於舍利弗毗曇之問分見之後之俱舍即依此而改行品為根品問分以四大為第九品而諸論無文發智以大為一蘊蓋亦本此見蘊舍利弗毗曇缺見甘露味論等最後之雜品發智亦即以之為殿發智之於舍利弗毗曇有更近於心論等者在心論以三科為本事廁行品之相應因緣相生於後非毗曇之舊發智論於結智等一一法門分別其自相共相又以相攝相應成就因緣果相生廣辨之相應乃相伴共有之義因以有此亦有彼耶等作四句分別約彼此三世界地得失凡聖而論之乃極繁廣成就非舍利弗毗曇所重此待有部執法為實有乃為毗曇要門辨相生則為緣從緣得果等也凡此攝相應成就因緣果自相共相遍於一切法門舍利弗毗曇之意正同特未為推衍而已即此以論世友之集論品目極類發智而雜亂過之第七之更樂觸第八之結使第九之行三門之連類而及則舍利弗毗曇緒分之制也發智與世友集論範圍遠廣於毗曇之舊分別精詳而終不無雜亂之感也第八章學派思想泛論第一節思想分化之原因僧伽以和合為本事既六和理則共證顧何為佛後百年而異説蜂起耶其原因固甚復雜也師承有異尊古與出新有異文字語言有異上來已略及之今請更言其餘聖典之存異也如佛説三界有無色界似有情可有無色者然緣起遍三界而名色六處不離有情依五蘊六界立不言有無色者佛弟子取捨其間莫不融通異説而無色界之有色與無色成諍又如戒定慧三學佛或當機抑揚學者從而輕重之雖無不言三學而精神則異諸如此類不勝枚舉和合必存異因其所異而異之學派乃繁興性習之各異也多聞者與多聞者俱持律神通論議者與論議者俱佛顧而樂之同氣相感此合彼離事之常也傳説之紛歧也因緣譬喻本生本事未曾有凡此佛及弟子之事迹諸天鬼畜之事迹甚至世俗之傳説佛弟子每失之未能甄別不問其為譬喻寓言神話為史實為妄説概視為史實而求其不違於教理傳説既新新不窮教法亦變化而莫可究詰觀點之不盡同也所依之教典所處理之問題同以觀點之異論法之異而結論亦異此如同一物象可攝為不同之影片作不同之體究設得其當異説不妨皆是正不必執一以非餘然一失其正並存適足以為病學者出入於貫攝簡別之間離合錯綜學派日多時地之有異也時者釋尊以平淡篤實為教一掃空談與無義之行佛元百年僧衆猶仍身體力行之舊逮迦王御世佛教並政力而隆盛為學漸重外化內外之諍辨日多論理説明之要求日亟理論乃日趨發達也如迦王廣建塔婆而供養塔婆之是否能得大福遂成諍論此則與時勢有關者地則環境文化之熏染西北山地朴實而接觸希臘波斯之文化強南印富想像其文化融神祕藝術以為一恆河流域思想自由夙為異學爭鳴之場佛教受環境之熏染不無受其影響焉僧制之崇高也佛教僧團之制以小區域為獨立之單位界於此中住者事事依法事事從衆來不拒犯罪者例外而去不留無彼此之分治之以衆化之以德齊之以法均之以利自他共處之制蔑以加矣釋沙門融世界僧伽為一體而無權力統一之組織僅有文化道德即精神之聯繫此崇高之僧制適宜於學德崇高之理智生活中人以下似不及如諍論而稍涉感情或雙方並有僧衆為之支持或一方利用軍政者之權力輒無法使其合一佛教常有諍論數年而不得和合説戒者亦由於此兼之佛教重自由德化不願勉為之合其傳統精神判是非不如得諒解苦合不如樂離此僧也彼僧也如析金杖而分分皆金學派思想之分化乃至以一頌之微而分為四部實與此制有關此今之言僧制者不可不知也第二節聖德觀學派思想之分化發展如為一系一派之別別論述不如以論題為中心而觀各派離合之為當也請先言佛陀釋尊正覺緣起之寂滅性即人身而成佛智極悲深固有異於聲聞弟子而況凡夫然衣食起居少壯衰老以目視以耳聞佛在人間而猶是人也即人而成佛智極悲深亦唯實現於人間而後知之即生身而體法身法身不離於生身融然無礙佛固未嘗作隔別之説佛弟子之在佛世面對佛陀曾無異説然所見有淺深不無偏以見佛相好身為見佛者釋尊之成佛不以種族相好出家之生身實以其正覺法性是則依佛所説而行悟佛所悟乃真見佛之所以為佛亦即法身常在世間矣須菩提觀性空而見佛初果名初得法身見緣起即見法見法即見佛此則如實之説佛世之舊也自雙林入滅遺教僅存佛所覺法即佛覺之而成佛者賴文字而傳文字因得法身之名天竺人嘗謂生身雖滅法身尚存故以緣起偈內塔中供養名之為法身塔去佛漸遠學者不睹金色之身沖淡簡實之法身聖教實理難以滿大衆渴仰孺慕之情尊敬之不已而如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際之説起即以生滅人間之釋尊為現迹而佛陀實為常在遍在全知全能之永存此則上座系學者所不敢苟同也大衆系於佛身之不為世法所染釋為無一而不清淨無非出世無非無漏故謂佛以一音遍説一切法法無不了義念念遍知一切法佛無睡夢度有情之宏願從無厭足也然佛陀觀之崇高決非純為大衆系及大陸分別説系之想像成之蓋於佛元百年間植其根蘗於聖典百年後乃新芽怒茁焉所謂潛植其根蘗者即因緣本生譬喻等尤以本生談為甚本生談等經百年來之傳説或渲染失實然其源自佛説則諸宗共信釋尊於三阿僧祇劫中行大行難行之菩薩道而今乃成佛然無一處非修道之場無一有情而不思濟拔如何成佛偏於此土有情之苦痛方深釋尊何先自入滅無一物不施如何有空鉢馬麥之報歷劫不殺而多所濟拔如何年僅八十衰病相纏不與一有情為怨如何有魔外之妨常得宿命智見燃燈佛已自知作佛如何從外道修無義之行若以本生談等為史實衡以教理則人間釋尊為本體之垂化非佛陀之實以其視為想像毋寧視為必至之勢反觀上座系之銅鍱説一切有等多持舊説然以信受本生談等即已隱植其義不能抉擇闡發菩薩之實道徒知偏執聲聞宜其終無以抑大衆之新潮坐視其狂瀾之泛溢甚或轉而同化也大衆學者所見之佛陀既為法身常在遍在全知全能之極果自非凡常所可一蹴而躋於是或謂入第二僧祇即名聖者或謂值迦葉時得決定道得決定道者即不起欲想恚想害想願生惡趣即隨意能往化現同類之身而濟拔之此以得決定已入聖者位智齊阿羅漢而悲願勝之初得決定者尚爾況後身菩薩乎菩薩之因地既歷長期之聖位十地等階位亦即依此建立也説一切有系等以佛身為有漏一念智不遍知威力有邊際佛陀觀既不若大衆學者所説之崇高故最後身菩薩猶是異生諸結未斷猶起三想最後身且爾況以前乎此則以菩薩為悲願勝於聲聞而智證則不及與大衆系異也大衆分別説系不徒深化佛菩薩之聖格即聲聞之阿羅漢果亦主決定不退與説一切有及犢子系異既以菩薩入聖位已能隨願往生惡趣則惡趣之權實難明以聲聞之證預流果者可退諸預流者造一切惡唯除無間則不得以行為而判凡聖阿羅漢為餘所誘猶有無知疑惑因他令入則自亦不知其為凡聖此龍蛇混雜凡聖交參之精神大衆分別説系取之説一切有及犢子系則不然菩薩得忍以去不生惡道預流決定不退聖者有自證智不復於四諦三寶起疑嚴凡聖之別不容稍事混濫也如來斷障淨聲聞弟子有餘習此事實也大衆系仰推如來以聲聞不斷餘習而抑之漸開抑小揚大之風聲聞不斷之餘習演化為無明習地與所知障而佛菩薩所斷之不共障因之成立上座説一切有系等不然阿羅漢之餘習斷而猶現行非不斷也總上所述以觀之大衆系之於聖格理想則崇高行踐則寬容輕聲聞而貴菩薩思想多所啓發而言不及實於清淨大衆律制之保持勢有所難固不待大乘與密教之起也第三節無我無常之世間世間即空諸行之緣起無明緣行乃至生緣老死也佛嘗分別緣起及緣生二者雖同指十二支之因果而以緣起為若佛出世若不出世法性法住法界常住大衆及分別説系以緣起為無為法緣生為有為法説一切有及犢子系則緣起亦是有為約因果決定義説法性法住非無為常住義也緣起論因緣生論果是二者之別大衆系等以緣起為無為蓋就因果鉤鎖之必然而推論其所以必然必有一常住不變之理則在因果生滅之必然無非循此理則之必然而發現而已緣起無為頗近柏拉圖之理型彼以概念所知之理型為有為實體知覺所知之事物為成為生滅與緣起是無為不變實體緣生是有為變異現象大同順此一敘無為法有為是造作生滅法無為是本然不生滅法此二攝一切盡説一切有系及犢子系唯三無為一擇滅諸有漏法以智慧簡擇之力離煩惱繫縛而得滅此滅雖就所滅言而意指不生滅之實體二非擇滅則有為法之不復現起非慧力之簡擇使然但由緣闕如此時本有鼻根嗅香引發鼻識之可能然以專心色境此鼻識不生一切法在生滅中此鼻識即永無現起之可能以後鼻識生時迥非此時可起之舊矣三虛空不藉因緣本自存在之無礙性而為有礙色法之於中生滅者與近人之説以太大同惟此虛空亦有不許其為無為者大衆分別説系立九無為而三説互異大衆等四部及化地部於三無為及緣起無為外立聖道支性無為八正道之能離染而脫生死稱古仙人之道亦應有其必然之理性常住不變者在化地部又立善法真如不善法真如無記法真如三者蓋謂善之所以善不善之所以不善並有真實不變之理性三性之現象雖差別而三性之真實不變易性是善又立不動指四禪以上離苦樂而顯之不動體大衆部等不立三性及不動而立空無邊處識無邊處無所有處非想非非想處四無為空無邊之空即虛空厭色界質礙物之粗障欣虛空之淨妙無邊空觀成斷生色之煩惱離色界質礙而顯者即無為為有情心行之所依處然此心所依事是極微細之色法故曰無色界有色餘識無邊處等三例此可知舍利弗毗曇除擇非擇緣起四空處而外別立決定及法住為九與安達羅學派同總諸家之無為説而觀之則緣起支性法住三性真如皆即一切法之必然而以此必然為形上之實在即賦生滅以形而上之根據也不動及四空處則依心境之寂靜而建立者以是説一切有系為朴素之實在論者大衆及分別説系則為形而上之實在論者其思想固條然異也上座及大衆之初多以無為為實在者逮經量部興立無為假名説以消極之觀念出之與實在論者相頡頏諸法實相之為真空為妙有可謂以此為濫觴也佛教所重在擇滅即涅槃無為在以慧力而得不生此固可以有無論之乎即一切生滅有為法而論之有有無假實之諍説一切有及犢子系立三世實有剎那生滅頃之現在法實有未來法已有而作用未生過去法猶有而作用已滅此即現實之存在以類過未之非無也大衆及分別説系則不然唯現在實有而過未非實説經部同用二世無義而解説異此即總有三説説一切有及犢子系立體用義法體本然恆爾約即體之用未生正住已滅而説為三世生滅約法體所起之引生自果作用言非謂諸法先無後有先有後無也大衆及分別説系立理事義染則緣起淨者道支理性無為超三世而恆在以事緣之引發乃據理成事事唯現在論其曾有當有而説為過未非離現在而有過未之別體也説經部立種現義不離現在諸行而有能生自果之功能性名曰種子種子不離現在之諸行約酬前引後乃説為過未耳體用義生滅用依恆存之法體理事義生滅事依常寂之理則種現義於理為長而未盡彼過未法固不離現有現在實亦不離過未也於現在有中軍林等假名無實諸宗所共佛以五蘊十二處十八界攝一切法説一切有及犢子系即計之為真實大衆系之説假部以十二處為非實上座系之説經部以蘊處為假有以處為假者謂色等六外處眼等六內處約能為六識之所依所緣而建立然一一極微不成所依所緣之用和合則非實此六境非實如苦樂隨心而不同水火隨報而各別雖經部等猶計十八界之自體為真實然即此而引申之開境無識有之先河其以蘊為假者蘊是和合聚集義集合故非實即此義而極論之凡有必因緣和合生即無一法而非假名舊傳大衆系之一説部即曾作此説佛教本為常識之實在論者於正觀則唯性空之諸行學派初興多明實有逮思辨稍深色法極於微塵心法極於剎那即一一法而論其和合大用為有無假實所困而莫通積長期之思辨逮三世如幻諸法性空之説張乃圓見佛意無復礙滯也一切有為法略分色心非色非心之三聚色法中佛説四大及四大造説一切有系等以四大及所造之根塵為各別實有經部師則説唯大無造心法中佛説心及心所説一切有等與心王俱時相應別有心所法經部譬喻師則説心所即是心之差別非色心法即不相應行如生滅三相等説一切有及犢子系並視為實有大衆系等則説為不即不離色心之功能無別實體凡此有無之辨皆學派諍論所在也有情為本之世間即惑業苦三之緣起緣起法生滅無常無一恆存不變之自我於前後生滅之間究以何而建立自作自受耶於生命之洪流發現其前後一貫性誠為必要佛説有情依名色五蘊六界六處立不偏於色不偏於心色心和合而情識則為其核心説一切有及犢子系依有執受之蘊界處和合相續施設有情以之建立業果前後之移轉就中説一切有部以法體一一恆住自性不可説有我作用則剎那生滅亦無少法能從前世轉至後世然依此生滅用之和合相續説有世俗假名補特伽羅説有移轉此假我之前後嗣續如波波相次而遠望似一也犢子系立不可説我補特伽羅非即蘊離蘊依蘊處界假施設名此補特伽羅依蘊處界施設即體起用用不離體故不可説即蘊非蘊不可説是假是實不可説常住亦非前後不相及依此補特伽羅可説從前世至後世從凡夫至聖人此如波浪之前後起滅而彼此之水性恆一味也經量部之本計説轉立法體常住之一味蘊作用生滅之根邊蘊即此二者之和合説有勝義補特伽羅依此可説有移轉與犢子之説同無常無我佛教之常談而犢子等六部不如外道之常我而建立非剎那無常之真我以成立生命之一貫業果之連繫然印度外道之神我與此不即有為不離有為之真我究有何等之差別學者正不可忽視之也大衆及分別説系異於是依心心所而立有情唱一心相續之説此復與心性本淨有關彼以心之或善或惡有漏無漏眼識乃至意識雖極不同而心之能覺了性無別即於心心所之相續演化中發現覺了性內在之常一與所謂動中之靜同此心為貪瞋癡所染有漏而繫縛生死離煩惱時心性出纏而解脫以心是一名一有情以心是一善惡業可積集故曰無一有情而無心者其偏依心心所法雖異於犢子而直覺內在之統一則同宜其思想於大乘真常唯心論中合流為一也經部譬喻師取捨其間本一切有系假名我之見而立於一心故曰離思無異熟因離受無異熟果舉業果而安立於依心之假名我虛妄唯識論之前身也此是學派之本義其後一心論者漸分化為本末之二心大衆部離六識而別立根本識與意界是常論者合分別説系之銅鍱即六識之流而探其意識之根呼為有分經量末計於六識種種心外別立集起心自無常以至真常自間斷至相續自粗顯至深細雖有所不同而立六識外之細心以解説業果之相續則一也於生命相續流中內而身心外而器界呈無限差別之相此粗顯間斷之差別如波浪起滅未來可起過去非都無應有深細相續者在為差別法生起之所依也先論惑業吾人善心現行時無煩惱而煩惱未斷未斷者何耶説一切有部以煩惱纏即隨眠是心所心相應行煩惱不起而未斷者以煩惱之得隨行人未離耳大衆犢子及分別説系則不然現行纏雖不起別有非心非心所心不相應行之隨眠在隨眠因纏而增長為現纏作因隨眠猶在故説煩惱未斷身語意業生而即滅佛説業力千劫不失能引後果此不失者何耶説一切有部以此為無表色即因身語表色而引起之色法法處所攝大衆犢子及分別説系並以表色為有善不善性此表色能引思心所之善不善性於中飲光部謂業入過去未得果來不滅正量部謂業滅過去別起不相應行之不失法隨逐行人得果而後滅餘則業謝過去體是無而有曾有義是故得果經部譬喻師以身語非業業唯是思思心所起之潛能待緣成熟而感果也若總一切法為論説一切有及犢子系用體用義法體恆住自性以因緣力使未來法起用來現在此法體似有常住之嫌經量本計即據此而立一味之常蘊為作用蘊生滅所依大衆分別説系用理事義然理為不變之軌則成事有待於有為之事相既唯現在而無過未則必攝未來之能生性過去之曾習性於現在潛在於現行法之底裡大衆部立攝識為不相應行識上變異之用化地部則諸蘊處界現在即於生滅現行之一念頃蘊中別立業力之一期生蘊色心功能之窮生死蘊譬喻者折衷其間捨過未之實有捨無為之理則不離現在諸行立不即諸行之種習為諸法生起所因也第四節無我涅槃之出世凡夫有漏之身心何由而得聖道現前二世有者未來法中本有無漏聖法以有漏慧為緣引之來現在故初念無漏無同類因然有相應因等二世無者大衆分別説系謂有情之心性本淨為客塵所纏名為有漏離煩惱時即此淨心為無漏因説一切有系之經量本計謂異生位中亦有聖法末計則説有漏心心所法為無漏種而體非無漏如乳之變為酪而乳非酪也具此成聖之可能修道斷惑則成聖斷惑證理唯智慧力然戒定慧三學相資諸家互有所重如説一切有系重禪定分別説系重戒律大衆系重慧乃有慧為加行之説聖道是有為法因修觀慧而生諸宗之共義也説假部獨説由福故得聖道道不可修道不可壞則是了因所了以無為視之也東山住部亦主道體無為之説夫有為者生者必滅聖道是有為則法尚應捨終歸於磨滅此既足以張三乘共入無餘之説即佛壽無邊際亦理有所難自道體真常之説興涅槃妙有之談乃日見宏肆也加行位中觀四諦理然其證入見道説一切有及犢子系主四諦漸現觀十五心或十六心中次第而入大衆及分別説系則於四諦一時現觀頓入四諦共相之空無我性即觀一切法無常故苦苦故無我無我所證空寂無生之一滅乃名見道餘若大衆者之苦能引道苦言能助與東南印之文化有關獨開行持之特色也上述種種大抵為佛元五百年間之舊撮要而談不復一一第九章中印之法難第一節教難之概況及其由來迦王之世佛教一躍而為印度之國教遠及異域炳耀其悲智之榮光然諸行無常迦王歿不五十年而教難起自爾以來佛教退為印度文明之波濤不復為主流矣迦王歿後其子達摩婆陀那立依耆那教徒所傳王嘗於五印度廣建耆那寺院其子多車王則為邪命外道造三洞窟精舍云佛元二百零四年多車王不孚衆望大臣補砂蜜多羅握兵權得婆羅門國師之助乃弒王而自立於是冒狸王朝亡建熏迦王朝補砂蜜多羅王信婆羅門教行迦王懸為厲禁之馬祠開始為毀寺戮僧之反佛教行為佛教所受苦難之程度傳記多不詳阿育王傳舍利弗問經極言其寺空僧絶有避入南山以僅存者王歿佛教乃稍稍復興然遠非昔日之舊矣幸補砂蜜多羅王之排佛僅及於中印時西北印及南印非其政力所及也教難之來有內因亦有外緣內因者佛教之興也不特以解脫道之真亦以革吠陀之弊而救其窮泯階級為平等化天道為人事即獨住為和合離苦樂為中道禁咒術闢神權人本篤實之教實豫雅利安人以新生之道然自迦王御世佛教勃興而淳源漸失彼婆羅門以之而衰蔽者佛徒則蹈其覆轍矣部執競興失和樂一味之風動輒爭持數年而不決是非雜以感情如説一切有者以大天為三逆極惡大衆者亦於持律耶舍有微詞此皆自誣自輕以自害也化外之要求亟而論藏興論興而空談盛其極也務深玄不務實際哲理之思辨日深化世之實效日鮮至若雜藏興而情偽起咒藏興而神祕熾每異佛世之舊而廣致利養僧流浮雜則其致命之傷也迦王崇佛作廣大布施動輒以百萬計建舍利塔八萬四千修精舍豎石柱乃至三以閻浮施無遮大施於印度本不足異然偏為佛教當不無妒嫉憤慨者王大夫人咒訾菩提樹嗣王及大臣鑒於府藏之虛制王而僅得半訶梨勒果供僧其勢之不可長明矣釋尊有留乳之訓輟施之勸而佛徒莫之覺也朝野之信施既盛必有為衣食而出家者賊住比丘濫入佛門事應有之無淡泊篤實之行以廣致利養為能有唱由福故得聖道者有尊福德上座者僧物充積而國敝民艱淨人為之役僧侶則空談而享其成處國難之運敵教者又播弄其間毀寺戮僧以掠其金寶府蓄蓋亦難以幸免矣昔釋尊垂訓以廣致利養為正法衰頽之緣而後世佛徒卒以此召禍也雖然佛徒之內窳未極遺制猶存若非外力之鼓動其間則事不至此外力者雅利安貴族之反動是雅利安人抵五河成梨俱吠陀奠定其文明之本次達恆河流域初則整理祭典而豫以神學之解説成梵書確立婆羅門教之三綱繼則熏染於東方民族依梵書之極意發為苦行禪思解脫之風成奧義書奧義書興反吠陀之潮流以東方新興民族之摩竭陀為中心而蹶起佛教亦其一也釋尊以人本篤實之中道觀揭慈悲平等之教力反吠陀然於雅利安人優良崇高之傳統未嘗不取而化之自俗諦之立場言佛教乃立足於蒙古族文化而攝取雅利安文化者以此以婆羅門教為思想動力之雅利安人不以佛教為正統者且敵視之自佛教之創立以迄冒狸王朝之亡凡二百五十年佛教極一時之盛婆羅門教雖一時中落然以千百年來之深入民間力量雄厚猶自以印度之國教自居在政治有國師其人能左右政權得其同意可擅行廢立在宗教即反吠陀者其哲理亦與創造讚歌奧義書等有關在人民之日常生活自誕生婚姻而死亡自家庭社會而國家婆羅門教無不一一見之於實際政教一貫之婆羅門文明頗堅韌有力中落期中或承禮法之要求組成幾多之經書吠陀支分及摩䨲法論等名著於階級之別特為嚴格之規定或應信仰之要求鼓吹神之熱信毗紐笯濕婆梵天則其有力者也或應哲理之要求流出吠檀多等學派積三百年之努力雖哲理遠不及佛教神力愚民異佛教而融宗教為人民生活之全體則非後起之佛教可及佛教之失敗亦在於此依印度之古例如純為宗教之爭則不外集人民而辨論以定之中印排佛之出於毀寺戮僧政治其重心焉婆羅門教為政治之動力以冒狸王朝之大一統而危殆佛教之種族平等仁民愛物之思想影響支配乎政治實婆羅門貴族政治家所痛心者迦王逝世適達羅維荼民族勃興於南印希臘波斯人進窺於西北冒狸王朝之政權僅及於中印國家受南北之威脅國王庸懦無能婆羅門階級乃鼓弄其間歸咎於佛教之無神無諍藉補砂蜜多羅之兵權廢多車王行馬祠以政治陰謀為廣大之排佛行馬祠已西征得小勝婆羅門者乃大振厥辭然摩竭陀王朝之衰落如恆流東奔勢成莫挽熏迦朝十傳僅一百零二年而至地天王婆羅門大臣婆須提婆又得婆羅門國師之贊許而行篡立別建迦思婆王朝四傳至善護王凡四十五年為安達羅王尸摩迦所滅婆羅門文明之復起終無以救摩竭陀王朝之危亡而階級神祕則陷印度於厄運迄今日而未已第二節教難引起之後果中印佛教隨摩竭陀王朝俱衰熏迦迦思婆朝佛教抑抑不得志僧衆多南遊北上以避之促成安達羅中心之南方佛教迦濕彌羅犍陀羅中心之北方佛教為獨特偏至之發展分別説系南化於大衆系北影響於譬喻師並中印法難後事也北方事分析為實在多元論其極出婆沙師南方重直觀明一體常空其極出方廣道人一則嚴密而瑣碎一則雄渾而脫略逮安達羅王朝入主中印中印佛教乃稍稍有起色然摩竭陀中心之中印佛教夙為分別説系教化之區以受創深巨復興不易非輸入新思想不為功時值安達羅文明發軔之期故取於大衆系者特多昔迦王之世分別説系初分其傳入錫蘭者朴素可喜而大陸分別説系則反是如化地之糅世學法藏之含明咒其不必即初分之舊受安達羅朝文化之熏染而同化耳本佛所説而衍為學派彼此各得其一體分別説系折中其間尤長教難而後南北日趨偏頗中印佛教則常為折衷而綜合之此至後期佛教猶爾惜流於邪正綜合為可憾耳佛教因教難而引起之變質以教務外延法滅及他力思想為最佛教攝雅利安人之優良傳統而實歸宗於中道與吠陀異趣摩竭陀東北一帶受雅利安文化之熏陶而多為蒙古族宜佛教之能適應而誕育成長也佛教勢成黃種人之宗教以此教難之先學理間或出入而佛則世尊法則三藏僧則聲聞猶大體從同教難而後因政治關係而南北分化僧衆未能注力於攝雅利安人之優良傳統闡佛教之特質以謀印度佛教之綜合發揚以感於教難乃本世界宗教之見不崇內固本清源而教化日務外延萬里傳經惟恐不及重廣布而不求精嚴以隨方而應即釋尊所深斥者亦不惜資以為方便佛教疊經教難而猶能遍布於人間賴此者正多然不固本印度佛教日衰不清源化達於他方者雖源承五印而多歧不盡釋尊之本可慨者一生者必滅盛者必衰佛教在世間自當有盡時然住世幾久盛而衰衰而復興要以佛弟子之信行為轉移業感非命定也釋尊制戒攝僧和合則集群力清淨則除邪雜以是正法住千年不以人去而法滅經律舊傳此説遙指千年之長時本以稱譽聖教也自教難勃興古人即興千年法滅之感可謂言同心異矣或説五百或説千年法滅之時地因緣一一預記以相警如迦丁比丘説當來變經等其思想彌漫於教界法滅有期一若命定而無可移易雄健之風蕩焉無存易之以頽喪哀莫大於心死可慨者二佛弟子自視甚高淡泊自足隨方遊化無需乎政力之助亦不忍政力之縛外化內淨一本自力僧事固非王臣所得而問也迦王誠護正法然受命之傳教師即王子摩哂陀亦悄然南行不聞煊赫之聲教難而後佛弟子感自力之不足而佛法乃轉以付囑王公大臣僧團之清淨佛法之流布一一渴望外力為之助一若非如此不足以幸存者又天龍護法聖典有之僧衆和合清淨以為法孰不珍護如眼目乎誠於中者形於外自力動而外力成來助非求助也教難而後護法之思想日盛而出於卑顏之求其極也聖教之住世生死之解脫悉有賴於天神或聖賢之助力他力思想之發展一反於佛教之舊可慨者三中印法難之關係於未來佛教豈淺鮮哉第十章南北朝時代之佛教第一節王朝之變遷佛元二百零四年中印法難起佛教為南北之分化三百六十年安達羅王朝入主中印與北方貴霜王朝並峙迄笈多王朝興而復歸於統一自南北獨立並立以至統一凡五世紀之久可稱為南北朝時代初南印德干高原之達羅維荼民族自始即有文化受吠陀文明之啓發始立國家如安達羅等為時約佛世之前後此後佛教文明相繼流入受高等文化之融冶乃發展為富有特色之文明文化既啓國力日強迦王世之臣附者今則獨立而轉為內侵矣就中安達羅國最強嘗約烏荼國共窺摩竭陀為補砂蜜多羅所拒而止然安達羅王尸摩迦時卒陷波吒利弗創安達羅王朝凡二百六十年而亡其西北則迦王之世希臘人成立大夏廳迦王歿後希臘波斯人踰開伯爾山隘而東略犍陀羅等地二百二十年頃彌蘭陀王將大軍入印度略印度河流域直逼恆河之上流乃擺脫大夏廳而獨立都舍竭奢羯羅王於佛教有淨信嘗就那伽斯那那先即龍軍比丘而問佛法集其問答為一書即漢譯之那先比丘經也此後希臘人在印度之勢力日衰佛元三百六十一年頃大月氏王丘就卻滅之創貴霜王朝月支本塞種之一支初居甘肅西境為胸奴所逼西走阿姆河破大夏而據其地丘就卻亦稱貴霜於同族五部翕侯翕侯猶華言將軍中特強乃併四翕侯而為大月氏王侵略四方有迦濕彌羅西達於波斯之境東及於印度河逮閻膏珍在位又侵入印度內地而有西北印度之全境繼此而立者即誠信佛教之名王迦膩色迦也王約於佛元五百二十年頃登位以迦濕彌羅之迦膩色迦補羅為首都西勝波斯東侵波謎羅攻于闐等地受漢地之質子而優遇之王初信異學晚年乃專心佛教此可證之於所鑄之貨幣最初發行者形式美而題以希臘語刻日月神像其次發行者以希臘文題古波斯語刻希臘波斯印度之神像未見有作釋迦像者自王而後西域之佛教乃開始新時代大法盛於中華此王與有力焉五百五十年頃其子富西伽立爾後月支之勢力漸衰國祚延長至七百年許而滅印度乃復歸於一第二節西北印佛教之隆盛於此期中大乘佛教已自南而北應時流行此當別為專章先一論西北印一切有系之發達自末闡地等弘化西北西北印之法事漸盛儼成説一切有系之化區惟拘羅及五河地方即吠陀文明之發祥地則稍寂寞焉本系之特色富論典之撰述傳説優婆毱多有理目足論之作此後論師之撰述至夥阿毗達磨之發達中已概述之阿毗達磨即擇法本以為禪思之思擇故此系特重禪定雜事稱阿難弟子坐禪第一付法藏傳稱優婆毱多坐禪第一學風重禪而迦濕彌羅之環境於坐禪特佳宜後之禪師論師十九為該系之尊者西北印當異族入侵之衝幸而希臘人塞人多受印度文明之化於佛教尤契合無間乃能日拓其化區然戎馬紛紜礙難自亦不免將有三惡王大秦希臘在於前撥羅在於後安息在中央由是正法有棄亡古人實感慨系之迦膩色迦王初亦多所殺伐後得脅尊者馬鳴之化乃大崇佛法於富樓沙補羅造有名之佛塔高四十餘丈莊嚴偉大冠全印王於佛教貢獻之最巨者厥為結集一事先是學派分流異説孔多説一切有系中自迦旃延尼子造發智論法勝造心論末流所趨多生諍論東系以發智論為佛説而西系之極端者竟視為異論加之童受作喻鬘諸論宗經以抑論與中印之分別説系相呼應譬喻者與分別論者多含空義頗足動有部之宗本於是有婆沙之結集也西域記傳迦膩色迦王嘗以道問人而解答各異以問脅尊者尊者曰如來去世歲月逾邈其弟子各以自宗為是他宗為非所以致有今日王聞而痛惜之乃發心護持結集云當時所結集者西域記謂集五百聖衆以世友菩薩為上座結集三藏而詳釋之凡三十萬頌王乃銅鍱雕鏤珍藏石室不許妄傳國外此則集説一切有之三藏而為之解釋大毗婆沙論其一也然西藏所傳王於迦濕彌羅之耳環林精舍集五百阿羅漢五百菩薩五百在家學者使結集佛語自爾以後十八部異説悉認為真佛教又記録律文其經論之未盡録者補録之已記者則為之校正果爾則三藏之結集不局於有部矣佛元二千二百九十七年施婆那博士於西北印掘得迦膩色迦王供養之舍利函刻有王名又云納受説一切有部衆據此王之特信説一切有部確無可疑藏傳則後人想像之辭耳時所集者依西域記乃三藏之釋論智論謂脅尊者作四阿含之優波提舍大行於世龐然巨作以集多數人編輯成之為近似脅尊者應即發起人也今之大毗婆沙論有昔迦膩色迦王時之言則本論又經後人修補之矣大毗婆沙論乃發智之釋論其編纂之動機實感於異説之相脅發智學者得王之護持乃釋論以裁正衆説凡有部別系同系諸師悉致破斥於譬喻者及分別論者尤為其彈斥之的論成説一切有義大成一時呈隆盛之勢然説一切實有至此而極機械之分析亦於此而極盛之極即衰之始也如以五根為世第一法犢子經量舊阿毗達磨師並同古義本就總聚而約特勝以標名發智論自分析之見地以五根為但心所也改立心心所法為世第一法婆沙則更論及隨心行之得等以之抉擇論門自極繁廣婆沙論陷於極端之多元實在論聞經説得無學聖法即立一能得之得聞法生法滅即立一生法滅法之生滅然得復待得生亦由生乃不得不立得得生生以通之則經所未聞也大衆經有之若即此意而極論之則得得不已生生無窮乃創連環論法以通之如得能得於法此得別有得得得之此得得還為彼得所得得與得得相為因果乃若可通若以譬喻分別論者之見衡之則不啻作繭自縛也高深不在繁瑣阿毗達磨之教權求其持久蓋亦難矣大毗婆沙論之編纂集衆五百傳以世友法救妙音覺天為四大評家此未必爾論解三世一切有有四家所説不同學者即因之誤傳如覺天等學近譬喻者妙音乃西方師之先賢論中力事破斥此乃一切有系之異師非迦濕彌羅之發智學者安見其為評家也世友立説近發智然滅定有心與譬喻師同自道安以來並稱世友為菩薩是否即婆沙會中之上座疑亦因婆沙取世友依用立世而誤會成之至稱其志在大道未證聖果則效顰王舍結集之阿難毗舍離結集之曲安非事實也參與此會者西域記僅記世友一人為菩薩世親傳則羅漢菩薩各五百人藏傳又增世學五百人藏傳世友為五千大乘僧之長富樓那迦為五千小乘僧之長凡此並當時流行大乘之徵以婆沙之思想論之吾寧從龍樹之説出迦旃延尼子弟子輩之手從事毗婆沙之編纂中世親傳謂馬鳴著文十二年而成馬鳴生值其時為之潤文或有之然非婆沙師也第三節佛化雕刻之發達於此漫長之時期中南印聲聞佛教之情況全付諸黑暗不復能詳惟時佛化雕刻之風頗為流行其影響於佛教實深且巨也出世解脫之道泊然而足知苦則厭在忘情以覺滅音樂美術之類易為道障以是音聲之吟哦歌伎之觀聽華鬘之嚴飾概非比丘所應行即俗人以歌舞伎樂為業佛亦不以為然朴而無欲質而不文頗類道墨之説舊傳佛世祇洹畫天王夜叉之像僅見於有部律疑亦後出迦王作石柱柱頭之浮雕僅有佛化之象徵物佛像之雕刻則始於熏迦王朝佛化雕刻之初常以法輪菩提樹等表象佛陀無有作人體者最初雕刻之佛像據今所已發現者薩特那之立像時為佛元二百六十五年其像蓋取法夜叉像而改造成之如南印秣羅矩吒馬都拉所發現之佛像皆其類也早期之佛像頂無肉髻坐則多以獅子為主夜叉本達羅維荼民族之神以雄健著於佛教為護法神即金剛力士是際達羅維荼民族文化發揚之時流行佛像而佛像即取法於夜叉其意味之深長為何如此雕像之風自南而漸入北印成所謂犍陀羅式佛像有肉髻蓮華作座者多比於中南印者之雄渾勇健微嫌纖弱而輕盈活動則過之時南印摩臘婆之佛教亦盛行雕刻如迦利那西克阿闍思陀等洞之雕刻阿摩羅婆提塔婆之雕刻此等雖經後世之修改然最古部分約成於佛元三世紀頃其中迦梨及阿摩羅婆提之建築屬大衆部那西克洞屬賢胄部皆由其刻文知之阿闍思陀之石刻有觀音文殊像殆大乘學者為之又頻闍耶山北有石塔門石欄等有本生談及化迹之雕刻考者謂作於阿恕迦王不遠之時云佛像始於佛世優填王以久不見佛造旃檀佛像舊有其説亞歷山大入侵遺希臘式之石像於貢大拉印度之石像及佛像似起源甚早然阿恕迦王建塔以供舍利其作用與造像同立柱以紀聖迹布教令未聞作佛像之浮雕平面半立體全立體三式南印度有塢馱衍尼優禪尼者即今之印度爾與優填之音正合該地大小乘並盛優填王造像之説或起於此解脫之佛教忘情達本崇高之理智生活足以安心然去佛日遠釋尊悲智之格化漸難為世人所喻感情之信仰油然而興南印之達羅維荼民族富神祕好象徵北印之希臘人塞人等亦各有其所崇之神像求其不自聲色門中入直承古聖之教勢有所難佛化雕刻之風行非偶然也情感之象教盛雄渾朴質之風失而後即情以達智即智以化情情智融合之大乘亦應時而興佛像既陳一則求其麗飾一則望其呵護思想為之一變浸漸而流為神鬼之崇拜此豈創始者所及料耶第十一章大乘佛教導源第一節思想之根柢啓發與完成大乘者立成佛之大願行悲智兼濟之行以成佛為終極者也修菩薩行而後成佛佛弟子無否認者然以菩薩行為大乘抑聲聞行為小乘於阿含毗尼外別有多量之大乘經則有大乘非佛説之諍焉平心論之以大乘經為金口親説非吾人所敢言然其思想之確而當理則無可疑者夫釋尊修菩薩道而成佛乃以直趨解脫教人不令成佛聲聞弟子之自殺者有之自請入滅者有之避世若浼者有之而佛則遊化人間老而彌勤雖波旬請滅亦不許十力大師悲智無倫佛為法根法從佛出聲聞弟子曾未聞有自視齊佛者師資之道其有所異乎佛成道已經一期之禪思有辛勤我所證顯説為徒勞之嘆受請已乃起而轉法輪欲説而若有所難説者何耶以釋尊悲智之大化律聲聞獨善之小行則時機所限釋尊本懷未暢別有大道之思想固極自然而極合理也法華經之三七日思惟為實道而施方便華嚴經之初教菩薩次乃漸化聲聞要皆有見於此大乘思想之啓發以佛德菩薩行之闡述為有力見賢思齊求達於悲深智極之佛果大丈夫當如是矣吠陀有七聖耆那教有二十三勝者佛教則立七佛長阿含中毗沙門歸敬三寶已別敬釋尊則知現在有多佛以是豎論之近則七佛相承遠則無量佛出橫論之則有十方諸佛佛佛道同而後古佛遺聞他方佛説諸佛共集乃時時而出也阿含經唯二菩薩即釋尊未成佛以前與彌勒然佛果既多因行之菩薩當不少即堅拒大乘之有部其律典亦説提婆達多未生怨王授成佛之記善財童子是賢劫菩薩舍利子為衆説法或發無上菩提心是知菩薩道思想之確立固事理所必然非一二人所能虛造者也發大菩提心行菩薩兼濟之行阿含經不詳釋尊未以佛道教弟子而嘗自述其往行有所謂本生談者釋尊於往昔中勤求佛法慈濟有情但求事有所濟即明知無濟亦但行自心之所安無苦而不能忍雖身命亦可捨此悲智之大雄力也為外道為王臣為農工商賈為鳥獸事有所益於有情者無微不至行殺盜淫妄而足以利人者則殺之盜淫妄之此悲智之大善巧也菩薩行與聲聞行異趣以本生談最明本生即釋尊本行之傳記多有取材於印度傳説而淨化之者其種類至夥或遺失或創新正不必一一為佛説之舊然釋尊嘗以之為菩薩大行之典則則無有能否認之者然則取法釋尊之本行而行菩薩道佛弟子孰得而非議之依本生談所説而思辨之彌顯佛菩薩聖德之崇高此則已於學派思想泛論中言之本佛陀之聖德本生談之大行進窺釋尊之本懷會入生死解脫之道所謂大乘成佛之道已具體而微呼之欲出矣第二節大乘藏結集流布之謎大乘經數多而量大以十萬頌為部者昔斫句迦國即有十數如此浩如煙海之聖典果佛説而結集者誰乎智論傳一説文殊彌勒等大菩薩將阿難於鐵圍山結集大乘菩薩處胎經説佛滅七日迦葉阿難等於娑羅雙樹間集大乘為胎化等八藏真諦玄奘等傳王舍結集時別有窟外大衆結集其中有大乘經凡此諸説悉以大乘經為親從佛説離四阿含等而獨立影響倣佛實無一可徵信者聖典初集為九部經以經律別之則修多羅祇夜伽陀為經達磨本生等為律毗奈耶本生譬喻之攝於毗奈耶如智論中説摩偷羅國毗尼含阿波陀那譬喻本生有八十部罽賓國毗尼除却本生阿波陀那但取要用作十部涅槃經亦説如戒律中所説譬喻是名阿波陀那因緣與律有關則盡人所知本事未曾有方廣例此應亦毗奈耶攝也逮迦王之世大衆分別説系於四阿含外立雜部次即擴張為雜藏蓋以本生等為主博采遺聞故事以組成之雜藏之成立開三藏外大乘經之始矣如釋尊一代之化迹兼本生摩訶僧祇師名為大事薩婆多師名此經為大莊嚴迦葉維師名為佛往因緣曇無德師名為釋迦牟尼佛本行尼沙塞師名為毗尼藏根本化地部尼沙塞名為毗尼藏根本足為源出毗尼之證今存梵本大事屬大衆系説出世部明戒律有菩薩十地之文與般若經之十地近大乘經之淵源不難想見之矣然大乘不止釋尊之化迹本行已也以釋尊之身教言教為經經律之深見要行為緯博采異聞融攝世學而別為更張組織之迥非雜藏之舊乃離雜藏而別立成菩薩藏其經過可於增一經論見之經曰方等大乘義玄邃及諸契經為雜藏是大乘猶為雜藏之一分論釋則謂佛在世時阿闍世王問佛菩薩行事如來為説法佛在世時已名大士藏阿難所撰集者即今四藏合而言之為五藏則菩薩藏已離雜藏而別立矣法藏部立明咒藏不見於四分律此應初即少有後更廣集成之於毗尼兼經衍出雜藏雜藏衍出菩薩藏次出明咒藏亦僅就其成立而概言之詳則不可知也大乘藏數多而量大非一人一時出其初為纂集離雜藏而獨立者時則佛元四世紀以降時時而出人則大衆及大陸分別説系之學者為之佛典重口授傳誦即記録以後猶遺風不盡演變實多大乘經之自傳説而為定型中多演變經一人一地一派一系之傳誦流布漸為人所熟知終乃見於典籍實經悠久之歲月而來義本佛説而不可於文句求之編集自有其人而古哲不欲以名聞佛法依法不依人求不違法相不違釋尊之精神可也必欲證實其結集者既不能亦無當也大乘經之傳布人間古多傳説漢傳龍樹入龍宮得華嚴經藏傳大乘經皆天龍等所守護如般若經即龍樹於龍宮得之祕密者傳龍樹入南天鐵塔從金剛薩埵面授大日經以是或疑大乘經為龍樹所集出不知印人薄於史地觀念於經典之不知所自來者輒歸諸時衆所崇信之天神哲人當聲聞教遺聞之集出多歸於釋尊及門之弟子如説假部之大迦旃延多聞部之祀皮衣法藏部之目犍連律之優波離等大乘教法之出去佛且四世紀為人注目則更後以傳説天龍等長壽金剛力士夜叉護法乃於大乘經之傳出想像為天龍所守護龍樹等所傳入龍宮開鐵塔或者擬於燉煌石室遺物之發現是誤以象喻為事實也入龍宮見龍王開鐵塔見金剛薩埵而傳出乃象喻觀心悟入法性而後弘通此法耳經既不自龍宮鐵塔來人亦非龍樹也即以般若經而論龍樹之般若釋論廣引古人之舊説又以經文缺十八界為誦者忘失龍樹所依之經本顯非初出或自作但以龍樹起而大乘興於般若華嚴特多宗重昔之潛行者今則離小乘而獨步後學乃歸諸龍樹耳大乘經之流布有先後此與編集時節思潮之演變有關不可不深切思之大乘經中每自述其傳布人間之時代或佛後四百年或五百年不等據此可推知出世之年然印人於佛元傳説無定故可參考而不可偏執也又經中嘗引述餘經如無量義經敘及般若華嚴法華經又敘及無量義大般涅槃經則論及華嚴般若法華楞伽經敘及大雲涅槃勝鬘央掘魔密嚴經則又敘及華嚴楞伽諸如此類皆可見其次第之迹惟華嚴般若等大部非一時所出則又不可不知也大乘經中每懸記後代之論師如摩訶摩耶經之馬鳴龍樹楞伽經之龍樹文殊大教王經之龍樹無著等皆足以推知該經出世之時節即印度王臣學者之名亦可資以為證其尤為重要者則依聖典之判教得知經典傳布之先後且能藉以見思想演進之迹如阿含毗奈耶中無有以説教之先後而判教理之淺深者此即初期佛教之聖典小行大隱有三乘之名而以聲聞乘為中心逮大乘經出或含小明大或折小明大或簡小明大法既有大乘小乘二者之別説教亦有先後如般若思益之見第二法輪轉等此即中期佛教之經大小並存有三乘之名而以菩薩乘為主繼此而起者雖或待小明大於大中更事分別而為三教如法華之初令除糞次教理家指般若經等後則付業陀羅尼自在王經金光明經千鉢經並判先説有次説空後説真常中之三教理趣經舉三藏般若陀羅尼凡此三教約理而論初説事有次明性空後顯真常約被機而論初則聲聞次則不廢聲聞而明大乘後則一切有情成佛之一乘此即後期佛教之經判三教無小不大以佛果乘為中心此外復有旁流如解深密經立有空中三教寄圓成實之真常於依他有中明之初為小次為大後為三乘若知大乘導源於大衆分別説系解深密經乃瑜伽學者所出淵源説一切有系而進達大乘者則其事易明雖孤軍突起直往無前而終於助成時代佛教之真常而已別有大乘妙智經初説心境俱有次明境空心有後辨心境皆空此則佛元九世紀中觀宗復興起與唯識宗共諍之迹也深密與妙智相反而皆為後期佛教之一端能參詳上述四義旁助於印度之論典中國之譯經史判教説則於教理思想之演進猶將洞然明白豈僅大乘經傳布之先後而已事有佛教創始佛世初期佛教無常大乘者初分佛元小乘分別説者興一一切有者盛二發智者病有四緣有中期佛教性空本性空者大成四五大乘方廣者執空五五瑜伽者入大七中觀者重光七五妙有真常者綜合八後期佛教真常一乘佛教衰滅一一第三節菩薩之偉大增一阿含經序以解空寂理行六度之行為菩薩乘可謂要言不煩直中肯綮夫悲事非大行不成解脫非解空不成智見空悲入有如鳥之有兩翼乃能有所至菩薩道雖深廣無倫般若經以三句釋之罄無不盡一一切智智相應作意者一切智智即無上菩提即以佛智為中心而攝一切佛德學者於生死中創發大心期圓成此崇高究竟之佛德虛空可盡此希聖成佛之大志不移能發此菩提心者即名菩提薩埵菩薩薩埵即有情強毅而不拔熱誠而奔放凡人以此趨生死者今則以此求菩提此大菩提願乃成佛之因種也聲聞志求解脫以出離心為因與菩薩異二大悲為上首者悲以拔苦為義世間即苦知之切者痛之深人莫不能離苦而莫知之也背解脫趣生死吾不濟拔誰濟之以有情之苦樂為苦樂如母之子憂而憂子樂而樂故曰為衆生病我不入地獄誰入地獄悲心徹骨髓而莫能自已唯悲所之菩薩但從大悲生悲心情動而後求佛果意志非為成佛而生大悲也菩薩憫苦與聲聞厭苦異三無所得為方便而行者世間即緣起緣起無自性無自性而愚夫執以為實故於無生死中成生死無苦痛中有苦痛陷身網罟觸處荊榛自苦不能離他苦不能拔也達一切法之本空無我無我所外不拘於物內不蔽於我以無所得為方便乃能忘我以為衆行六度大行以成就有情嚴淨國土也聲聞道以無常為門無常故苦苦故無我厭心切者無我智生而離欲於禪思中達空寂理得現法樂視世間如怨毒雖苦海之陷溺方深曾不能起其同情之感惟直入於無餘菩薩道從性空門入解一切法無自性如幻如化無常如幻苦亦如幻即如幻生死而寂滅固大佳其如苦海之有情淪溺而未脫苦何厭心薄而空見生乃能動無緣之悲發菩提之願菩薩得空之巧用乃能行六度之行成就有情則令於佛法厚植善根生正見成正行嚴淨國土則以三心行六度攝一切同願同行之有情共化世間為淨土成就世間善根者和樂善生得現生未來之樂成就解脫善根者即事和而證一滅此中期大乘者之説後期真常論者則不然體悟離戲論之心性達真常本爾為菩薩之本因曰菩提心為因悟自他不二起同體之悲曰大悲為根本大用無方應機巧化無事而非方便而方便無不至究竟曰方便為究竟若以中期大乘而姑為融攝之則以聖者之方便道擬彼凡庸也即上諸端菩薩心行之特色可見然中道難能賢者過之而愚者不及立志於圓成佛果人莫不有成佛之可能然佛德彌高彌感成佛之不易佛德難思幸佛力之無所不能於是以成佛之大願願佛之助我以成佛狷者失之怯或我願成佛我能成佛我心能成佛達於我心即是佛狂者失之慢或我即是佛願佛豫我以助力而我身實現成佛極左者右極右者左交流雜錯者失之誕菩薩本悲心以行悲事當矣然不解無性緣起之離愛染乃濫世俗之仁愛為慈悲善行拘於人間非即人成佛之道也或不解無性緣起之秩然有次褊急而求躐等乃精勤禪定求神通不解無性緣起之和樂善生有悲心而無方便不能即此時此土以成熟有情嚴淨國土而唯能責之於未來他方以無所得為方便者或有住性空之解謂六度已行縱染惡之狂行謂方便解脫則又比比然也欲求大乘真精神者捨中期大乘而誰歟菩提心為因證菩提果菩薩道以大悲為上首成大悲行攝六和衆布施以攝衆依三心而行持戒以和衆利他忍辱以安衆行六度行精進以成行禪定以攝心己利般若以入理無所得為方便住性空見第四節大乘初興大乘淵源於佛世王舍結集之阿難毗舍離結集之阿夷多波吒利弗結集時之摩訶提婆迦濕彌羅結集之脅尊者世友馬鳴凡此諸德雖學派不同而其向律重根本法主兼濟之大乘演進則一佛世有彌勒其人與友人偕來見佛獨發大菩提心釋尊記其未來作佛時無獨立之菩薩僧彌勒發心受戒已形同聲聞比丘於聲聞會中坐但以不斷煩惱不修禪定為異其在家菩薩以後世所傳而推之如毗舍離城寶積維摩詰等五百人王舍城賢護等十六人文殊善財似亦實有其人惜其詳不可知於中應深切注意者即初期流行之大乘經舍利弗等聲聞弟子雖猶參預其間而實以教化在家菩薩為中心直趣解脫之聲聞常見詰於在家之信衆被視為負佛債者大乘思想之闡發出家僧中以大衆及分別説者之功績為多然不久即思想瀰漫於全印為各派先覺者之所尊重在家信衆不可磨滅之功績尤多佛教普及於大衆直趣解脫之甚深道難為在家學者所愜意而大乘思想日興此於初期大乘經之以在家菩薩為化機甚或語侵聲聞即可想見其故住持佛教者仍為出家之比丘而其中先覺者尊重大乘為善巧方便深入廣化屬諸在家菩薩而承認聲聞能達究竟之解脫隱大於小小不障大相資相助而大乘日興大乘教雖大衆者開其先道然不久為各派先覺者所公認故初期之大乘經已非純為某一學系所集出此不難考其思想而知之大抵大衆系之特色為圓融賅攝分別説系為取精用宏説一切有系為辨析精嚴初期之大乘經以前二系為多圓攝則及於世學取精則出入諸部而理長為宗至若辨析精嚴之大乘以後期者為多佛教界經三百年之競辨思想漸分流為三大系各派之短長得失以辨難而日明當急求出世之聲聞乘不足以應付時機而婆羅門再起安達羅及希臘月支文化激蕩之秋大乘學者取學派思想而取捨貫攝之以求新適應大乘經乃時時而出也大乘學之於各派思想雖不無出入抑揚然大體為論則學派思想之大綜合也佛滅百年佛弟子分東西二系東以毗舍離西以波吒利弗摩偷羅為中心迦王時東系漸東南移其重心於央崛多羅舊傳其兼弘般若等大經創多聞部之祀皮衣亦宏法於此西系之東與大衆相呼應者以波吒利弗為中心成分別説系流出之化地法藏並有大乘義法藏則西化於阿槃提者西系之西行者則西北達於健陀羅及迦濕彌羅大衆系之大天南化於摩醯沙慢陀羅流出安達羅學派據西藏所傳彼等有般若及餘大乘經而經文以印度之俗語記之又如説假部主之南化摩訶剌陀並後世大乘盛行之地也逮中印排佛分別説系多南行避之四世紀隨安達羅王朝而中印佛教興經謂時彌勒下閻浮提助佛教復興云云其與大乘之關係蓋可想見説一切有系中如譬喻尊者於二三世紀頃創經量部於健陀羅其後移居於竭槃陀地當帕米爾高原之東境察後世大乘佛教發達之區如健陀羅北上而烏仗那入帕米爾而抵竭槃陀東入今之新疆如斫句迦于闐並為大乘之化區譬喻者實西北大乘之遠緣入竭槃陀則又大乘東來之漸也迦膩色迦王時佛元六世紀上半般若經已至北印已有多量大乘經之成立無疑考脅尊者之學風好直要而厭繁瑣於法門推衍輒以理不應責無明者愚盲者墮坑答之與發智學者之精神相去何遠彼解方廣經云此中般若説名方廣事用大故其為説一切有中之大乘學者與馬鳴同脅尊者嘗南遊中印見佛教為外道所抑未能暢行乃論議以折外道馬鳴世友之具有大乘傾向為傳記所公認然則龍樹未興大乘之勢已瀰漫全印矣就此時地之分布而觀之大乘教之根源地不容責之於一隅若以經中暗示者而解説之則般若經一分可謂淵源於東方如常啼菩薩求法之東行大衆見東方不動佛之國土般若自東方而轉自南方南方漸至北方後五百年而大盛華嚴大集並南印大衆學者集出之善財求法之南行其確證也餘若大悲經阿彌陀經明西方極樂當為西方學者所集出如能就經典之思想環境預言傳説而作透闢之解説則亦可得其概略惟吾人不能忽略者即自編集至盛行多有演繹充實修改之經過未可一例拘也迦膩色迦王與西域大乘教之隆盛有深切之關係傳説王有至友三人智臣摩吒羅以治國良醫遮羅迦以調身名德馬鳴菩薩則為其思想之指導者安慰者馬鳴之在當時可謂一代名德矣馬鳴中印人本出家外道其異名有黑難伏難伏黑勇母兒父兒法善現等彼通吠陀及吠陀支於文學特長歸心佛教後嘗作賴吒和羅伎以化衆國人聞而興無常之感出家者足踵相接國王乃下令停止此曲云文學之感人深切如是佛教有數之詩人也其作品之譯漢者有佛所行讚百五十頌讚佛頌大莊嚴論本生鬘論並以佛之本生史傳為題彼於大莊嚴論序歸敬於富那及脅於一切有部衆化地論師牛王正道者並皆敬順不拘一宗具大乘之風度惟時大乘猶依傍於小宗故馬鳴及脅尊者仍以一切有系之學者視之脅尊者信般若經馬鳴菩薩則與西方淨土有關大悲經謂北天竺國當有比丘名祁婆迦馬鳴之梵語作大乘學生西方極樂世界馬鳴本信仰之熱誠讚佛之本生史迹有往生他方佛土之信念頗與其個性合蓋文藝者富高潔之情感發揮俯引俗流信願之大乘亦其宜也馬鳴之智見不詳大毗婆沙論中有名大德者有名法救者有名大德法善現者從來以大德及法救為一人然法善現梵語達磨須菩吼底無救義似大德法善現別有其人與法救異大德究何德何人竟使發智學者直稱大德而不敢名馬鳴一名法善現為迦膩色迦王所重之第一大德疑大德乃法善現即馬鳴也其思想於婆沙為有部之異師與分別譬喻者相近學者詳之第十二章性空大乘之傳宏第一節龍樹師資事略龍樹菩薩出大乘佛教乃入於新時代釋尊入滅以來未之有也菩薩生南印之婆羅門家天聰奇悟事不再告於吠陀等世間學藝靡不練達嘗與契友三人騁情極欲以為樂潛入王家穢亂宮廷事覺幸免於難乃悟欲為苦本厭離心生詣佛塔出家受戒九十日中誦三藏盡達其意更求餘經都無得處於雪山深處一佛塔中遇老比丘授以大乘經讀而善之歷遊諸國與外道論議咸皆折伏遂自念言適應世間方便甚多佛經雖妙而推理猶未盡未盡者推而説之以此悟後學於理不違於事無失乃懷革新佛教之志擬離傳統之聲聞僧而別立傳説有龍王見而愍之接入龍宮授與無量方等深經九十日中通練甚多乃悟入無生忍得經一箱而出云菩薩初遊化摩竭陀後抵南印化一承事外道之國王得其敬信大乘教乃盛行奘傳南憍薩羅國王今之貝拉爾娑多婆訶引正珍敬龍樹供衛甚厚現存之龍樹論中有教誡王頌以之寄禪陀迦王者應即此人也菩薩出世之年代多異説什公傳其佛後五百三十年出近之什譯龍樹傳係聞之師説而録出者時為佛元七百四十年而傳云去世已來始過百歲則其入滅約為六百三十年頃竺法護於六百七十年頃已片斷譯出其十住毗婆沙論論中多破婆沙師今推定其生於五百年頃滅於六百三十年頃享百二三十之高壽此與衆傳之譽其長壽傳其有大量之論典無不合菩薩之撰述甚多以中觀論智度論十住毗婆沙論為最著中觀論闡發緣起性空之深義揭示生死解脫之根本為三乘共由之門智論釋般若經之第二會十住釋華嚴經之十地品即以深見而暢發菩薩之大行菩薩為南印學者遊北印雪山出家受戒於説一切有漫遊全印而弘化於南印之憍薩羅於內外大小無不達故其教學之弘廣於大乘論師中允推獨步時北印之婆沙初編婆沙師執一切有而礙空執小障大專橫不可一世南印之方廣學者執一切空而壞緣起執理而廢事説一切法如龜毛兔角之常無菩薩乃起而攻異端暢中道斥迦旃延尼子為非釋子其弟子輩為生死人以方廣者為邪空信戒無基而取一空息戲論之雲霧朗中道之秋月大乘光芒萬丈安達羅王朝與有榮焉菩薩嘗約學派之見為三毗曇門明有空門説空鞞勒門辨亦有亦無於此三門不得般若愚者謂為乖錯智者得般若波羅蜜入三種法門無所礙是於説一切有分別説大衆之三系使其於不違緣起性空之正見中貫攝而條理之汲方便之三流而歸於自宗之大乘空門西北印之往生極樂行雖斥其志性下劣以當時風行亦嘗論及之自中論等出法界雷動智者欣受愚者驚懾大乘乃不復依傍小宗卓然自立宜後之言大乘者咸仰菩薩為大祖也藏傳其弟子有弘如來藏法門者有持明咒者傳説無徵惟提婆菩薩則確受持其法門而繼踵弘傳提婆菩薩師子國錫蘭人初於犢子部出家嘗不避萬人之怒抉大自在天神像之寶目以明神之無靈又自抉一目以報之人因以迦那一目提婆稱之後來叩龍樹之門執弟子禮精中觀遊化於印度之窣祿勤那鉢邏那伽摩伽陀所至破外道不遺餘力其著作以四百論為最著其後遊化南印廣破外道有一外道弟子不忍其師之被破乃乘間以利刃刺之曰汝以口破我師何如我以刀破汝腹命未畢頃猶愍此愚頑而善遣之為法不惜身無我不瞋敵提婆菩薩有之傳説提婆弟子有羅睺羅跋陀羅者亦曾釋中觀再傳弟子又有名龍樹者漸為唯心密咒之弘傳傳者因誤以為龍樹菩薩云龍樹菩薩師資之學於佛元七百四十年經莎車王子須利耶沙摩之介以之授鳩摩羅什三藏而傳來中國弘布彌廣其在印度則提婆以去日見衰落即大智度論等亦佚失無聞矣龍樹菩薩深達大乘之奧了然於化世之方便擬革新佛教建立菩薩僧而未果行事之所以不果傳説恍惚不明尋龍樹菩薩之學風頗有不可以聲聞僧拘之者傳龍樹菩薩為化國王而易服七年持幡奔走於王前提婆菩薩易俗服受募為國王衛士而後得論議華氏城外道跋扈禁比丘出入則易服入城而破之釋中論之青目乃一婆羅門學者鳩摩羅什三藏來中國受姚興之逼為完成傳譯之大業乃易服娶妻而別住官廨菩薩道蓋不能以聲聞拘也龍樹菩薩有創菩薩僧團之素志而未果意論之大乘初興聲聞僧之力猶強況成立大乘僧團即人事以向佛道非當時之政治可容受龍王之化而止其在此乎菩薩乘內無攝僧之制理同證而事不和獨往獨來僅能隨機以適化心願普化有情而忽於群衆之組合末流所趨散漫而難以言和合僧以視聲聞僧之和合而絀於化世反瞪乎其後矣為政教所限而不果大乘佛教未來之逆轉無有沈痛如此者第二節性空論之前瞻龍樹出於六七世紀大成性空論而實性空不自龍樹始般若之流行北印偽三藏出世婆沙論已言之其經之行世早於龍樹且三數百年特大經之出處難詳佛史者乃多以龍樹為言實則未盡善也性空論處學風丕變之會前乎此者雜多厭苦無我事人重行契智後乎此者一味妙樂大我尊天唯心達情承先啓後厥為性空學者不知此無以見佛教流變之機也性空論以深見著莫妙於即空即假之緣起中道試為源而溯之釋尊化世反吠陀而道平等政力智力財力一以行業為準初無種族優劣之別自非雅利安人勃興於南北平等之要求日亟故曰緣起無定性實際理地平等不二何有於種族先天之優劣也聲聞道以遺世獨善為高受學於先覺為尚此非盡人所能及所願也故迦王薄薄拘羅之遺世獨善僅施以一錢夫世之所求於佛教者為其能利濟群萌非但為一二急證解脫者而已聲聞僧持佛法而不暢釋尊之本懷不足以應世求乃群起共責聲聞是癡狗是敗種是婢子賤作緣起無自性發菩提心行菩薩道則成佛耳何事封局小心為般若讚大以喻小則曰法性空中聲聞不可得菩薩亦不可得但以假名説有三乘法華回小以入大則曰諸佛兩足尊知法常無性佛種從緣起是故説一乘以性空而能緣起成佛見性空即見佛此分別論者之所以以空為佛性也政教渴求平等佛子乃自聲聞之多元論反求於釋尊之本即萬事以達一理而諸法無我乃應時而宏闡焉聲聞道以無常為門己利為事切感於人生之苦急求有以解脫之其苦行餘習深厚者竟以乞食教化為多事業盡命終為難忍此心此行難以言菩薩之道也時衆渴望於菩薩道而聲聞不能奈何行菩薩道者必求其知苦不厭以利他為己利反求於釋尊之本教乃知唯性空能之菩薩道常無常性空如幻苦樂如幻一切一味相齊染淨苦樂人我縛脫即一切之自虛而等視之知緣起之苦樂宛然而自性都空以法持心夷然而住不以常樂而少拘物欲不因無常苦而急怖生死乃能在塵不染而化世也此與聲聞之捨染取淨厭苦求樂其心行有天地之隔文殊師利本緣曾於此深切言之一切有情畢竟空覓自他了不可得非有己可利也緣起假名則一切有情相依相資自三火六禮而極論之自過去以至未來有四恩之説他利即己利有情病即菩薩病忘己以為人乃成菩薩之道達性空則知苦不厭解性空之緣起假名則憫苦而悲生闢菩薩之大道而性空門乃恢恢乎其大矣又自釋尊息化以來學派爭鳴説一切有稱根本分別説稱上座犢子稱牛王大衆稱大衆斤斤於優劣是非之間無諍之風亦幾乎息矣葛藤絡索是何可厭乃有扇大悲之風熾般若之烈焰一舉而廓清之一切法無自性於畢竟空中戲論都息戲論息則了然於緣起之正取精用宏而無不當也十八及本二皆從大乘出無是亦無非我説未來起雖有五部皆不妨如來法界於如來正覺平等法界中何部執之有遣一切執而融攝之非空不能龍樹論即深於此道者也凡此政教平等之求菩薩道知苦不厭為他忘己之求聖教無諍和合之求時代之機感也應所求而滿足之性空大乘乃日張復有由本釋尊之教循論理之規律而為思想應有之開發者在釋尊之為教敘事以常識之實在現在有過未亦有色有心亦有有為之生死有無為涅槃亦有即事以顯理性則剎那生滅而諸行無常蘊界處和合而諸法無我苦不復生而涅槃寂靜即其教而直述之則三世實有無為實有如説一切有系所説者近之雖然以之為常識之實在可以之為理智之實在則不可龍樹責其聞世諦謂是第一義諦蓋確論也説一切有者以色心之和合相為世俗假名有色心之有特自體用而不可析者為勝義實有此色極微及心心所法之實性體恆住而用有生滅剎那間正生正滅為現在未有作用為未來作用息名過去體實恆有而無三世之異也以是前後為各別法用之假名相續同時為各別法用之假名和合捨假名而直談實相則世間為無限量之實在性也相續和合法體之所無即體起用其能成立相續和合否説一切有者以為能亦唯自信而已犢子系信三世實有而見其不能乃立四微和合有柱法五陰和合有人法即於和合相續中別有一不即不離之統一性有此相續和合或可能然求此統一者之實性則不可得也三世實有者以前後之法體為各別然則如業用之息入過去與現在之有情復何關涉於是立非色非心之得不失法等以為之聯繫法無限得亦無限得復待得此無限之實在更無限愈論辨而愈繁愈難其根本癥結在不見釋尊立教之大本以常識之實在為理智之實在也佛元百年大衆分別説系有見於三世實有者之難乃説現在實有過未無體或説過去少分實有或説現在亦分通假有彼三世實有者如珠珠之相纍唯現在實有者則如明珠之旋轉反側自空而下似相續而實唯一珠然此亦難知諸行無常剎那生而即滅前者未滅則有能生無所生已滅則有所生無能生然猶因果不相及也大衆者説色根大種有轉變化地者説色根大種有轉變心心所法亦有轉變實法念念滅而立轉變則亦自信而已況過去曾有熏未來當有種在即生即滅之現有中此曾當之有為實為假與現有一耶異耶凡此雖出三世實有之火坑又另入現在實有之深水矣大衆分別説犢子多於別別實法之和合相續中立一統一性此統一者實則又一別法也假則説一切有之舊説不假不實又不得可謂辭窮理絶者矣性空者之論法彼等亦微知之且間用以責他然以為假名者可如所説世間色心之實性不能不實在不應以此相責寧知實在之見陷一切於不通耶大衆分別説系之先覺者乃進而即現在之實有而亦破之不離現在有過未豈可有離過未之現在也緣起幻網拘於常識之實在者每困躓而難入病在不知空即假名也無性之假名者五蘊和合為有情求蘊與有情之自性皆了不可得然五蘊之假名似一有情而不礙異色心無邊相用不可亂有情亦假名似五而不礙一無離色之心及離心之色者離則即非有情不一不異而一異宛然唯性空之假名能之三世相續求剎那別法不可得貫三世而常一者亦不可得假名則不離過未有現在不離現在有過未雖不離亦不即以是因有則果有幻相歷劫而不失因無則果無終歸於磨滅不斷不常而常斷宛然亦唯性空之假名能之自三世實有而現在實有過未無實進達於三世之性空無實空之極亦有之極三世幻有我法幻有轉與犢子説一切有者近特假有與實有為異此非俗流所知矣佛以惑業苦之不生為無為涅槃衆苦永息學佛者所歸心也佛以不生不滅為無為學者乃以之為常恆不變之實體以慧力簡擇證一一法之無為而有漏有為不生作此説者以生死涅槃為兩橛亦以涅槃為雜多也逮譬喻者出以有為為實無為非實如燒衣無瓶則衣瓶之燒無耳何可別計有燒衣無瓶之實以是無為者於生滅有為之不生知其不生而已作此説者捨生死有為之真實入涅槃無為之非實頗難為學者諒也性空者舉有為無為而一切空之惑業苦本空而因果相生曰有為正智生者達諸法無性不見有若生若滅者心行既斷言語亦滅不生不滅法如涅槃曰無為無為乃有為之性空有為即無為之假名生死之實際及與涅槃際如是二際者無毫釐差別豈可謂離有為而別得無為之一實一切法性空即真如實性無始來幻幻相生幻幻生滅亦空也無明滅者一切滅假名相以説之則捨妄倒入真實與譬喻者異性空者承初期佛教之學洞知其癥結而批判之自常識之真實導歸於理智之真實空繼無常論而代興儼然釋尊本典之舊也諸行無常偏於妄涅槃寂靜偏於真性空者詳諸法無我中正賅攝真俗宛然而一貫也第三節性空唯名論述要龍樹菩薩之學綱在二諦在依俗諦得第一義得第一義入涅槃其言曰諸佛以二諦為衆生説法若不依俗諦不得第一義不得第一義則不得涅槃所謂二諦者即緣起之中觀也阿含以我説緣起為宗般若經以觀十二因緣如虛空不可盡為菩薩不共中道妙觀緣起即一切法為此有故彼有此無故彼無者若假名相而辨説之則緣起是無自性自性無故空是唯名唯假唯假名則有宛然有而畢竟空畢竟空而宛然有空有相成不相奪即緣起之中道故曰衆因緣生法我説即是空亦為是假名亦是中道義也緣起者不離因緣而有而非自成不從生之自成曰自性即自性而論之自成者必為非新有之常在不待他之獨存自成實常在常獨存一以理智而觀於緣起之存在了無毫釐許可得以未曾有一法不從因緣生是故一切法無不是空者緣起法無此自性之為空非説因緣假有亦無也常人之於世間莫不多少有見於從生新作待他然自常識之所見科哲以至神教之想像又無不以世間之本質為真實自成者或常在獨存者聞佛説真實自性空則瞿然而驚誤以為一切都無也本此見以相責故曰若一切皆空應無生無滅等不知真實之自成論理即不得不為常在與獨存自成常在獨存則世間因果生滅等不復可能龍樹菩薩因之轉以相責曰若不許空者彼一切不成反之唯其無真實之自性乃依因待緣而得成如幻如化唯名唯假無毫釐許自性而因果染淨無不成以有空義故一切法得成此即緣起中道觀之特色非世間學者所能解緣起法性空假名不相礙而常人以無智所蒙見聞覺知之所及輒計以為真實自性有此常識之真實曰俗諦一切法非無而真實自性實不有非有而執以為實有藉緣起之正見以徹破之觀一切法自性空此理智之真實曰第一義諦釋尊以常識之真實顯理智之性空引凡入聖安立二諦之本也有情情滯於實有佛教乃盛談乎性空解性空則見性空之假名圓見緣起之中道豈執空而撥有哉緣起法空假無礙為中道而要在明空此所以中論以八不緣起為宗要也常人以一切法為自性有乖緣起則一切倒論理則不成修行則不得解脫舉此一切倒而空之不之可也八不特示其要耳不生亦不滅不常亦不斷不一亦不異不來亦不出去能説是因緣緣起善滅諸戲論我稽首禮佛諸説中第一八不滅一切戲論一一不滅一切戲論其義極深玄姑為作一途之解緣起唯名新新生滅宛然而非自性有何者自性成則不從生諸法不自生亦不從他生不共不無因是故知無生不生則不滅本自無生今復何所滅即自性而觀於當念則生滅不成因力在則生命常在因力盡則命根即斷緣起常斷宛然唯假名而自性不成若有自性者非無故應常若先有現無是則應成斷蓋無自成之自性則無非新有之常在不常則不斷何實有可壞而使無即自性而觀於一生則常變斷不成前蘊滅而後蘊生自作自受則一前滅後生則異緣起唯名而一異成自性有則若天人各異則不應相續若天即是人則墮於常邊無不待他之獨存故不一不一即不異無獨存之一更何有敵對之別異耶即自性而觀於三世則一異不成生死無所來而來入三界涅槃無所至而去至寂滅生死之來如幻化涅槃之去如幻化所謂一切法如幻如化涅槃亦如幻如化若有一法過涅槃者亦復如幻如化假名如幻則成自性有則已去無有去未去亦無去離已去未去去時亦無去無去則無來即自性而觀於始終則來去不成戲論無邊正觀緣起之八不則自性空而分別滅分別滅而戲論息矣此八不之緣起中道為三乘解脫所共由而菩薩則不共何者於唯名之緣起流中一切有情莫能正覺昧無性假名而執以為自性之真實曰無明無明者蒙昧之認識也於五蘊和合之有情妄執為實曰我見於五蘊執實曰法見所緣之我法不同而執為自性之真實則一此常識中朴素之自成不變獨存感即十二緣起支之無明迷妄之本生死之根一切有情所同然者也基此根本之無明經學者之分別生衆多枝末之戲論於我見計小我之靈魂大我之天帝於法見計一一法之實色物實心或一切法之唯色唯心即此無明之妄見觸觸境生情而離合悲歡失其正受妄情所繫生貪瞋邪見而發為縱我役物之行愛取意導行而事業成有隨善惡業而苦果生也解脫之道在反其道而行之業惑從分別分別從戲論戲論因空滅以空滅之者破分別執而達於自性之本空我無自性曰我空法無自性曰法空假名不同而性空則一聲聞直自我空入我性空而法見不生菩薩遍達一切法空而反歸於我空之門達我法空則戲論息而生死永滅龍樹菩薩有見於緣起之空有無礙不落兩邊尤有見於性空為中道之門乃舉緣起之八不以標宗而以瞿曇大聖主憐憫説是法悉斷一切見是故稽首禮結之行菩薩道者始自發心終訖成佛略為二道五菩提五菩提者有情於生死中從佛聞弟子聞經典聞引生性空見大悲心確立圓成佛果之大願曰發心菩提初發心者或自信入或自悲入或自慧入結歸於三心圓具之大菩提願依斯大願動悲心而行六度四攝行集福智資糧折伏粗煩惱垢曰伏心菩提以悲心悲事而大願彌固空解轉深空得悲而不捨有情悲以空而不著戲論方便成就斷煩惱達一切畢竟空入無生法忍曰明心菩提此三者初發願心中成悲事後證空寂曰般若道從凡入聖以空慧為本也此下是聖人所行即此明心菩提正見法性即見佛是真發菩提心者前發菩提心是世俗發心得無生忍已以大悲願力為因煩惱習為緣得法性生身以無所得為方便隨機應物行六度四攝之行菩薩自利脫生死已具此心此志唯成熟有情與嚴淨國土無復他事自生死中出薄餘習到一切智中住曰出到菩提因圓果滿斷餘習而成佛曰究竟菩提此三者初發心次悲行終圓證曰方便道從自脫以脫他以即空之巧慧為本也於此二道五菩提而行菩薩道者根性有利鈍之異此以創注意發大心而分別之或有信戒無基福慧微劣而創發菩提心者自空慧入則厭離心切墮聲聞中自悲心入則敗壞菩薩成仁民愛物之行墮凡夫中自信門入則神佛雜濫墮外道中如乘羊而為萬里之行鮮有不退失者其有無量百千萬億中若一若二住不退失者初觀無常等十五事而後入空鈍根也或有曾集福智善修信戒心未純淨卑怯自私戀世之情猶深而創發大心者願以正其志悲以植其褔智以滌其滯不急不緩成中道之行直自性空門入歷二僧祇劫而後得無生法忍此中又有三品此下品也此如乘馬而行久久而後至中根也或有無量生中積集無邊福智從不見佛聞法而究窮事理類大慧仁愛及物近大悲求達至善若大願今生利根悲熟得善知識創發菩提心即直悟無生而趣佛道於中復三品或入無生忍或得忍而即成嚴土熟情之行或得忍而直入究竟菩提如乘神通日月通聲聞通佛通而行瞬息即至利根也論曰無常為空初門空為無生初門無生助佛道門隨根性之利鈍而初入觀門之不同如此夫上根百千萬億不得一生而知之不可以力求其有不甘墮外道凡夫聲聞中者則中根猶可勉學而行之行之道從性空見悲濟行菩提願之相資不偏中求第十三章笈多王朝之佛教第一節王朝之盛衰與佛教乘南北朝之衰中印民族得徐徐恢復其勢力佛元七百零八年有旃陀羅笈多者出孔雀王朝名臣之裔創立笈多朝都阿踰陀子沙母陀羅嗣立統一五印一時國力充實文事大啓上追孔雀王朝之盛也初印度之語言文字隨方各異動輒彼此不相通佛世前後有耶斯卡巴爾尼等據吠陀梵書奧義書之語法而整理之成文法精密之梵文釋尊化世務求平易近人聽隨國音讀誦但不得違失佛意故佛弟子之語文不一四大派以四種語安達羅學派以南印之俗語集經摩哂陀南化於錫蘭者於佛元三百零一年無畏波陀伽摩尼王集僧於大寺審訂三藏聞即以巴利語出之蓋時梵文雖興猶未遍行於全印如彼迦王之刻文亦即隨地而稍異也自中印毀佛婆羅門教再起雖政治之角逐卒告失敗受制於異族者凡二百餘年而從事文化之新生則頗有所成西北印婆羅門文化發祥之地也佛教傳布於此者多以梵文寫經亦事理之當然者迦膩色迦王時北印流行之大乘經説一切有部之經論即以梵文寫之馬鳴之詩篇及三啓無常經即梵文文學之傑作也笈多王朝與梵文學偕興史家稱之為古典時代或印度之文藝復興如彼訶利陀沙之史詩戲劇雖千載以下讀之猶令人嚮往雕刻建築亦多崇高圓熟之作以梵文之興梵我論之神學數論勝論正理瑜伽諸學派亦日見隆盛佛教於此時如唯心論之確立因明之大成則亦特放異彩者也龍樹提婆宏大乘雖北盛於西域南行於南印然外小交脅猶未能大通無著世親學出説一切有譬喻論者承性空論之衰唱虛妄唯識論事則現在幻有理則真實常在與龍樹學異無著世親自犍陀羅來以國都之阿踰陀為中心沿西海岸南下與南印學者接如世親及門上首之安慧南印羅羅國人陳那多住摩訶剌陀作因明於安達羅德慧遊化於伐臘毗此西系之唯識論也時東方之摩竭陀於佛元八百年頃法顯智猛目擊華氏城之佛教賴婆羅門大乘學者而住持智曰遇大智婆羅門羅閲宗顯曰有一大乘婆羅門子名羅汰和婆迷賴此一人弘宣佛法師名文殊師利國內大德沙門諸大乘比丘皆宗仰也大乘大般涅槃經即於此得之東出濱海之耽摩栗底法事甚盛放海南下師子國亦大乘上座二流並暢考其時來華傳譯真常心論者如曇無讖中印人持大涅槃大集金光明地持等經來求那跋陀羅亦中印人與求那跋摩經師子國來出勝鬘楞伽等經傳説現存之楞伽經即那爛陀寺之殘本於蘊處界中不即不離而有真常之覺性乃真常唯心論之特徵其學蓋以大衆分別説之心性本淨融犢子系不即不離蘊之真我成之摩竭陀本上座分別説之化區南印之大衆學沿東海岸北來流行於雪山恆河間之犢子系華氏城北毗舍離東之伊爛拏鉢代伐多迦毗羅衛舍衛波羅奈鞞索迦劫比他以玄奘所見並宏犢子系之正量部南下而交流於此摩竭陀故都所在之真常唯心論西與阿踰陀並峙東系存大衆分別説之舊編集者不以名聞西系則富説一切有系之精神乃推思想之傳承於彌勒而論視之虛妄唯識論以無著世親之宏闡一時大盛東行於摩竭陀那爛陀寺之爭論以起那爛陀寺奘傳鑠迦羅阿迭多帝日王始功迄戒日王凡歷六帝七百年藏傳無著世親並於此弘通然漢傳無東下之説法顯智猛亦未嘗言及那爛陀寺之蔚為中印最高學府實世親以後事也建寺之六帝戒日而外笈多及伐彈那王朝均無其人考玄奘留印之時戒日王中印而摩竭陀別有王統今王祖胤繼接無憂王即戒日王之壻矣其父滿胄王嘗建鞮羅釋迦寺作大銅佛像與戒日王並世而早卒蓋摩竭陀雖受命於笈多朝而王統猶未絶也那爛陀寺之修建應即摩竭陀諸王之功而今莫可詳考矣地本佛世之庵摩羅園六帝相承廣事修建約始於笈多王朝之世胸奴族被逐於漠北遠走中亞西侵歐洲東則於佛元八百五十三年頃掠北印占健陀羅時笈多王塞建陀在位悉力禦之始得遏其南下然笈多朝自此衰矣八百七十三年那羅新哈笈多奘傳作婆羅阿迭多即幻日立胸奴復大掠占北印其酋多拉馬拉立胸奴王國勢力日強八百九十八年胸奴王密希拉古拉立逞其劫掠民族之特性北印佛教乃陷入法難之厄運付法藏之師子比丘於罽賓大作佛事為彌羅掘所殺法統乃絶西域記摩醯邏矩羅大族毀滅佛法並即此事也胸奴之鐵騎南下大掠那羅新哈出走避之於海島計破密希拉古拉而生獲之笈多王朝宜可以復興矣惜那羅新哈縱密氏歸而己亦旋卒九百二十八年不數年密氏重占北印毀佛更甚五印各族咸據地自為笈多王朝乃亡第二節小乘學之餘輝自十八部分流聲聞極一時之盛爾後或衰竭或融合或回入大乘加以經律既定思想以辨而愈明成三系四派末宗乃漸無聞焉説一切有系初為發智心論譬喻之分次以大毗婆沙論之編集內為自宗別系之相拒外為大乘性空之所掊擊相摩相蕩思想又有新啓發終乃導出虛妄唯識論也健陀羅心論系之法救於七世紀作雜心論溝通婆沙心論申一切有之本宗經部師初從説一切有系中出立三世恆爾之一味蘊作用起滅之根邊蘊説異生位中亦有聖法此則以三世恆爾之染淨法體為不離現在作用而存在者逮鳩摩羅陀出立説漸備雖一反有部之舊説過未無體無有中有隨眠異纏無色界有色無心定有心與大衆分別説近然立論大本緣起是有為化有部之體用為種現和合相續仍有部假名説之舊則猶不妨其為説一切有系也譬喻者之精義為種子業力感果其説明頗難前生之業力剎那即滅何由能感後果過去非實有則業力必潛存於現在無疑乃自種子生果之事例悟入業種如生果之能力不離所依心心所法而潛流依心心所之相續演變如根芽之相續種業增長成熟而感果如結果其説於婆沙猶隱而未詳龍樹中觀論則敘而破之種子説之確立約為婆沙中論間自婆沙出一切有之分化彌甚譬喻者融有部諸異師其説乃大昌世親同時先德有室利邏多執勝順正理論呼之為上座於阿踰陀國著經部毗婆沙以順正理論所敘者觀之則大反發智者也經部譬喻學者立種子義大同而於種力不離之所依其解説間異室利邏多師資仍譬喻者之舊立滅定有心乃以心心所六識相續為受熏及所依先軌範師用有部舊義滅定無心乃立六處色心為所依一分經為量者於六識外別立一集起心為受熏及所依則經量回入大乘之學者也經部既盛説一切有之本宗為之搖搖欲墜乃有世親作俱舍論以救之世親犍陀羅人於説一切有部出家精説一切有三系之學乃取精用宏而為之折中成俱舍論論承阿毗曇心論及雜心論之統雖以婆沙為己所宗而不事盲從其組織次第同雜心而少為改作頌文仍雜心之舊者亦十之四五此可勘而知之然俱舍意取經部之善説則非復雜心之舊矣俱舍論於阿毗達磨不信其為佛説視為傳説破發智學者偏執師承之固陋於經部之過未無體種子熏生不相應行無實多所引述每藉論議往復以彰有部舊義之有待修正於辨論不決時每以經部不違理故婆沙我所宗故不了了之其明宗婆沙意存經部之善説蓋明甚也然俱舍所尊信之經部師乃先軌範師不取上座師資此可於種子之六處受熏解緣起緣生之別而知之先軌範師乃經部而折中有部之學者也以是俱舍論主之在當時實雜心系之先覺者非全捨心論及發智之説以從經部也流通頌云迦濕彌羅義理成我多依彼釋對法少有貶量我為失判法正理在牟尼蓋確論也迦濕彌羅有衆賢者悟入之弟子青年英俊頗不以俱舍之明宗暗抑為然乃竭十二年之心力以其人之道治之為俱舍論作釋名俱舍雹亦曰順正理論於世親猶疑取捨處一一翻破譏世親之未善婆沙兼斥時行之經部又約順正理論之正義成顯宗論婆沙大義自有所難必欲一一為釋反墮於失宗之譏如以有法能礙解非擇滅出婆沙正義外後人乃以新薩婆多稱之衆賢曾挾論南下求與世親面論世親聞而避之衆賢至秣底補羅病卒乃不果舊傳世親潛入迦濕彌羅從悟入受婆沙論次還健陀羅講婆沙日攝其要義為一頌乃至以金請釋云云又謂衆賢死時遺書世親懺謝乃為易名順正理云云並出唯識學者之傳説不足置信此不暇廣辨也時悟入曾作五事毗婆沙論私淑衆賢之無垢友世親弟子德光作辨真論等百部弘一切有義安慧則致力於俱舍然回小入大之勢成大乘阿毗達磨興而西北印之小乘自此衰矣胸奴之掠亦其一因傾向經部而反發智婆沙者復有訶梨跋摩師子鎧訶氏中印婆羅門子善數論出提婆世親間初學説一切有之發智恨其支離乃東遊華氏城從大衆系學者遊作成實論力闢説一切有多用經部説而亦不拘所宗引數論義以入佛乃謂四微和合為四大四微實而四大假特異於諸家之説成實以滅三心為滅諦初滅假名心則我空柱等假名亦空也次滅法心即法空次滅空心則空相亦遣三乘同見一滅諦而得道滅三心以契真真非即無性之謂蓋一經部學者融大衆分別説之空義成之於大乘性空則猶有所滯也大衆分別説犢子諸宗以記載不詳苦無可論唯覺音之南遊師子國錫蘭則確豫海南佛教以深大之影響者也摩哂陀南化開上座分別説之銅鍱一宗國王建眉伽精舍以處之即後之大寺也佛元三百年頃無畏波伽摩王信心轉深乃建無畏山寺因之新舊對立為二部一曰摩訶毗盧住部斥大乘習小乘一曰阿跋那祗釐住部學兼二乘無畏山寺之建疑有名德自大陸來者以大陸流行聲聞兼大之佛教傳入師子國乃引起紛諍惟事無可徵闕疑而已銅鍱學者傳説此時無畏王集五百衆於大寺審定三藏以巴利語寫經乃歸於一致云銅鍱者拒外來之新義乃記録巴利語為經以固己宗事或有之然無畏山寺乃無畏王所立學兼二乘發揚如故初不以巴利語之録集而稍衰提婆自錫蘭來法顯於其地得化地律等譯真常唯心論者如求那跋摩求那跋陀羅均遊化於此玄奘於達羅毗荼國遇自師子國來之覺自在雲等三百餘僧從之問大乘瑜伽義唐永徽年來華之那提三藏特精中觀曾於師子國搜集經論梵本五百餘策是知師子國之佛教不但銅鍱一派中觀瑜伽即祕密教亦曾暢行其地摩竭陀有摩訶提婆大天僧伽藍其先獅子國王之所建多執獅子國僧玄奘留印之世摩竭陀為大乘中心師子國僧遊化其間何有不弘通大乘於故鄉之理考玄奘目擊之大陸佛教大衆系似少衰摩竭陀羯𩜁伽跋祿羯呫婆蘇剌侘及傳聞之獅子國並大乘與上座分別説兼行獅子國之無畏山寺派即此其上座分別説與銅鍱近而會歸及不礙大乘則異今日海南佛教之同宗銅鍱部乃由復古思想之反流而成非初即爾也覺音本中印學者精識三藏有感於大陸佛教之未盡乃承師命而南遊錫蘭時佛元八百年頃法顯西遊時或曾一見之覺音留學錫蘭精巴利語佛世方言之一乃作清淨道論並以巴利語注釋聖典大為時衆所重時大陸佛教為梵文復興之氣勢所使初期之方言佛教演變日多不特將會歸大乘且有流露佛梵融合之傾向覺音殆有感於此乃南遊於巴利語盛行之錫蘭歟以其語為佛世之摩竭陀語以其學為上座分別説之根本雖有乖事實而發揚保存方言佛教之一與梵文相格拒則頗豫海南佛教以新機運也覺音以後師子國仍有大乘流行其為巴利語佛教所統一遠及緬暹或疑有一大力國王以統一之吾以為不然大乘佛教之末流情勝於智辨過於行華飾而不實惟恃不斷之創新立異以圖存逮大陸佛教衰思想失其創新之源即流於滯礙消沈銅鍱者本初期佛教之精神平實朴質加以巴利語之助乃逐漸得勢耳此如中國佛教一失傳譯上不斷之創新臺賢唯識莫不陷於沒落平實朴質之禪宗乃得獨盛此雖興衰之原因不簡單如此要亦可為例證也臺賢於中國之思想界關涉頗深而文字尤國化乃得漸次復興則亦猶巴利語之於錫蘭也彼辨飾而無行繁瑣而不要文字思想不能融化者縱有大力者之助恐亦難以久存歟本無文化之民族例外第三節因明之大成因明胚胎於辨論術其始不可得詳昔奧義書時代學者競留意於窮理達本之學論風漸熾擊鼓以求是非其優勝者國王且從而優禮之聖德格耶奧義書有辨論法之名以究理著名之勝論及尼夜耶正理派並興起於此時以辨論法為學而研探之謂其始於此時亦無不可也初於斯學深研者屬諸外學之尼夜耶派傳説創始者名足目云迦膩色迦王侍醫遮羅迦其著述旁及論法之典則馬鳴大莊嚴論有五分作法之名尼夜耶派之於此時已頗有進展或已影響佛教矣彼派之正理經立量等十六句義約成形於佛元六七世紀頃龍樹作回諍論精研經力斥其義然亦病其執有自性非世諦假名無是非邪正之謂也有方便心論者傳龍樹作開論法為八析過類為二十以譬喻為首雖開合有異次第順正理經見邊以下諸句蓋佛教之論法初固有取於正理派略事剪裁以備顯正破邪之用方便心論所謂如為修治菴婆羅果而外廣植荊棘之林今我造論亦復如是欲護正法是也真諦譯如實論反質難品舊傳世親作陳那力辨其非此佛家因明之古説也笈多朝文化復興百家競進非雅善論術幾無以自存佛弟子乃深研論法卓然成家名之曰因明於此特多功績者則瑜伽學者也尼夜耶派之重視論法意在深知事理之真以得解脫故以量為初量者正確之知識也正知因四事得現見所得者曰現量依現見而推比得者曰比量引譬類而例證得者曰譬喻量依聖典聖説而得者曰聲量即聖教量以此四而得正知正知量之所依即是因也方便心論以知四量為知因以此然印度論法初意本在悟他即研求論議之軌式俾得依之以判是非曉未悟故論法中不單為論理之是非即論場評證者語言之巧拙詭辨咸在論求之列昔世親之師即以言辭不次而被判為墮負吹求於形式頗涉漫衍之弊逮無著傳瑜加論始創因明之名釋為於觀察義中諸所有事顯揚即作論議集論作論軌則猶辨論法也論以自性差別二者為所成立以立宗明因引喻同類異類現量比量至教量八者為能成立世親於此學傳有論軌論式論心之作惜乎無傳窺基以論軌説能立有三一宗二因三喻則化五支之繁冗為三支論法世親實啓其緒佛元九世紀頃南印有陳那大域龍者親及世親之門於因明特深研尋其著述之有關因明者凡八論以因明正理門論集量論為著門論明立破真實詳正確之論式量論則釋成量義詳正確之知識一重悟他一重自悟二論相資發明未可輕重其間也陳那於論式以立敵共諍之宗支為所成立以共許之因喻為能立因具三相固已善成宗法惟因支特詳遍是宗法性故於同品定有性異品遍無性之二相舉同喻異喻自正反兩方證成之喻即因之一分因明乃名符其實此與古學之以譬喻為首迥乎異矣於量論不取聲量不僅所量唯自相共相之二亦以各守宗承為是難以見事理之臧否也其於立破現比辨析精嚴可謂斯學之泰斗矣其弟子有天主著因明入正理門論有自在軍亦善此學佛元十一世紀南印鳩陀摩尼國有法稱者從自在軍受集量論反復研尋深見陳那之意乃作正理一滴等七支論以釋之又使弟子帝釋慧為釋凡三易稿而後當意法稱於因明間有廢立如以喻為非支宗過無不極成等蓋受耆那教因明之影響也佛教自因明大盛學風為之一變造論講學無不奉以為規矩後期佛教論理之多細密實受其賜昔之視論法為外學者今則佛法當於因明處求抉擇事理起信生解在在有賴於因明因明乃成入佛之要學也後期之性空論者清辨月稱輩且以之而立説有異唯識學者以不立教量唯理為宗故陳那以後流出隨理行之唯識因明本於論法雖量論重自悟然為之者多用以申自摧他知以因喻證成己之所立求得敵者之信解於創發新知即依已知以推所未知則其用殊鮮今之西藏抵掌雄談猶有五印之風而陳陳相因於文化亦未見所益即就論法而言勝軍二十年立一量玄奘以為有過清辨立真性有為空量唐人競出過難而十異八九玄奘立真唯識量或為之出決定相違立量之不易又如是重論式而論式不易宜斯學在中國之晦也第十四章虛妄唯識論第一節無著師資事略無著以彌勒為師世親為弟子創開唯識一宗於瓦玉雜糅之後期佛教中精嚴明淨勝餘宗多矣無著兄弟三人北印健陀羅之富婁沙富羅今之白沙瓦人無著其長兄也真諦傳其初於薩婆多部或云化地出家修小乘空觀久而無徵欲自殺賓頭羅來教之乃得悟入然意猶未安謂理不應止爾乃上升兜率問彌勒大乘空義思惟得入因此名無著云藏傳則謂初修彌勒法十二年竟無所得心生厭離去而之他後以割肉飼蟲因緣感彌勒現身因偕往兜率為説大乘云無著初曾思惟空義不愜於時行之空觀經長期之聞思得彌勒之學乃別傳唯識無境之空觀則其學歷之大概也無著之學傳自彌勒或言上升兜率而問之或言請彌勒下降阿踰陀國瑜遮那講堂於四月中誦出十七地經即瑜伽本地分然親見彌勒者唯無著一人編集十七地論而初傳其學亦即無著其人然則無著之師彌勒不亦可疑乎彌勒族姓之一印人多以姓為名不必即兜率之彌勒也姚秦之世有印人來華譽羅什三藏為蔑帝利以來第一人蔑帝利即彌勒也道安傳有彌妬路刀尸利與彌勒衆護婆須密並稱四大士薩婆多部記目録三十五祖提婆四十二祖摩帝麗四十四祖婆修盤頭即世親傳燈録之旁系十祖有摩帝隸披羅其人十二祖即世親提婆以後世親以前説一切有系確有一代名德名彌勒者無著集其學以傳乃誤傳為兜率之彌勒菩薩耳無著世親似有意作此説如以九華山之新羅僧地藏為地藏菩薩也無著所傳之彌勒論凡五一瑜伽十七地論自曇無讖創譯地持經至玄奘譯瑜伽論凡經二百餘年並以此為彌勒説地持經且明記為彌勒藏傳以此為無著作後期之誤説不可信也或可攝決擇分以下出無著作二中邊分別論三分別瑜伽論藏傳無此有分別法法性論四莊嚴大乘經論五金剛般若經論藏傳無金剛論別有現觀莊嚴論此後世偽託下當別詳之無著於晚年造大乘論頗多其確立大乘唯識者以攝大乘論為主學貫三乘以阿毗達磨體裁集出之者則莫如集論也承無著之學而光大之即其弟世親初亦於説一切有部出家精學小乘作俱舍論已如前述之世親之中年承雜心之法統擬採經部之長以修正婆沙之偏失觀其用先軌範師之色心持種不取上座師資之心心所持種蓋嫌其有唯識之傾向也嘗作論以誹謗大乘固將以説一切有之進步學者自終矣後受兄無著之感化乃回入大乘無著歿後宏化於阿踰陀國者凡二十五年國王及母后並申歸敬云其著述繁多稱千部論師小乘以俱舍論為著大乘則莊嚴論釋攝大乘釋十地經論等莫不精義入神暮年約唯識學之要作唯識三十論其影響於唯識學者尤多菩提流支譯淨土論傳出世親手一反唯識學之舊可疑無著幼弟比鄰持跋婆奘譯作師子覺亦於説一切有出家嘗為集論作釋云無著師資出世之年代傳説不一考曇無讖於佛元八百年頃創譯彌勒論八百九十五年菩提流支來華創譯世親論嘗作金剛仙論敘其傳承自彌勒無障礙無著天親金剛仙以至於今始二百年許則彌勒約出七百年頃二十三祖師子於九百年頃被殺世親為二十祖前於師子當不出百年左右也今假定彌勒生年為佛元六百五十至七百三十無著為六百九十至七百七十世親為七百十至八百年似無所違難也或者以什公譯婆藪之百論釋及傳為什譯之天親傳推定世親應提早一百年此所謂知前而不知後也玄奘親承之戒賢生於九百十三年其師護法傳享年不永護法師陳那即世親門人又玄奘親見九十老叟之密多斯那即德光弟子德光即世親門人玄奘從勝軍學勝軍曾從安慧學因明安慧又世親弟子世親至玄奘不過三傳四傳耳決不能有三百餘年之隔也然則無著世親宏闡大法之時適笈多朝之盛世約自沙母陀羅笈多末年經旃陀羅二世至鳩摩羅笈多之立亦即法顯西遊什公東來之前後舊傳世親之時阿踰陀國王為毗柯羅摩阿迭多正勤日奘譯超日及其子婆羅秩底耶新日奘譯幻日西域記以為室羅伐悉底國王舍衛然與宏法阿踰陀不合尋笈多王朝無與此二王同名者疑甚或可一王而有異名如戒日尸羅迭多之本名曷利沙伐彈那也第二節瑜伽師與禪者無著學本於瑜伽論巧修止觀而有所契入者曰瑜伽師瑜伽師所依住曰瑜伽師地安世高所譯僧伽羅剎之修行經大道地經覺賢所譯之修行方便又作修行地並梵語瑜伽師地之別譯以是瑜伽師與禪師一也佛世舊有經師律師禪師之別説一切有系則特深於禪佛元三世紀或專宗契經而探其宗要或守師説而推衍分別或專精禪觀而證以內心之實驗瑜伽師説一切有系之學乃稍稍異其趣然於禪學並傳習不廢瑜伽師以五識皆從意識無間生以定自在色為無表色等皆本其經驗以立説以瑜伽師為名而立異義者初見於婆沙逮世親之世則多所引述矣從禪出教本瑜伽師説抉擇而組織之者則彌勒其人薩婆多之學者也近人論此者多偏執聞説一切有即拘於發智婆沙不知乃三系之一聞説一切有系即意謂唯小乘不知佛滅千年印度無大乘僧團大乘學者於小乘僧中出家受戒小不必障大大亦現聲聞身宏大乘學説一切有系之先覺者如童受世友衆護脅馬鳴龍樹彌勒無著世親並説一切有部出家多作大乘學非迦旃延尼子輩比也其學風之精禪觀多論典相同而思想間異者則以出入三系者異也龍樹暢大乘空義然分別説諸法多存毗曇之舊於世友論特多推重斥發智婆沙於經部義亦間用之無著師資則於世俗如幻有中捨三世有而取經部之現在有存毗曇之舊者亦多並大乘學説一切有之先覺者列於説一切有之祖庭無不可也瑜伽師出一切有而流為瑜伽唯識之學者以專精禪思久則心力增強生理變化引起幾多超人之境界神力五通之類雖不解性空事同外道無關於生死之解脫而事則確乎有之説一切有系之瑜伽師本其境隨心轉之自覺及種種因緣日傾向於唯心如深密經之我説識所緣唯識所現阿毗達磨大乘經之成就三種勝智隨轉妙智攝論引諸瑜伽師於一物等凡據以證實唯識者胥出於瑜伽者自覺之證驗然自無著而後從禪出教演為名相分別之學一反瑜伽者急於止觀體驗之風矣禪教之學在印度流為瑜伽學傳來中國則成禪宗漢末安世高傳僧護之禪羅什三藏傳童受世友僧護漚波堀僧伽斯那脅馬鳴之禪覺賢及沮渠安陽候傳佛陀斯那即佛大先之禪此學有二源一罽賓之富若密多羅富若羅佛陀斯那之漸入二達摩多羅疑即雜心論主傳婆羅又傳與佛陀斯那之頓入佛陀斯那總貫二流而以漸入為主菩提達磨則寶林傳謂其曾從覺賢修學云禪者昧於史實或依付法藏傳而唱二十八祖説則以師子尊者入滅於曹魏之世乃以達磨為其四傳弟子不知師子之見殺於彌掘羅時佛元九百年頃梁天監年中正達磨來華之日也付法藏傳之二十三祖並説一切有而與大乘有關其中如迦葉佛大先所傳除迦葉阿難並稟世尊末田地與舍那婆斯同出於阿難之門富那脅並馬鳴所師婆藪盤頭與摩奴羅如意論師奘傳則如意為世親之師陳傳為世親之友此則以為弟子俱不必有師承之關係蓋取説一切有系之一代名德蔚為時宗者先後編次之而已視為師資授受陋矣初五百年至馬鳴之世凡十一世至九百年頃三百年間凡十二世平均每人持法四十年禪者多長壽也或有據薩婆多師資傳而唱五十餘祖説自佛滅至馬鳴亦得十一世迦膩色迦王當漢順帝頃馬鳴至提婆二百年間凡二十四世馬鳴至什公之師盤頭達多三百年間竟達三十七世其雜取後期禪匠以入之浮濫難信遠勝於付法藏傳近人猶有為五十餘祖張目者殊可異也自迦葉下及師子尊者之法統西藏亦有此説彼傳無著升兜率見彌勒彌勒為説般若法門乃傳出現觀莊嚴論此即大法之已中斷者其昧於史實與禪者同豈知師子尊者未滅無著師資之論典已大行中國矣因瑜伽師與禪師而順論及此為妄執傳承者告第三節唯心論成立之經過解説生生不已之存在凡二大流犢子及説一切有系於蘊界處之和合中立補特伽羅以緣起緣生為因果義立三世有大衆及分別説系於心心所之相續中立補特伽羅以緣起緣生為理事義立現在有説一切有系取捨此兩大流而深入之傾向於大衆分別説乃有真心妄心二唯心論也由來學者多以虛妄唯心論為唯識真常唯心論為唯心實則三界唯心即萬法唯識唯心與唯識一也釋尊之明緣起中道識緣名色名色緣識心色不一不異之和合固未嘗以為唯心也然生生不已實以情識為主為導意為前行心尊心使心王識種學者本此尊心由心之聖典而過論之乃入於唯心之門為煩惱之研討者大衆分別説者説心性本淨無始來為客塵所染而有不淨此塵染為間斷煩惱亦為相續之俱生我執不但為起煩惱且為煩惱之潛能隨眠其微細者且為聲聞所不斷習氣譬喻者雖不取塵染熏染淨心説於隨眠及俱生我執則悉取用之此中即有二義一淨心受染説二染心恆有説為業力之研討者譬喻者自業力熏習發為種子説此固大衆分別説者曾有業集之義也業力由熏習而存在生果隨眠亦爾餘一切法又何如推大衆部攝識之意則一一並新熏而存在生果據上座系化地部之窮生死蘊説轉部之一味蘊而論之則一切法種本有由業力之熏發現緣之引生如水之滋種而生芽也此則具二義一本具之熏發二新有之熏成種子之所依固不必與心有關然依心能集起識種之聖説乃自六識為受熏所依達於六識外之細心受熏成一切種識説為苦果之研討者吾人之根身如何能壽極百年而不壞經説識緣名色以心之執受也六識不遍執不恆執大衆末計乃説心遍於身有細心執受説一期生命之開始終了上座末計之銅鍱部立意識細分之有分識本計立生死等位別有一類微細意識與粗意識得並生即立七心成生死細心説六識常間斷如何得斷已復生大衆部立根本識如樹依根意界是常論者説六識雖生滅而意界常住意界即識根以是有現在意界説凡此種種莫不根源於釋尊之本教自不同之問題初由大衆分別説系大成細心説次由譬喻者大成種習説綜合而成唯識思想之一端大體論之承大衆分別説系之正宗以真常之覺性為本詳於惑障之熏染而建立唯心者為真常唯心論承譬喻者之説以生滅之虛妄分別心為本詳於熏種感果而建立者為虛妄唯識論也大衆分別説經部譬喻者淨心受染妄執恆行一切種識細心執受生死細心現行意界真常唯心論虛妄唯識論且自虛妄唯識之境空義説之犢子系之正量部心識能直取外境一切有部等以心識之緣外境有境相於心識中現名曰行相其總名總相雖無當於外境之實在然見其為青為白嘗其為苦為辛則確契合外境之真實相也譬喻者起而説境不成實十二處皆假意謂隨心情而苦樂異隨業感而水火別隨凡聖而染淨殊吾人所知之境相能知心識之假相而已然假必依實一一法從種子生之十八界性為超認識之實在固未嘗無也種子熏依在內心及其生起境界離心而有別體蓋大近唯識而未是瑜伽本地分之辨真實於心所行及依言自性之底裡確立離言自性為勝義有此勝義有者即一切法未嘗以為即心為體則猶經部之舊也觀其引聲聞藏之轉有經義品散他經以證可知龍樹以緣起為觀求實性了不可得故勝義一切空世俗假名有無著師資承經部之學雖亦以生滅緣起為觀而不出假必依實之見故不以一切空為然其立論云要有色等諸法實有唯事離言自性方可得有色等諸法假説所表非無唯事而有色等假説所表若唯其義心所取境無有實事既無依處假亦應無則其説空説假迥異於性空大乘矣此依言自性義不離心識名相之假立空之可也此離言實性之實有唯事何事而能證知其為唯識以識為體乎若種依六處如先軌範師説則固無成立唯識之可能然諸法種子以心識為所依所熏不一亦不得異此識中種子所生實有唯事之諸法雖有十八界之別要亦不能異識以是因緣所生法即虛妄分別識為自體此則推理而知之若拘於識因外色如入歡喜園而歡喜入粗澀園而忿恨根身如隨根之明昧識有變異而變異以枯樹有種種界而隨觀不同則固難以成立唯識然今則諸瑜伽師於一物種種勝解各不同種種所見皆得成故知所取皆唯識此則實驗而得之捨一切空而以離言實性為不空進而以此離言實性即心心所為體唯識無境之學於是乎成矣第四節虛妄唯識論述要虛妄唯識論源於瑜伽之本地分中邊發其端經莊嚴至無著之攝大乘論而大成以一切種子識為本種子識變現之唯識也用種識不一不異之不異義唯識學又反流於瑜伽成攝決擇分至世親之唯識三十論而大成以三類分別識為本分別識變現之唯識也用種識不一不異之不一義此二流立義多異而實相資發明且依攝論述其要一切有情無始來有心意識三者雖義可互通而各有其特勝了別境界者曰識依根而了別六塵故別之為眼識耳識鼻識舌識身識意識六者而實唯一意識性依意而生而雜染依意之識名意識也為彼識所依止者曰意過去無間滅識為後念意識之生起所依者曰等無間之無間滅意現在與我見慢愛癡相應執阿賴耶識為自我為彼俱時了境識之雜染所依者曰思量之染污意唯識學特重思量意意及識之所熏集而依之轉起者曰心種種法熏習種子之所積集彼意及識因之而轉起心意識三者中識為一般之認識意為蒙昧之我執心為生起萬有之識能也唯識學以種子心為所知之依集一切法之熏習起一切法之現行如彼庫藏入者入於此出者出於此故名為阿賴耶識阿賴耶意譯為藏依處之義也辨一切種子阿賴耶識以三相直論阿賴耶識之自體一味如流固難以差別形容之然以一切雜染法之時時生起知一味識有能生之種子性此能生識種為雜染法之生起因曰因相亦曰一切種子以識流之相續而生知有無始來之熏習受熏種識依雜染法熏習而起曰果相亦曰異熟識即此異熟一切種識為阿賴耶識自相攝持種子識為自相功能差別為自性攝持種子者功能差別也依一切雜染品法所有熏習為彼生因即阿賴耶識之自體也種即心之能心乃種之集賴耶以種子識為自性然則種習即賴耶識乎不可説離賴耶有別體亦不可説一何者種習一味和集之心流曰阿賴耶一一法之功能差別性曰種習如比丘之於和合僧然僧即比丘之和合而比丘有來者去者和合僧如故不可説一非謂種體異識體也唯識學立一切種子識為本者以其為雜染法之所攝藏一切從此生則賴耶為因性一切熏於此則賴耶為果性賴耶為果者種習和集之心流相續不斷故堅住一味不明了故無記種習和集故可熏雜染法起必與種識俱故與能熏相應必如是而後成所熏故唯賴耶為所熏也種子心依雜染法而俱生俱滅引起能生彼雜染法之因性依熏染而有彼因性即名之曰熏習熏習有無限之差別略攝則為三無始來虛妄分別之轉現起識依名計義依義計名名義相應而取所分別之境相心思口議熏成名言熏習即遍計自性種或名相分別戲論習氣此攝一切熏習盡餘二則就其特勝而立之染污意內取一切種之心流恃我著我熏成我見熏習了別境識之善惡性者熏成有支熏習以雜染法轉識之熏習賴耶相續生中起三熏習則阿賴耶識為果相也其有支熏習新熏於識中為愛取之所熏潤視其善惡之別感發一切種子心中一類自體熏習展轉成熟生後有之異熟自體業感自體熏習而異時成熟於相續生中為一期異熟之生能則賴耶為果相之異熟識也賴耶為因者阿賴耶識為種子有虛妄分別所攝諸識生種即識之能識能所起之一切法即以識為性一切法者中邊約為似根識似塵識所似我識似了識能四者莊嚴約為所取三光之句器界義境相身根能取三光之意受五識分別意識六光攝論則類為十一識蓋唯識學之初創乃總攝世間現有之一切為數類以此並從種子識生故一切唯識此立本於種識變現之唯識也十一識者以賴耶之有支熏習為種故現起苦樂果報死此生彼之差別相曰善趣惡趣死生識以賴耶之我見熏習為種故現起根身資具為我我所攝取之差別相曰自他差別識以賴耶之名言熏習為種故現起餘九識以生死相續有時間相之世識以往來彼此有器界相之處識以有情無量有數量相之數識以有情之互相表示有語言文字之言説識此四及前二皆依名言熏習所生之自體而假立非別有實事也實有之唯識事不出十八界性攝為五識從名言熏習為種現起眼等五根曰身識現起染污意為根身所依曰身者識現起無間滅意為能受用六識之所依曰受者識此三六根也現起色聲香味觸法六塵為彼彼根識之受用了別曰彼所受識現起依彼根而了別境之六識曰彼能受識身身者等五識為自體餘六識為差別凡此悉從賴耶種子生則賴耶為因相也然種生現行何以成其為唯識乎此當求之於分別識變世間之現起者有分別識與所分別義境相二類此常識所知也所分別義相似離於心行名言然離心行名言相吾人不能有所知所分別非他分別心之影現而已吾人所以覺有所分別之義相離心而存在者則以分別心於一切法中名義相應分別計度而生熏成名言熏習從此名言種生時即自然而現似分別所分別相所分別非義而義相現吾人乃為其所欺耳以分別現似所分別知一切法唯識分別識變之唯識也以即識之分別所分別熏種種亦識也識種生現現亦識也即此種子識變為因變分別識變為果變以之組成唯識學則阿賴耶識為義因識曰根本分別自賴耶生者彼能受之意識識受者身者之所依止意現似分別者曰見識餘色等一切識現似所分別者曰相識此見相二者亦曰顯相分別緣相分別或非色識色識也心為種識意及識從名言種生似分別所分別二相現為現識直約八識論之則阿賴耶心為種識意及識為轉識也以是種現因果熏變之説成而生死雜染之迷界生生不已而存在矣立本於分別識變之唯識與種變説略異此應上溯於瑜伽瑜伽本地分初不明唯識其説識以現行為本自現行而達於種子心先明五識次攝餘為一意分別之則了別境者為意識無間滅及恆行意為意一切種子阿賴耶識為心五識以賴耶心為種子依五根為俱有依於意則但曰彼所依者種子依謂一切種子阿賴耶識為唯了境識有種子依為恆行意及心亦有之歟又何不説俱有依耶推瑜伽論主之意則實唯一意以其了境或間斷為識具一切種子為心固未可機械分析之也瑜伽論主採現行識論而觸發種子心攝論主即據種子心而立唯識學即識之種為心轉起者為意及識意識以恆行意為俱有依恆行意以賴耶為種子阿賴耶識為種子更不論種子及俱有依但依轉識之熏習而起耳攝論初成之唯識乃自種子心以達現行識與本地分之説明異攝決擇與三十唯識論大成分別識變即依攝論心意識之唯識學綜合於本地分之現行識論以是於意及識之轉識外別有持種受熏之現行阿賴耶識恆行意與賴耶俱轉乃亦有俱有依矣言唯識變則明三類分別識變於種子識變分別所分別其義漸疏言現識則本地分攝論唯七識決擇分別立八識也瑜伽之深入五識眼耳鼻舌身意識間斷識意恆行意心種子心種子界現行界攝論之演繹現行界種子心種子界分別所分別身識身者識意能受用識識所受用識六根六識六塵決擇分之綜合種子心意識唯識論加種子似根似塵似我似了分別所分別自生死雜染向解脫應知有三相焉依他賴耶種子為因而生者以虛妄分別為自性者十一識曰依他起相依他起即如幻之緣生法不出惑業苦三雜染滅之乃得解脫不可以為都無也雖一切唯識然無始來戲論名言所熏生故不期然而有分別所分別相於唯有分別中似有義相於心上現此所取之義相曰遍計執相義相實無唯是遍計心之所遍計耳緣生妄心有所取似義無義相無實故空非妄識亦可空有心無境唯識學之根本定義也於唯有識中似義相永無有性曰圓成實相此即真實性雖本來清淨常爾而以無義相所顯曰空性非即是空也此空有妄真之辨不但以明唯識無境之理於所分別而觀其義相之無實即解脫之要道也然此從有相有見應知彼三相偏依分別識變未明種識變於清淨涅槃之解脫猶有待也何者依他是雜染事遍計是雜染因圓成是寂滅性然則縛脫既失其連繫出世聖道亦非三相可攝無著論於生死雜染之解脫以轉識為雜染以種識為雜染種習所和集了無真心論之痕迹蓋真常不變難以明生死流轉之事也然於轉染為淨之解脫事則立雜染清淨性不成之依他起立四清淨法之圓成實與真常論相接種識以遍計所執熏積集一切戲論種識種和融不二種生滅而識亦生滅此雜染種識為雜染依生唯識為性之依他起自然而義相現以能所遍計成雜染分之生死事流轉無已然種識雖判然雜染而所以生滅雜染在遍計執之熏習也設離遍計執熏則染依種識轉為清淨法界矣以染熏淨熏之不同成虛妄性識之阿賴耶識真實性智之法身為染淨法之所依染淨有差別而阿賴耶之真實心性不異法身之真實也染熏而覺性成生滅雜染之阿賴耶識依種識而一切唯識現賴耶立名偏在雜染此則成生死也然雜染識非一成不變者若聞思淨熏初雖猶為虛妄性所隔久則直與真實性相融成不生滅清淨之法身法身究竟即大圓鏡智依種智而一切唯智亦一切圓成實矣立雜染清淨性不成之依他起則以此真實覺性無始來隨染而染修行則隨淨而淨也詳言之學者聞正法界等流之聖教成聞熏習為出世心種此聞熏習寄存於染種和集之阿賴耶中而其性能則適為雜染種識之對治力能發淨智以現證法界故名曰法身種子是法身解脫身攝然未與法身相融猶是世間事也依聞熏而起如理作意初觀遍計性之義相無實次則境無故識亦不成進觀此依他起之似識相亦非有以聞熏之久熏染種之功力日減淨能漸增地前之菩薩名損力益能轉轉即減彼種即妄識之染力益此種順法身之淨能逮聞熏融真遍計依他俱遣則有出世無分別智現前現證法界成無漏智種爾時無分別智生則真實性無義一分顯現分別心生則遍計性之義相又現然以通達法界實性轉去二障粗垢得種即法身一味之淨依為無漏法所依初地以上名通達轉轉得之淨法身係清淨不變之圓成實性依之而現起者亦圓成實性七地至十地念念現證真實性遍計相不復顯現曰修習轉時雜染種識中微細障習猶存亦即清淨智種之淨依未圓逮因圓果滿雜染之一切種識失其存在唯是清淨真實之法身顯現亦即淨依究竟佛果名果圓滿轉以所依之染淨不成離遍計熏最清淨圓成實故所起之正教正行皆圓成實亦可名為依他起之清淨分也轉依者離遍計相捨染依之染種染現識顯現最清淨之實性曰無住涅槃即斷德契真實性得淨依之淨種淨現智圓滿究竟之實智曰無上菩提即智德一言其寂滅一言其圓明不一不異之差別説也智德者昔之雜染為唯識今之清淨則唯智心本淨性法界與淨熏融然一味為淨法之所依猶雜染之有賴耶種識也此即轉阿賴耶識為大圓鏡智自在明徹攝持一切而不失為諸智之所依一切法於中影現常恆不變清淨圓滿蓋即覺之淨能也依圓鏡常智而起者轉恆行意之我我所執為無分別之平等性智達自他不二悲深智極染意從種識生而實指即種之妄識意所謂末那即阿陀那也此平等性智亦爾悲智圓證之實覺具一切淨能而融入實性鏡智取即覺之淨能此則取即能之淨覺現證無上菩提即此轉意識之遍計度為妙觀察智通達自相共相一切無礙自在應機説法轉前五識之取五塵為成所作智作種種變化利生之業此實翻染成淨之談無漏融通固不可作隔別之見證此斷德智德者即佛總智斷為體無別佛也攝末歸本而論唯一法身以法身由圓鏡平等觀察成所作智自在由轉識蘊依故若就所見而本末別論則安立三身為凡夫小乘所見者現八相成道名變化身為地上菩薩所見者於淨土中説大乘法名受用身此二皆依法身為依止法身亦名自性身此二不同者法身詳覺之實性為佛功德所依而法身即自性身則攝一切法自在轉為受用變化所依止詳實性之覺也此二即轉阿賴耶種識與恆行意成之攝論莊嚴立義大同彼以八識為現行者則安立三身四智多有不同矣第五節真常一乘與唯心後期佛教有三特徵即真常一乘與唯心以此格量虛妄唯識論則無疑為後期佛教也真常者中期判二教以性空為了義為勝義後期則判三教以一切空為不了義別有不空之真常如涅槃經無眩翳所見之染月見圓淨之明月不但見空其所無並見不空之妙有妙有即恆常不變清淨自在之實體虛妄唯識者自瑜伽深密以至成唯識一貫之見解以一切空為不了如言取義為惡空遣遍計所執性故説無自性空非依他圓成亦無然其説特斤斤於依他起不空不直明真常之圓成實不空而寄依他不空以顯之故或稱之為以用顯體如以依圓為事理如成唯識論所説則僅為説一切有我及我所無有為無為有之修正如以依他為虛妄雜染圓成為真實清淨含如智則以虛妄識之實有唯事因遍計義相空顯真實淨智之實性初則以妄用顯真體現證法界已則轉而為即真體以起妙用矣體用備明之圓成實性以身則法身自性身以智則鏡智平等智常恆而妙用無方律之以真常論無不皆宜宜莊嚴攝論之明身智以法界為本與真常者之堅慧論同彼以妄心不空而顯真智不空可謂外虛妄無常而內真常立説至巧而終不掩其時代之色彩也後期佛教以一切有情有如來性無不成佛故一乘是真實説三乘乃方便教與中期大乘之大小並暢異虛妄唯識論者獨以一乘為方便三乘為究竟近於中期殊可異也實則虛妄唯識者出現於後期之初承説一切有之緒適化於小乘隆盛之區論理所至雖法華經等已高唱一乘然以一乘為究竟難以求適應乃多少含容言之然小乘聖者可回心唯入無餘者則否是亦不追既往已耳中期之三乘究竟同學般若同觀法空同入無餘菩薩以大行斷習氣為異虛妄唯識論則不然瑜伽集論猶三乘並明莊嚴攝論以下之唯識學則獨闡大乘大乘者勝乘也即異小之乘阿賴耶為分別自性緣起以之建立流轉還滅以分別識為依他起似義相為遍計法空所顯性為圓成實唯識無義為觀門如來不究竟入涅槃教理行果一切異蓋亦不共大乘也彼之三乘如實藉資適應或思想未徹而已論其所宏則亦一佛乘也此與詳妄有不空而結歸真常之妙有有異曲同工之妙以唯心為旨歸明甚詳大乘佛教之傾向於唯心非論理所必至而實為事實之所逼瑜伽者重定定心學也禪者之風專於禪觀內省少為事實環境之考察一落窠臼宜其爾也大衆分別説經部等於三業特重意業於三學重慧久之於戒律日感其拘束不見其妙用非墨守陳規即一切隨宜夫繪事後素非不當理然自他共處何能無法則衣食所資豈漫無所制隨方異宜則可漠視律制之原則則不可又豈能以一二獨拔之士離群苦行之機而忽律制乎然化地部正道唯五譬喻者以止觀為道諦三業唯一思一反於釋尊之正道重視身口七支之正語正業如法經濟生活之正命經部依經不依律以為事局而理通輕戒者輒以毗奈耶重在內心之調柔而不知律以攝僧令僧安樂未生諸漏令不生等為用也大乘者承此學風特輕制度有道德之訓條無六和攝僧之制大乘以悲濟入世為心當機多在家弟子修行重四攝六度然形格勢禁未能創立菩薩僧團僅能發揮其隨機適應徒善不足以為政則唯日趨於唯心之救濟而已思想之演進將不止理論之唯心已也雖然於後期佛教之瓦玉雜糅中無著師資之學究難能可貴也薄他力而以願生極樂為別時意趣漸行非頓入神祕淫樂之道不欲以之置唇齒思想亦嚴密且以初自説一切有中出於律制猶重雖不為真常者所滿性空者所重而實有足多焉第十五章真常唯心論第一節思想之淵源及成立真常唯心論乃真常心與真常空之糅合自真常心來非即真常心也佛闢外道之常我以諸行無常諸法無我説緣起然剎那滅與無自性或有本常我之舊見而見其難以成立緣起者尤以在家佛弟子信業果輪回而罕聞無常無我之解脫道者為甚佛教普及大衆而大乘興在家佛學者輩出而常我論起亦自然之勢也常我論之根據內本所見而外依佛説佛説阿羅漢離欲不復有變悔熱惱之情或者化之為無煩無熱常住不變則有類凡心變異而聖心常住清涼矣佛説心意識須臾轉變異生異滅而長夜為施戒所熏則生善處或者先明色身之是滅盡之法離欲之法次説彼心意識常為信所熏因此緣此自然升上則有似色身無常而心常矣是心長夜為貪瞋癡所污或即本之以立心性本淨客塵所染則心淨本然而塵染外鑠矣其解説之尤離奇者如經以心之異生異滅緣此緣彼如獼猴之取一枝捨一枝乃曰獼猴獼猴勿謂如故此訓以無常也或者釋為勿謂如故以即故也央掘摩追佛不及呼曰住住佛答以我住汝不住我常住大悲央掘摩羅經即演此我常住為真我常住而痛斥無常為外道真常心之淵源極早而是否吻合佛意實有可研究者真常心之初意即於六識之心心相續中想見其內在之不變常淨後分為七心或以意界為常而六識生滅或立根本識而六識從之生則真常淨心自應為意界及根本識矣此真常心即輪回之主體縛脫之連繫乃漸與真我論合佛説本生輒説彼時某某者即我身是自作自受佛亦曾説之犢子系乃起而説不可説我説轉部立勝義我此依五蘊設施彼真心唯依心立然於真常唯心論中不復有分別焉現在實有無為實有或五法藏中真常心我僅其一類雖以之為縛脫主體初非總持一體而説唯也大衆分別説者以緣起為無為亦僅緣生法之必然理則非即此理則以成事説出世部之出世法真實説假部之道不可壞佛壽無邊充其量僅為出世之真常論而非真常唯心論真常心而進為真常唯心論實有賴性空大乘之啓發性空者之一切皆空不自無為常住來佛説緣起常識見其為實在以理智而觀察之探其究竟之真實勝義則知非三世實有非現在實有非無為實有非出世道實有一切如幻唯是因緣和合之存在觀待之假名一切無實性乃曰勝義諦中一切皆空此無自性空不如自性之誑惑曰諸法實相自性本來無非觀之使無故曰常不如自性有之染相以或者怖畏空教乃曰一切清淨龍樹説一切空即一切真實常淨然即一切如幻假名非真常論者所見非幻不滅之真常也真常者見性空論之非不無容或想像為同於梵我論之曰非曰非視為萬有實體之真常然非性空者之意也以一切空之啓發真常心乃一變真常淨者一切一味相於一法通達即一切通達以是而諸法實相之常淨與心性之真常淨合常淨之心一躍而為萬有之實體矣了了明覺之心性昔之為客塵所染者業集所熏者成生死而與淨心別體今則客塵業集之熏染淨心幻現虛妄生死而淨心則為一切之實體不一不異至此真常心乃可以説唯心真常唯心論之興與笈多王朝之梵文學復興有關質言之梵我論本立梵與無明幻力二者視為無始之存在釋尊破梵我之實性取緣生之無明業感説自緣生無常而達性空無我離欲入涅槃即為生生不已存在者之解脫所謂滅者即是不可量破壞因緣及名相也如以此寂滅不生為真常妙樂之存在使與無明業感説合則與梵我論之區別亦有所難矣法顯見華氏城之佛教賴婆羅門學者而住玄奘西遊從長壽婆羅門某婆羅門勝軍學處梵我論大成之世而大乘學漸入於婆羅門學者之手求其不佛梵綜合詎可得乎以真常心建立唯心論莫急於雜染清淨之因為客塵所染之客塵大衆分別説者初以隨眠釋之大乘學興煩惱氣分為彼羅漢所不斷之習氣演化為大乘不共斷之所知障此所知障名曰無明住地即習地為隱覆淨心之客塵與經量者之熏習説合流心性本淨即清淨之因常住真心中本具之淨能無始來不離生死之蘊界處而流特未嘗顯發而已此與非即離蘊之我性空者之性空糅合成如來性如最勝天王般若經云如來法性在有情類蘊界處中從無始來展轉相續煩惱不染本性清淨説名無相非所作法無生無滅此如來法性即如來藏圓覺常住真心佛性以及菩提心大涅槃法身空性真常論者並視為一事為一切有情所本具諸佛如來所圓顯者也或有本真常論了義之見以為馬鳴著起信論廣讚佛德開真常唯心論遙與佛陀之本懷相合龍樹無著出各就一門而分別空有此以不知真常心與真常唯心論之別不知真常心之所以唯有待於性空之一切乃有此説今明二義以證其不可一凡性空大乘經但開二教以空為了義真常唯心論之經論則判三教以空為不了以此真常心為我見者外因緣者小空見者指空宗所不解二如來藏佛性之説性空大乘經所不明不特楞伽等後出即般若經等混入之藏心見亦屬後起無著等以破十種分別釋般若經有實有菩薩不見有菩薩文實有菩薩以圓成實為菩薩體解之此即大我之説檢什譯般若及龍樹所依本舊譯諸經並無之如上所引之最勝天王經文舊譯勝天王中無似異而實同之寶雨寶雲經亦無此文華嚴一切衆生皆有如來智慧德相不見於十地經無上依經異譯極多而真諦譯獨廣談如來界大般涅槃經即大毗婆沙論文亦連篇糅集其中真常唯心論詎可視為先於性空大乘經先於龍樹論乎第二節真常唯心論述要真常唯心論之經典頗多如來藏法鼓即法華之真常化大涅槃勝鬘不增不減無上依楞伽密嚴楞嚴圓覺等其顯而易見者雜入一分者尤多後期之密典十九皆屬之有直談真常者每與性空經混以部類之雜多立義亦間異真常唯心論以真常淨為一切之本體而立相對之二元一清淨真心二雜染妄習真常淨乃一切之實體一切依之而成立本來常淨究何事而為雜染所染乎為雜染所染而實不變其淨性似有二元矣此雜染與清淨不相攝相離自有情迷亂而生死邊多立此無始來相對之二元然達本情空知妄即常實無所捨而一切常淨則無不歸結於絶對之一實圓覺經為之躊躇此非論理之可明也豈特難解而已一元之實在論無不於此失據真常大乘者説此唯成就甚深法智或有隨順法智者所信解餘則唯可仰推如來而信仰之以是性清淨心難可了知彼心為煩惱染亦難了知汝才舉心塵勞先起如之何能知之此非因明者之境界也真常者以此妙有為雜染清淨之依止者蓋以剎那無常為斷滅無性從緣為不可能也如瓶破不作瓶事又如焦種不能生芽若蘊界處性已現當滅應知此則無相續生以無因故此以無常為斷滅也若本無有識三緣合生龜應生毛沙應出油究其根源咸有體性何況一切心而無自體此以空為都無也彼七識為念念不住者故不流轉不受苦樂非涅槃因必真實不空常住不變者乃足以為生死涅槃因故曰如來之藏是善不善因能遍興造一切趣生如來藏者無有前際無生無滅法受諸苦輪回之主體彼為厭苦願求涅槃真常者之見與大衆分別説犢子系之立常心真我其動機如出一轍如不於上來二義明見其與虛妄唯識論及性空唯名論之不同則終無以理解其真義讚揚為了義貶抑為不了皆無當也於真常唯心中楞伽經頗有特色舉內外大小行果真妄種現見相等而為宏偉之結構曾不見有真心論而能過此者惜闕佚未盡來華耳今姑據此以談類及其餘楞伽略八識為三識真常不變清淨周遍之心體曰真識無始來有遍計所熏之戲論習氣總即一切雜染熏習別即身語行業所熏此二者交繫而為不思議之熏變真性本淨而為雜染所熏染熏染而性本淨性淨而變為似染之現識此即如來藏為無始虛偽惡習所熏名為藏識如來藏藏識即真識現識之別名也如來藏亦曰如來之藏指真覺在纏為蘊界處貪瞋癡所覆而自性常淨亦可解為如來之因即佛性藏識即藏真相之識則真覺在纏而似不淨此二者佛説如來藏以為阿賴耶惡慧不能知藏即賴耶識蓋就賴耶之自體相言二者固無別藏識言其覆真現識明乎妄現其實一也真常唯心論之阿賴耶異於妄心者所見矣此現識雖自體不變而已現似虛妄生滅就迷論迷已不復常住寂滅如澄水而有類微風汩汩之波所謂瀑流與微細妄想流注也業習熏真而構成現識即如明鏡之現色相頓變似受用即六塵根建立三者或解建立為器世間或解為空間所現之色空與能現之現識如水之與波華之與香不可説是一是異此現識之現所分別也以現識中無始熏習為所依以現識所現之六塵為所緣而意意識等轉識生此現識之現分別也藏識海常住境界風所動種種諸識浪騰躍而轉生此識浪之與藏識業相邊同而真相異依現識所起之轉識即意及意識等七識意之作用有二如蛇有兩頭即內取現識以為我外取色根而不壞密嚴經如此説圓覺經亦謂我相堅固執持潛伏藏識遊戲諸根此亦虛妄唯識者之共義末那執藏識為自我又名身者識為根身所依也此七轉識或頓起或漸起以取境而了別之名分別事識轉識緣境計著自相共相多所計度衆生心二性內分別外所分別一切分所取能取纏見種種差別蓋謂此也了別事識與前現識真識凡三識攝如來藏藏識心意眼識乃至意識以此言唯識可有三節真識在纏而為現識是唯真識變現識之現根塵空界依之而起轉識是唯種識變分別事識之施設名相而取六塵則分別識變此三識之變現成雜染流轉若論其體相則唯三真識為真相實體界無始來之虛妄熏習心能積集業曰業相種子界染熏真而展起一切曰轉相現行界明三識三相於楞伽之流轉門思過半矣轉相真相業相分別事識意六識空塵根真識現識真常唯心論初為心性本淨之六識論次發展為本淨之根識意界及虛妄生滅之六識勝鬘經演化為本淨心及念念生滅之七識楞伽密嚴進立八九種種識即真識隨染及七妄之八識或可別立在纏真心之如來藏心真心在纏妄現之藏識心及七妄為九以是言生滅或但言七識念念滅或可於相續次第生之七識相續生滅外別有微細流注之相生住滅相者遍計義相所熏染猶攝論之以藏識為義識也言分別執或以七識為分別所遍計之分別事識或可立自心現妄想八種分別此與虛妄唯識論之自心性無記來不同宜其彼此相接而終於相拒也別有一要義也佛説六塵六根六識為十八界有力能生者為根即有引發六識之功能體細意識之意根與眼等五根所關綦切五根所行境界意各能受而意根又為彼五根之所依其但言六識及意之分別心者則大抵以五根為不可見有對礙之細色即身體中之生機能生動而有因感發識之官能此細色由細心之意執取攝持之若於分別心之內在立種子心則身中發識功能之五根或者即視為能生識之種子世親之二十唯識論陳那之觀所緣緣論均有此新意楞伽偈頌品有之即分別事識之以無始妄熏習為所依根六塵為所緣虛妄分別種種熏滅則諸根亦滅皆此義也若於種子內在而立淨心則或者又視根為在纏真心之映現不全真亦不全妄依真心妄熏而立妄識亦即依根發識也自識言於恆行意而見種識更進而見其為淨心不離於虛妄之恆行意自根言於五根意根之依持中見其為種習又見其為淨能亦不離常識之六根也後世之唯識論者尚不解何故以種為根自更難知淨心在纏之發為六根有欲於唯識外立唯根則亦未知其所以異也如來藏為生死雜染依亦為清淨涅槃依如來藏與非剎那之無漏習氣相應故與不離解脫智藏是依是持是為建立也以一切有情有性淨藏性一切有佛性具無量稱性之淨德故雖迷惑生死莫之能覺而能發厭苦求樂之思如外遇知識聞思熏修則得破煩惱㲉而顯本淨之法身藏斷德之涅槃本淨不思議之智德覺性圓明不生不滅亦不從外來也真心者以淨心為本與非剎那之習氣融然一體為清淨依其無始妄染則有漏剎那與淨心相離不相攝依附而已此與妄心者適得其反彼以妄識為本與無始虛妄熏習和合一味為雜染依生滅之無漏聞熏寄存賴耶中而非賴耶自性攝二大唯心論之判然可別不如指諸掌乎此藏心真心者解為法空所顯性然非空也如來藏不與雜染相應故説為如來藏空而實具過恆沙佛脫智不思議法名不空如來藏此不以性空為了義而以體用常恆之妙有為真實所謂真常論者此也其返染還淨之行楞伽有四禪止觀相應一以無常苦無我不淨為門觀法有我無者曰愚夫所行禪證我空者相續識分別事識滅小乘者以為涅槃然藏識中無始染業猶在不轉去如來藏中藏識之名不得究竟解脫也二觀三界唯心身受用建立唯自心現所現義相如幻化無實此唯內心無外義之觀即法無我觀名觀察義禪三依法有以遣人無依心有以遣境無此二無我猶是妄想分別故於見外法非實隨了諸識不生直觀如實法不生不滅離生滅見得無生法忍住第八地曰攀緣如禪四得無生法忍已起寂滅想諸佛加持菩薩乃即寂而起如幻三昧廣作佛事名如來禪前七地名有心地八地名無心地八地以上名佛地即現證如來禪者所入也楞伽經以不生法為依而建立生滅然返染之方與虛妄唯識者同即觀外義無實境空心寂以證實可謂能融攝妄心者矣其後出者頗有異同不特以不生而立生滅還滅亦頓觀真常自定力制心不起入第三節辨偽與釋疑真常唯心論經多論少國人輒以大乘起信論為主視為馬鳴所説近人於此多疑之虛妄唯識論者以所見不同而撥之是未知起信也考證者以馬鳴時不應有此思想且非真諦所譯而非之起信論立一心二門真如門有空不空二義生滅門有覺不覺二義真妄和合名阿賴耶立義大本吻合於真常唯心論此不可非也然起信論之辨心意意識凡七識術語並出魏譯楞伽而立義全非楞伽明三相魏譯並作識則真常界妄習界現行界明三識則真淨心似真妄現心妄心二者立義既別更不得隨意增減之起信作者以魏譯為依昧於三相三識乃糅合而附益之成七種識名同楞伽而義異古人多知之即此以疑起信可也論之非馬鳴作固不勞辨矣或者據起信以明真心之早於性空尤不可真常唯心論源出大衆分別説系罕以論典著名與説一切有系有關者如龍樹無著等即以論著真常唯心者之多經虛妄唯識者之多論唯見深密一經一也然大衆分別説之大乘學者常為思想之開導者漢譯之法界無差別論寶性論堅慧作與真心論之思想合其論典曾受莊嚴大乘攝大乘之影響約為無著同時之後進此二流古人以仰尊論師或並以歸之無著學實則一起於東一起於西後乃相接而率相拒不可混也印度之後期佛教外若特重論師非論師所説者不談其實大衆分別説之大乘學者別有其學風仍為新新不斷之創作今之西藏承後期之風故唯許龍樹中觀無著唯識二大乘雖唯識之派別繁多抉擇正見偏重瑜伽故於真常心為依之學卒未能明內地之佛教臺賢等並重經以論義為參考故別立真常法界或法性宗之妙有論而以性空唯名虛妄唯識為不了義以學風不同內地與藏衛乃異平心論之經富論貧固不必專宏論典而不知經亦無當也一切名言思惟所不及而體為常樂我淨之妙有以此為依流轉門立相待之二本還滅門歸於絶待之一實此與吠陀以來之梵我論其差別究何在耶差別誠不易然亦有可説者楞伽經以外道之真常不思議但由推論比觀得之即觀生滅無常而推論想像有真常超越之本體為大梵為小我佛教之真常妙覺則以聖智現證得之涅槃經以外道常樂我淨之大我係遠聞古佛真常大我而誤解者彼實未嘗見我然就印度思潮觀之則佛梵綜合之形勢已成在佛教將不但融攝三明之哲理且將融攝阿闥婆吠陀之祕咒吠檀多之學者亦將融佛於梵以釋迦為神之化身矣第十六章教難之嚴重第一節教難之嚴重佛元九世紀之初名德輩出性空者佛護清辨唯識者陳那安慧説一切有者德光覺使各暢所宗大法稱盛然大體為論小乘既日見衰竭大乘復遠遜於小乘也八百五十年頃胸奴族掠北印至密希拉古拉而破壞特盛前已備言之夙為説一切有系淵藪之迦濕彌羅健陀羅寺圯僧少迥非昔日之舊笈多王朝瓦解全印陷割據之局占有北印之胸奴南下之勢猶急九百四十年頃拉奇普他那地方成立遮婁其國以阻胸奴之南下婆羅門學者師熏迦王朝遺意鼓勵濕婆神即大自在天之熱信以資武力之團結佛教頗受其礙時有崇信佛教之伐彈那王朝興起於中印以羯若鞠曲女城為國都其始不詳或謂系出摩臘婆云以玄奘所記觀之則與摩竭陀關係頗深十世紀之後期東印羯羅拏蘇伐剌那金耳國日強國王設賞迦月挾武力西侵所至壞佛法毀寺坑僧伐菩提樹佛成道處教難遍及於恆河兩岸拘尸那佛涅槃處之佛教為之焚戮殆盡玄奘師事之戒賢即被坑而得脫者九百九十二年伐彈那王婆羅羯羅光感國難教難之逼率兵東征不幸卒於軍長子曷邏闍伐彈那王增立設賞迦王誘與和而殺之弟曷利沙伐彈那喜增被立於危急之時號尸羅阿迭多即玄奘西遊所值之戒日王也戒日王禱於觀自在一舉而勝設賞迦王伐彈那王朝慶中興焉戒日王用兵六年統一中印度崇信佛法致三十年太平佛教得稍稍復興戒日王南攻摩訶剌陀不克晚年用兵於烏荼迦摩縷波有抗衡意其受東南民族之掣肘無暇問西北事實非笈多王朝強大之比也一千零三十四年戒日王卒中印復大亂婆羅門教學者如前彌曼薩派之鳩摩利羅後彌曼薩派之商羯羅同出十一世紀融攝佛教之理論而大成其學印度教之復興至此而大成孔雀王朝而後佛教在印度雖多受嫉視然以哲理之發揚猶見重於時逮婆羅門哲學大成佛教僅有之特色亦消失無存不探古以創新則因循荏苒阿世取容以苟存而已中國佛教會昌法難而理論衰特色猶有禪在理學興而佛教之特徵失寺院經懺之佛教其何以自存乎相傳商羯羅嘗至藩伽羅與佛徒辨其時法將無聞竟莫有能敵之者道場二十五處被焚掠五百比丘被逼改宗東至歐提毗舍亦然南印度以鳩摩利羅派之隆盛佛弟子莫能勝之民間乃多改其信仰即佛教最高學府之那爛陀寺講學之制亦因之略變凡無力折伏外道者可於內室講授不得公開云第二節空有之爭政治若是其混亂教難若是其嚴重而佛徒曾不稍自覺一仍舊貫變本加厲論議者務為瑣碎之思辨出入空有兩敗俱傷真常唯心者則無往而不通總攝空有融神祕淫樂於一爐大乘教日趨分化轉入佛梵綜合論矣空有之爭初起於虛妄唯識者之巧辨龍樹提婆之性空論雖一度中落法焰幾絶然大乘以龍樹而光大其權威令德固無人敢輕議之者無著師資承經部之界實處假演繹為心有境空之唯識依深密瑜伽立依他自相有斥勝義一切皆空世俗假有之性空論為惡取空者然亦未敢明斥龍樹也龍樹説一切空不將有惡取空之嫌乎世親弟子安慧首為中論作釋以般若隱密意釋之意謂依不了義作如此説龍樹本意非不知依圓有也作中觀論釋以破中觀學者安慧亦巧黠矣時南印清辨不以唯識者所見為然作般若燈掌珍中觀心論等於瑜伽唯識學頗致抨擊安慧弟子有德慧者宗安慧之心有境無再釋中論以破清辨傳説清辨弟子北來那爛陀寺與安慧門人抗辨卒勝之云又陳那弟子護法為提婆四百論作釋雙彈依他自相有似指安慧自性無指清辨而以一切空為但遣遍計執性依他起性離言而為言説所依非自性無亦不説自相實有圓成實乃因空所顯之一味離言性不復可以有空名也然於提婆本論有難通處曾為之改文以自圓其説清辨擬與之面論不果佛元千年頃月稱據無自性之宗於唯識學之阿賴耶識自證分外境無一一舉而破斥之作四百論釋於護法曲解悉為指正護法弟子有提婆濕羅摩者又注中論以破月稱當月稱主持那爛陀寺時安慧系之學者月官特來寺共論一主性空一主唯識往復辨難歷七年而勝負始決民衆多久預論場熟聞其諍論所在及優劣所分群作頌云噫龍樹本論有藥亦有毒難勝無著論是群生甘露性空宗久衰至清辨月稱乃告中興與虛妄唯識論並峙且進而過之焉兩家爭辨之焦點在性空假名之中道與唯識無義之中道孰為了義以初起於唯識者之巧辨故演為深密經與中觀論本義之爭推衍及於一切性空者以龍樹提婆為宗唯識者不敢輕議前賢乃依解深密經之教判謂龍樹論乃隱密説隱密説者非龍樹不知依他圓成是有之謂但為一類根性依遍計無自性説耳以是龍樹所悟之中道實與唯識者同反之以龍樹中觀學自居之偏執一切皆空不足以知龍樹正中論所破之空見也性空者起而應戰解中百論之本義彈安慧護法等之曲解於解深密經亦競起解説之蓋非如此不足以奪唯識者之守也瑜伽唯識者以自相有為勝義真實有依他起有勝義自相不可言空遍計所執性乃可言空耳清辨靜命等評其為不見解深密之真義深密所説之依他自相有是世俗自相若執為勝義有者即遍計執性以是依他為世俗自相有於勝義中則自相皆空然則解深密經與瑜伽者不合反與清辨靜命寂護所見之性空宗同月稱解解深密經之意趣確如唯識者所説於不能於性空中建立緣起之鈍根故為説一切空為隱密恐其墮斷見也若能於性空中立一切法之利根則一切皆空乃究竟之談如龍樹所説者是詳兩宗立義確有不能強同者即自性一名解深密以自相為依他起之因果自相遍計執性無彼緣起相名相無自性性如説瓶中無水此中無彼水非彼餘處無水也是為他空派龍樹之言自性則不然不從因緣生非新作不待他者名自性有一切法為緣起緣起不如吾人所見之自相有自相實無名無自性緣起本身雖假名有而即無自性者此則如云幻化無實即此幻化之實體無非此無而彼有實體是為自空派龍樹以因果妄現及妄心所取者為自相而自相實無無著系以緣起因果之實有事為自相而自相必有何可濫同一體也深密經謂為五事不具之鈍根説三性為五事具足之利根依三無性説一切空月稱所解似稍近之唯心不空之大乘繼性空者而興宜後起之經多以性空為不了無著師資論且明斥勝義一切空為惡取空也性空者處此即論理足以制勝而事有所難乃師瑜伽者之故智別出反攻之道焉地婆訶羅日照於佛元一千零六十五年頃來華傳那爛陀寺智光與戒賢為空有之爭智光宗性空依大乘妙智經立心境俱有之小乘境空心有之唯識心境皆空之般若以此三時教判證虛妄唯識者之未了此因明決定相違之法也既各有經典可據則空有之了不了唯可以論理決之矣別有解脫軍者傳其初從世親學般若次從僧護學中觀而通其義為彌勒之現觀莊嚴論作釋現觀莊嚴之為彌勒論舊無此説西藏傳般若法門之傳承中斷無著聞諸彌勒而復傳之即現觀莊嚴論傳承説之無當前已辨之論凡八品七十義實性空者反攻唯識之妙術也解脫軍次第傳於小解脫軍勝軍調伏軍而至靜命靜命傳於師子賢蓮華戒乃大昌已佛元千二百年頃達磨波羅王時矣其為説也世諦門立境空心有如唯識第一義門立心境皆空如中觀蓋巧攝唯識之性空論也立説本於中論於現觀莊嚴論特所宗重彌勒傳為虛妄唯識者之論祖而彌勒之現觀莊嚴以所取空而能取不空為緣覺道菩薩雖遍學而非所宗其譏調唯識之意隱然可見依此論則彌勒之中道正見不如唯識者所説而與性空者同此與瑜伽者之釋中百論以龍樹提婆之見同唯識中道豈不異曲同工哉現觀莊嚴約般若經文作頌而獨多二頌曰無彼滅自性何能以見道盡彼分別種而得無生相若有餘實法而謂於所知能盡彼障者吾彌勒以彼為奇性空者攝唯識學於世諦門藉彼所宗彌勒之大名以破無著世親之唯識蓋亦巧黠之甚矣波羅王朝性空者融於真常而大盛現觀莊嚴乃被視為五部大論之一今猶風行於西藏著作者或即解脫軍其人第三節性空者之復興與分流提婆以後性空大乘式微甚世親時中印有僧護者扇將熄之法焰而漸興之然以龍樹之智論失傳僅恃中百論頌為宏通於龍樹圓滿之體系卒無以盡見也承僧護之學者出佛護清辨解脫軍三大流一佛護南印呾婆羅國人從僧護學還南印呾特弗利伽藍宏之依中論無畏釋作中觀論釋弟子蓮華覺再傳而至月稱乃大宏其説或謂月稱於中論諸釋雖獨契佛護釋而實不出其門云二清辨生南印摩羅耶囉王族與護法同世其後亦宏法於南印時唯識之勢方張安慧且作中論釋引龍樹為同調以破勝義一切皆空者且以陳那之大成因明學風一變大有非三支比量不足以立破之概清辨乃奮然而出作中論般若燈釋等揭唯識非佛説之宗於無著系之唯識學抨擊不遺餘力於先觀唯識有以遣境次觀唯識亦不可得之唯識觀評為與其先以泥塗而後洗勿如初即不觸為妙先即並修無須慳吝勝義一切空者即無自性寂滅為真如斥唯識者因空所顯之實性為似我真如超思議之實在一味微妙與梵我究何所差別也清辨事事依乎因明以立敵共許之因相立量破他以顯自因於佛護論間有微辭清辨之立世俗心境多順經部説後人因謂為隨經部行者其道既行常隨比丘輒千人於性空之復興功不可沒也其弟子觀音禁曾作般若燈論釋三解脫軍即現觀莊嚴論之傳宏者其學數傳至靜命作中觀莊嚴論其弟子蓮華戒作中觀光明論修次第三編且為中觀莊嚴論作釋難於性空學者中成隨瑜伽行者一派蓋其建立世諦緣起順同瑜伽者之有心無境也靜命師資先後遊化西藏西藏前宏期之中觀即以此為主靜命師資之巧攝唯識蓋有見於清辨立義之有所難以唯識為非佛説而以楞伽經等為佛説無論作何解説實不啻示人以瑕隙靜命之創新説蓋深見於此也靜命云何者為世俗事唯心心所為自體耶抑亦有外法體耶有依後義者如論指清辨論説唯心但破作者受者或有思云雖諸因果法亦皆唯有識或有思者即靜命自述己見以若作此説與密嚴解深密經義相符與楞伽經之外境悉非有心似外境現亦合其立説雖綜合唯識性空二大流而實歸宗於性空也師子賢亦靜命弟子作八千頌般若廣釋現觀莊嚴論釋卓然成家月稱以先雖有佛護清辨諸家性空猶和合無諍彼此亦不自覺其有異月稱獨契佛護直標此宗不共之談乃有應成自續之諍也月稱作中論明句釋四百論釋又作入中論尤注力於遮破唯識初佛護釋中論於破自生時以應成無窮等隨敵者所許而破之清辨評其不以立敵共許之因喻為量無破他之力月稱即此以發現佛護清辨所見之不同清辨以世諦為自相有為五根識現量之所得立者敵者有此共許之正量故得以共許之因相自立量以破他立自若直出敵者自生之過即非善於立破者也佛護之意不爾龍樹菩薩亦嘗以應成破常人於如幻有而現為自相有以此自相有為緣起相視以為正確性空者知法無自性一切唯是無性之緣起自相有是錯亂現在緣起雖與世人共而實無一共許者以是性空者於世人之執緣起自相有者但可就其本身立説之矛盾剿絶其情見無立敵共許因之正量可立清辨以為有蓋以緣起為有自相者於二諦無礙之正見未盡善也月稱立説申二諦都無自性三乘同見法性空三世幻有心境幻有或稱之為隨婆沙行者頗近於什公初傳之龍樹學近天臺之共空於後期復興之中觀學者中所見特深然以緣起之待他為依心不從他生非新生不待他之自性為勝義自性不許現在意而破阿賴耶等細心則以學出後期或濫於真常或拒唯識而失之太過大體為論餘暉峻嶺性空者之傑出者也月稱傳大明杜鵑小明杜鵑而至阿提峽於佛元千四百二十五年入藏作菩提道燈論影響於西藏之佛教特深此外之性空者猶多如寂天作集菩薩學論集經義論入菩提行論流傳亦廣第四節虛妄唯識者之分流虛妄唯識論之學系不甚詳安慧陳那則其兩大流也安慧南印羅羅國人七歲從世親學作俱舍論釋又糅雜集論以救俱舍於俱舍一學似有獨得善因明廣釋世親論其中三十唯識論釋梵蕃本猶存弟子月官弘十地經月燈三昧經樹嚴經楞伽經般若經五大經與月稱共論七年即此人也大成因明之陳那前已敘之其弟子有護法者南印達羅毗荼國人作唯識寶生論四百論釋尤以三十唯識論釋為長玄奘傳來之唯識雖雜糅十師之説而實以此師為宗年三十二卒藏傳其繼陳那而住金剛寶座三十餘年二説相違未知孰正護法弟子有智月勝友戒賢勝子等戒賢耆年碩學主持那爛陀寺極久人稱正法藏玄奘初見時已百零六歲矣弘瑜伽唯識一時稱盛初世親作唯識三十論未造長行即逝世親勝火辨為之作釋繼之而作釋者甚多玄奘傳凡十大家即親勝火辨安慧德慧難陀淨月護法勝友勝子智月惜玄奘徇窺基之請糅為成唯識論傳説紛然各家之面目已不得而詳性空者復興唯識學日見萎縮戒賢法稱而後幾不聞有法將矣莊嚴攝論等創立唯識學詳種識變攝一切法以虛妄分別為自性而統以分別所分別二分莊嚴以心所為心識之似現攝論明內種子皆熏習性蓋有取於經部之説而異於瑜伽本地分之舊也逮攝決擇分三十唯識論詳分別識變王所心境之同異又反流而同於瑜伽本地無著師資之學含有幾多之岐義後學者隨所重而貫攝研辨之乃顯然分化矣藏傳陳那法稱系特重集量論及七部因明流出隨理行派其中有相分實有相分假有二派相分假有中又有有垢無垢派云云隨理行者以客塵垢染之心光明性建立究竟一乘以賴耶非現量比量所得乃但説六識不取教量唯理為宗末流所趨大異於無著世親之舊矣傳來中國者初有菩提流支次有真諦後有玄奘玄奘所傳特宗護法於同系諸師悉加拼棄護法師陳那而其學不若隨理行者之偏激疑隨理行者法稱後乃漸宏闡焉玄奘宗護法雜糅十師是非難言參酌衆説其爭論所在猶可見一二瑜伽以現行之恆行意為本依之而間斷起者為意識持種子為心有心意識而現行唯七識此與深密經之阿陀那識及六識攝論從種子生者唯意及六識同唯識三十論依決擇分而標從種生起之三類識變立現行八識阿陀那是否末那乃有爭末那意者識所依止或生起依或雜染依義阿陀那識為依止為建立六識身轉起則阿陀那即末那也阿陀那執持根身攝論以末那為身者識密嚴圓覺亦以末那為取諸根阿陀那執受名相分別戲論習氣而種習一味之賴耶心有所緣相即彼種子是所緣相末那緣藏識即此種子相則與阿陀那之執受種子難別細心種子乃至心光明性本不可分者攝大乘論以種子為心以恆行意之執取為意十地經論以心光明性為阿賴耶以執取為阿陀那自現行七識之見地固無不可者逮現行八識論出玄奘傳護法之學乃以阿陀那即末那為妄説而實是非未可言也難陀安慧猶承用古義故末那識但依阿賴耶種無現行俱有依護法則自八識現行以推論之不憶心種生意及識之唯識學乃謂末那以阿賴耶現行為俱有依賴耶既是現行心應亦以末那為依六識依意意依賴耶賴耶反依意藉循環論以自圓其説則有取於説一切有系得與得得生與生生之故智也然末那與賴耶之有俱有依非無著世親之舊恆行末那與種子心乃約義而別立者轉染成淨亦得立圓鏡智平等智鏡智取其攝持顯現平等智取無分別智二者乃一體之二義束四智為三身則鏡智與平等智為法身即自性身世親釋莊嚴如此自後起三類識變觀之以賴耶為恆行心而持種子實別無末那可説雜染邊以大乘不共斷之微細法執三乘共斷之恆行我執不妨離賴耶而別立我執末那若轉染成淨則唯一無分別而攝持淨能之妙智安慧承古意末那唯我執賴耶有法執微習三位無末那要皆有見於此護法承唯識三十論賴耶側重於異熟乃以我法執並屬之末那轉染成淨立清淨末那其説無不可而末那有法執古義之所未明也種子與細心習氣心與恆行意雜染心與心光明性執取異熟種子學者離合其間以談心意之別宜學派之爭無已攝論以唯識二種種三相成立唯識本為一貫之三相似義顯現者非有唯虛妄分別為性此之謂唯識雖一切唯識以無始熏習力有分別之見所分別之相現則是唯二分別心分別彼所分別有種種之行相則曰種種唯識為依他起性種種為遍計執性分別所分別二者從其種生而以識為自性邊是依他所分別於分別心中現若有別體之能取所取邊是遍計執性此三相一貫無諍識有境無之義耳中邊論以境故心故為遍計及依他性又以虛妄分別有為依他於此二都無為遍計執性以義或以二取為遍計性一也莊嚴論以幻師喻虛妄分別以幻事喻二迷又以能所各三光為依他起依遍各通二分亦非矛盾密嚴經云一切唯有覺所覺義皆無能覺所覺分各自然而轉上二句是唯識下二句是唯二又説衆生心二性內外一切分所取能取纏見種種差別上二句明二分下二句明種種此固一貫之談豈可隨文而偏執一分二分哉玄奘東來乃有所謂安難陳護一二三四之別所謂一分二分實即相分實有與相分假有之諍也唯識無義以分別遍計所分別熏遍計所執習氣以能所交涉而熏成生時即自然而現二分相即是識之一分即是識名唯識也自唯識反流於瑜伽依他之分別心與離言之十八界性相接則覺見相相涉而成種熏成各別種子分別與所分別各從自種子生即境有自相非識而不離識不離識名唯識也安慧等用見相同種之即識難陀親勝等則用見相別種不談獨影境之不離識相有自相而不離識即相分實有此後世之所謂二分非唯識唯二之舊也陳那師資自見相別種而稍加融會然其三分四分則實有取於大衆系之心自知心與唯識舊義異然自證分證知見分不變影像而直覺護法之再事推衍殊覺瑣屑無當幸有循環論法在否則將知知無窮矣餘義繁多今不復一一總言之唯識有種種學派護法唯識其一支耳第五節真常者之融合真常唯心論者以空有之爭乃默然而坐享其成以真常之離過絶非比合於性空性空者之勝義自性亦漸合於真常彼此相提攜性空興而真常論大盛妄心者之心光明性與真常心相接真以妄熏而成之賴耶亦附合於生滅無常者以空性為體以唯心為用間或有所偏明而無不開顯體用無礙之真常內合於玄理外融乎俗事至高至卑無事而不真常本淨無往而不圓融無礙達於形而上之妙有千一百年之佛教其空有理論之發達應作如此觀且依有為法列之常識之真實實有三世實有上座系現在實有大衆系理智之真實幻有三世性空幻有性空唯名系現在不空幻有虛妄唯識系形而上之真實妙有三世不空妙有真常唯心系第十七章密教之興與佛教之滅第一節祕密思想之濫觴佛元八世紀以降祕密教日見風行以身語意三密相應行求得世出世之成就果也密咒遠源於吠陀之咒術信咒語有神祕之能力藉表徵物與咒力以利用神鬼精魅俾達其目的表徵物及密咒乃至身體之動作常若有神力於其間者咒法之作用分息災咒詛開運或加幻術為四類此與祕密教之息災調伏增益大致相同原印度文明以梨俱吠陀為本次組織補充之成為沙磨夜柔二吠陀是三者雖崇事神權而末流成祭祀萬能意象尚稱高潔總名之曰三明別有阿闥婆吠陀以咒術為中心乃鬼魅幽靈之崇拜用以適應低級趣味者釋尊出世斥婆羅門三明而猶略事含容於咒法幻術則拒之唯恐不及雜阿含云幻術皆是誑法令人墮地獄巴利藏之小品三明經釋塔尼波陀經並嚴禁之其後阿含毗奈耶間有雜入然見於現存經律者以治病為主佛滅二百年分別説系之法藏部推尊目連盛説鬼神始傳有咒藏之説大乘佛教與祕密無必然之關係然大乘佛教之興起則確豫祕密思想以活躍之機大乘仰望聖者功德之崇高昔之世出世善並由自力以致之者今則佛力無量菩薩願大他力加持之思想乃勃興菩薩遍入六道龍鬼夜叉中自應有菩薩存在而佛弟子之編集遺聞融攝世俗既以魔王及外道師宗多菩薩之示迹又以天龍夜叉之護法而謂傳自夜叉或龍宮魔王外道天龍夜叉與菩薩同化之傾向日益顯著如梵童子之與文殊因陀羅之與普賢摩醯首羅天成佛之與大自在天其顯例也其中尤以夜叉為甚夜叉本為達羅維荼民族之神群佛世傳有金剛力士護佛密迹經即謂其為大菩薩以護持千佛之佛法而示現夜叉者説十地經之金剛藏亦夜叉之一大智度論謂夜叉語音隱密雜亂不易知此與密咒之密有關夜叉手執金剛杵金剛乃常住不壞之寶物因與真常論特相契合自中印法難安達羅王朝之文化大啓大乘由此而勃興夜叉即於此菩薩化後之傳密法者謂龍樹開南天竺鐵塔見金剛薩埵而後傳出密典多以祕密主或金剛手為當機者其間之關係固顯然可見也大乘佛教之演化為密教雖千頭萬緒而菩薩與外道龍鬼夜叉之合化為一特要之因素也般若華嚴之字門陀羅尼亦豫祕密法以有力之根據大衆部苦言能助開音聲佛事之始至字門陀羅尼則藉字母之含義聞聲思義因之悟入一切法之實相如阿字是無義不義聞唱阿字即悟入一切法本不生性此深受婆羅門聲常住論之影響也其初猶以此聞聲顧義為悟入實相之方便繼則以文字為真常之顯現以之表示佛德及真常之法性矣以此昔之密咒用以為息災調伏增益後則以密咒為成佛之妙方便阿字本不生固為其重要理論之一龍鬼神祕之思想雖逐大乘道而漸盛然初期大乘經中助佛揚化及受化者多為人身菩薩猶以入世利生深智悟真為本此期之經典密咒之成分漸多然多用以護持佛法未視為成佛之道且此項密咒亦多後代增附之如般若經本無咒雖説是大神咒是大明咒是無上咒是無等等咒是一切咒王實以喻讚般若之特尊後人集出相應品要成般若心經則加以即説咒曰云云法華經本無咒而囑纍品以後之附編者有陀羅尼品仁王經理趣經本無咒唐譯則有凡此皆足以見初期大乘之猶未大濫也密教亦稱瑜伽教與瑜伽者之關切特深詳解脫之道唯八正道即三增上學以正見正思之慧學為眼目以正語正業正命之戒學為足必心懷明潔行止無瑕而後以勇猛精進心因正念以入正定定學止觀相應乃得斷惑證真斷證有賴於禪定而佛法不以禪定始亦不以禪定為尚取其攝心明淨而已否則離戒慧以入禪未有不落魔外蹊徑也佛世言禪定推二甘露門此皆印度常行之禪法而佛資以為攝心之門初以不淨觀厭心切者多自殺乃教以安般念即以調息為方便而繫心入定風脈等瑜伽即此安般之餘而戀世心切者末流乃與方士家言合轍靜居入禪其戒行不淨慧眼不明動機不正或不善用心者常有種種身心病生有種種可喜可怖境界現前正本清源莫如戒慧或者不務本而逐末懸聖賢像善神像燒香散華以求護衛者有之論宿曜吉凶時日祥忌山水利害以求解免者有之藉咒力表徵物請護法神以驅鬼魅者有之禪病日深神祕之風日熾昔佛之世弟子以不見佛為苦夜行獨居而有怖畏者佛嘗教以念佛念天念佛陀之智慧慈容或念行善者必升天我既行善復何所畏以此強其意志慰其脆弱之心禪者怖畏多念佛乃為其要行發為念佛三昧不僅念佛之悲智而多念佛之相好住處之莊嚴淨土求於此三昧中佛為現身説法所念者不僅佛陀諸菩薩亦為觀想之境逮佛與天混融之勢成觀想夜叉等為本尊而求成就之密法乃出瑜伽師初出虛妄唯識論又伴真常唯心論而大出密法南北瑜伽者合流三密瑜伽之教乃盛行矣第二節祕密教之傳布祕密法雖逐大乘而起然獨立而成所謂呾特羅乘則遠在其後密乘學者欲託古以自厚乃謂昔已有之且大宏於龍樹於佛教名德如提婆無著輩莫不引以為密乘大師傳説之紛雜亦已極矣西藏傳密乘有事部行部瑜伽部無上瑜伽部四部我國舊傳之密乘而流入日本者有胎藏金剛二大部此二與行部瑜伽部相當無上瑜伽部後出始宏於波羅王朝趙宋曾譯出數部間有被禁不行者事部則與日本所謂二大部外之雜密者大同自理論言之胎藏界明本具之真常心性金剛界則詳於真常本淨性之修顯並與真常唯心論之大義合雜密則罕言理性其修無相瑜伽亦即妄以明空不與天色身觀相合真常之色彩不深言組織雜密常聚佛菩薩鬼神於一堂未若胎藏界等組織嚴密秩然有序其行法中結壇場重供設誦咒結印詳於事相而略觀想其觀想本尊則召請一外來之本尊而觀之修畢則送之還未直觀自身即佛也大都如此於祕密教之發展中事部乃其未臻圓熟之初型其流出實先於真常唯心論之盛行佛元七世紀之末晉永嘉中帛尸梨密多羅即以善持咒術稱來華譯出孔雀明王灌頂神咒經矣初期之雜密與北印之瑜伽師有關西域記謂北印烏仗那人特間咒術秣底補羅亦以深間咒術著稱西藏傳僧護以前祕密法不無流行烏仗那人多有得持明位者初期來華傳譯密典與精間咒術者多北印及西域之龜茲人龜茲之帛尸梨密多羅善持咒術無論已佛圖澄姓帛再到罽賓亦善誦咒術能役使鬼神餘如北印菩提流支之兼工咒術烏場即烏仗那之那連提耶舍健陀羅之闍那崛多且於隋世廣出咒典沿雪山而住之瑜伽師內有所見於定境外有所取於民俗之咒術以之自護以之教他事部乃漸行密乘之流布常途多託始於龍樹其初指大日經而言請一論龍樹師資之傳承什公來華惟傳龍樹提婆青目等之傳承不明付法藏傳謂提婆弟子羅睺羅真諦傳羅睺羅以常樂我淨釋八不性空者之轉入真常可考見者自此人始西藏傳羅睺羅弟子有龍友龍友弟子僧護龍友之與龍樹傳説頗為紊亂龍友之師為羅睺羅跋陀羅俗乃傳龍樹之師亦為羅睺羅其訛傳蓋可想見又傳説與提婆同時有本名如來賢而稱為龍叫即楞伽經中之龍猛者弘傳唯識中道龍友龍叫與龍樹之傳説相雜而後有龍樹傳密之説以各種記載觀之龍友弟子僧護時行部始顯然流行於世有龍智者傳為龍樹弟子或言玄奘於北印磔迦國所見之長壽婆羅門即龍智其人略後勝天弟子毗流波月稱弟子護足亦從龍智學唐開元來華之三大士並自稱受學於龍智密學之盛與此老關係之深可以見矣龍智年壽極長傳出龍樹殆即龍友或龍叫弟子歟事部乃咒法發展之雛形其融攝真常之深理以三密為行法組成事理圓具之密典疑即龍叫龍智其人行部之大日經流行較早以菩提心為因大悲為根本以方便而至究竟三句義為大本明十緣生句頗類於般若之説然菩提心指自心本具真常性德方便則多明隨機適化之行可謂真常化之般若也瑜伽部之金剛頂經明五智成身蓋後於唯心論之盛行行部瑜伽部之流行已漸自北印而移入南中後期之性空者佛護清辨宏法於南印並轉入密乘西域記謂清辨入那羅延窟實即學密之謂中印之月稱智藏下至靜命蓮華戒亦無不學密無著學系之遊化南中者如陳那護法法稱輩西藏並傳其與密有緣唐代來華之傳譯密典者亦以南印尤以中印度為多蓋時祕密之思潮立本於真常唯心圓融祕密他力頓成融性空與唯識之學而無所不可空有之交諍僅供祕密者之莊嚴而已初無所偏於二家其力崇中觀則以龍智而下性空者多入密有以致之行部與瑜伽部之成立在融攝世俗邊可謂佛梵之綜合此於胎藏界金剛界之曼陀羅可知惟其中有可注目者即以在家菩薩天人形之大日如來為中心以金剛手等護翼之釋迦及阿羅漢等則退列於外圍蓋以密者之見印度之群神自其本地言之並佛菩薩之示現為大日如來之內眷屬大眷屬應化身之釋迦及其眷屬轉望塵而莫及以在家菩薩為中心本大乘佛教必至之勢顯教之文殊淨名以及諸大菩薩無不有越出家聲聞衆而上之之概惟祕密者以在家佛教之立場不能發為入世濟衆之行而融合世俗之神教猶敢輕究竟之解脫道唱釋迦不得成就請教於天上之大日如來而後能證入之説不能無感於尊卑之倒置耳舊傳羅睺羅跋陀羅即婆羅門學者娑訶羅而龍智亦一長壽婆羅門此時之佛教常以佛化之婆羅門學者為其先導其精神固已非僧非俗亦佛亦梵矣雖然行部與瑜伽部猶以人形之大日如來為中心也次以密乘行者於胎金之圓融大法界中特契於金剛明王以大貪樂為攝引大忿怒為折伏大貪大瞋而大慢觀自身即本尊而修之其中心之崇拜為羅剎夜叉求其如大日如來之人形亦不易得矣於此吾人於古人之心境似應有所諒解也印度為神之世界一切在神祕氛圍中初以佛教之行而少衰中印法難後又漸復其繁榮佛教以大乘入世之融攝多少傾向於他力逮笈多王朝興印度教學者以梵我論為本豫人格神以論理之根據增強濕婆毗紐梵天之信仰下至一切世俗迷信無不兼收並蓄蔚成時代潮流以反吠陀而興之佛教對此能無切身之感乎聲聞之解脫行不足以應群機亦不足以暢佛懷入世之菩薩行雖理論已極於性空緣起而菩薩僧之不立政教形勢之限制亦難以成入衆利濟之行大乘唯有趨於隨機適應專精禪思發通以濟衆之途自性空以入形而上之妙有自力以入他力緣起以入唯心無神而入有神固有意無意而開始轉變者馴致形成梵佛之綜合一反根本佛教之精神然創始轉化者似未嘗不知之深密經明説為五事不具之鈍根説依他自相有楞伽明真常唯心而謂若説真實者彼心無真實言心起衆相開悟諸凡夫大日經明祕密法而謂劣慧所不堪兼存有相説古人非不知之特欲以此為方便攝世俗以向佛耳其如始簡終巨真常唯心神祕之説與生死心積習相應乃一發而不可收拾也前三部之流行笈多朝以來三百餘年事也若無上瑜伽則後弘於波羅王朝自伐彈那王朝傾覆中印大亂佛教之勢轉衰有波羅王朝興佛教乃賴以偏安五百年而成一異樣之繁榮東方有瞿波羅王起而統一藩伽羅國西取摩竭陀等地創波羅王朝王朝相承凡十八世夜叉波羅王為大臣羅婆斯那所篡王朝遂亡此十八世五百年間崇信佛法歷世不替其尤竭誠護持者凡七世稱波羅七代七代中第四世達摩波羅王時國力最盛曾擴展至曲女城於佛教之護持亦最力王於那爛陀寺附近建歐丹富多梨寺又於北近建毗玖摩羅尸羅即有名之超岩寺道場百八規模宏大視那爛陀之八院三百房而過之遂奪那爛陀之席而超岩成最高之學府矣於此波羅王朝一類無上瑜伽初非人間所有者始由密乘學者次第傳出初有毗流波者出那爛陀座主勝天之門後從龍智學而得悉地自後曇毗醯流迦婆日羅犍陀等相繼得道又有婆婆波婆羅波俱俱囉羅闍喜金剛等出並宏瑜伽及無上瑜伽五部如集密歡喜金剛明點幻化母閻摩德迦等均先後流布及喜金剛弟子檀毗醯盧迦又傳來佛頂輪救度母輪等無上瑜伽已大體備矣佛元十二世紀後期達磨波羅王在位建超岩寺密乘之勢益盛王於現觀莊嚴派之師子賢弟子智足特加欽崇而密乘與隨瑜伽行之中觀師相涉乃益深智足遍宏前三部及五種內道呾特羅於集密之解釋尤工然與護足之舊傳有異集密因有所謂龍猛傳及智足傳之兩大流也繼智足而為超岩寺主者有然燈賢等十一人通稱調伏法呾特羅阿闍梨蓋皆維持智足之統專宏勝樂閻摩明點歡喜金剛集密等無上瑜伽者超岩外之密乘學者亦不少如寂友之通前三部覺密覺寂之通前三部而特精瑜伽部皆其著者第七世摩醯波羅王時毗覩波始傳來時輪金剛其徒時輪足宏之密乘之學發展乃至矣盡矣十一世荼那迦王之時名德濟濟超岩極一時之盛有六賢門出六賢門者東則寶作寂南則智生慧西則自在語稱北則那露波次以覺賢中則寶金剛及智吉祥友六賢皆博曉五明專宏密乘於無上瑜伽之勝樂尤所致意其後座主之佼佼者有阿提峽師資那露波師資等以十七世羅摩波羅王朝之無畏現護為斯學之殿軍王朝多故教界落寞餘勢已奄奄欲息矣綜觀密教發展之勢即鬼神崇拜而達於究竟事部本為次第錯雜之傳出後人嘗董理而統攝之分佛部上蓮華部中金剛部下之三部佛部以釋迦為部尊文殊為部主蓮華部以阿彌陀為部尊觀世音為部主金剛部以不動為部尊金剛手為部主雖意在融攝鬼神而尊卑之勢猶存此三部就其所重而言之則佛部為解脫相之佛蓮華部為慈悲相之菩薩金剛部為忿怒相之鬼神世人之所崇事唯此三類而已此亦即以釋迦文殊之大乘深智融西北方彌陀觀音之慈悲柔和東南方不動金剛手之方便雄猛也行部承之綜合為三部然佛部之釋迦轉化為在家菩薩天人相之大日如來祕密教為之一變化出家佛為在家佛以為重人可以之為重天尤當其曼陀羅中臺作八葉蓮華形以象心中為大日如來四方為四佛瑜伽部即五方五佛説而開為五部如來寶蓮華業金剛其曼陀羅依月輪心中五智成五佛一一出三輪身即以大日中不動東寶生南彌陀西不空北五佛為自性輪身普賢文殊虛空藏觀自在金剛業五菩薩為正法輪身不動金剛降三世軍荼利六足即閻摩德迦大夜叉金剛五大明王為教令輪身行部以三而啓五瑜伽部明五以含三以如來部為最勝而如來為在家菩薩形僧俗之形雖倒人鬼之敘未失也嗣以學者特重金剛之調伏乃流出集密勝樂閻摩等無上瑜伽然諸部獨立頗有無統之感或謂五部統以金剛持之第六部即以金剛持為最勝亦即離去天人相之菩薩而以鬼神夜叉之忿怒身為所崇祕密教又一變或謂波羅王朝時國難教難相逼俱來故特重金剛之雄猛法以制之教法當機義或近之雖然國難教難五大金剛其能救之乎事部解脫之佛陀主攝外行部悲和之菩薩主融外鬼神崇拜之密教瑜伽部無上瑜伽部貪瞋之鬼神主同外第三節祕密教之特色密教多特色承固有之傾向而流於極端者有之融攝外道者有之若以一言而罄無不盡者則以世間心為解脫是已信師長達於極端即自身妻女亦奉獻而不疑師命之殺不敢不殺命之淫不敢不淫此婆羅門所固有讀央掘魔羅經可知後期佛教所取用者也佛斥外道之事火而教以事根本火供養父母居家火供養家屬等密乘學者又轉而事火護摩求子求財求壽求官一切無不於火中求之而酥蜜衣服珍物悉舉以供火之一炬將以求其大欲也佛世以依教奉行為最勝之供養佛後亦供以燈明香華等而已密教以崇拜者為鬼神相其供品乃有酒肉有所謂五甘露者則尿屎骨髓男精女血也更有五肉者則狗肉牛馬象及人肉也以此等為供品而求本尊之呵護亦可異矣且置此等瑣屑事試一言其要義一心餘力絀之天慢密教以修天色身為唯一要行念佛三昧之遺意也自佛天合化佛菩薩既示現天神身龍鬼夜叉亦多天而實佛菩薩之示現觀此天等之相好莊嚴此自世俗假觀而來觀身實相觀佛亦然觀己身天即佛之示現身之實性此自勝義空觀來此二觀初或相離而終復合一以身語意三密修之即手結印契口誦真言意觀本尊之三昧耶或種子或本尊之相好求佛天加持而有所成就若直觀佛相觀成而佛為現身説法顯教大乘亦偶有之然祕密者意不在此雖或前起本尊而要在信自己為本尊觀己身為本尊本尊入我中我入本尊中相融相即而得成就天慢者即以佛菩薩自居此由他力念佛之渴望救護自力念佛之我佛平等極卑極慢之綜合而以三密行出之一切法真常本淨不應妄自菲薄應有堅強之天慢自身即佛而未嘗不自感其無能乃唯求本尊之三密加持質言之信得自身即佛而求諸佛三密加持力以實現之此與初期大乘經論信有成佛之可能而但可於智深悲切之大行中得之精神之相去遠矣祕密者修天慢而即身成佛如乞兒以富有自居衣食不給乃卑辭厚顏以求富翁之賜豫俾與富人共樂耳何慢之有二厭苦求樂之妙樂出家聲聞弟子視五欲如怨毒以淫欲為障道法固非在家弟子所必行然以性交為成佛之妙方便則唯密乘有之先以欲鉤牽後令入佛智大乘攝化之方便方便云者且以此引攝之非究竟亦非漫無標準也或者謬解以樂得樂乃一反佛教之謹嚴朴質欲於充滿欲樂中成就究竟佛果之常樂欲界欲樂中淫樂最重或者乃以此為方便且視為無上之方便惟是淫欲為道密宗之舊傳我國而流入日本者猶未嘗顯説故每斥無上瑜伽之雙身法為左道密教然特宏無上瑜伽之西藏喇嘛則矜矜以妙法獨備於我已平心論之此即欲為方便之極端固於前三部見其緒矣所崇事者天身之佛天有明妃天后佛亦仿之而有佛母明妃此即與方便悲行為父般若智慧為母之大乘義相雜金剛以表雄猛折伏蓮華以表慈和攝引亦一轉而為生殖器之別名密教所崇事之本尊無不有明妃事部則彼此相顧而心悅行部則握手瑜伽部則相擁抱無上瑜伽則交合此固順欲界欲事之次第而成立者前三部雖有相視相抱事而行者每以表悲智和合等解之然無上瑜伽則付之實行衡以密者之説則三昧耶為表象法為觀想業為實行固表象獨是而觀想實行之非耶以祕密教之發展觀之固不達此不止吾人以祕密教為佛之梵化神化則可尊信前三部而不信無上瑜伽則不可何有智者譽病入膏肓為健康而歸死亡之責於臨終一念也無上瑜伽者以欲樂為妙道既以金剛蓮華美生殖器又以女子為明妃女陰為婆伽曼陀羅以性交為入定以男精女血為赤白二菩提心以精且出而久持不出所生之樂觸為大樂外眩佛教之名內實與御女術同凡學密者必先經灌頂其中有密灌頂慧灌頂即授受此法者也其法為弟子者先得一清淨之明妃引至壇場弟子以布遮目以裸體明妃供養於師長師偕明妃至幕後實行和合之大定弟子在外靜聽之畢上師偕明妃至幕前以男精女血甘露即所謂菩提心者置弟子舌端據謂弟子此時觸舌舌樂及喉喉樂能引生大樂云以嘗師長授豫之祕密甘露名密灌頂嘗甘露味已去弟子之遮目布為師者以明妃賜豫弟子指明妃之婆伽而訓弟子曰此汝成佛之道場成佛應於此中求之並剴切誨以一切令其與明妃智慧入定引生大樂此即慧灌頂歡喜金剛云智慧滿十六以手相抱持鈴杵正和合阿闍黎灌頂即此也經此灌頂已弟子乃得修無上瑜伽其明妃可多至九人云西藏宗喀巴似有感於此道難行故於無上瑜伽之雙身法自灌頂以至修行多以智印即以觀想行之然餘風猶未盡也解脫是所求欲樂不欲棄厭苦求樂而不知樂之即苦乃達於淫欲為道或云印度有遍行外道於性交為神祕之崇拜佛教之有此欲用以攝此外道也三色厲內荏之忿怒應折伏者則折伏之菩薩之行也密乘行者特於無上瑜伽其崇事之本尊無不多首多手多角腳踹口咬烈焰熾然兵戈在握雖善畫鬼者亦難設想其可畏也然以豫視之大丈夫一怒而安天下猶非面目猙獰之謂而況菩薩之雄猛乎龍樹菩薩引偈云若彩畫像及泥像聞經中天及讚天如是四種諸天等各各手執諸兵仗若力不如畏於他若心不善恐怖他是天一切常怖畏是故智者不屬天力不如則失雄威心不善則失慈悲其不堪崇事固明甚也密乘者以學出龍樹自居而以猙獰之天形為所崇不亦可以已乎總之祕密者以天化之佛菩薩為崇事之本以欲樂為攝引以猙獰為折伏大瞋大貪大慢之總和而世人有信之者則以艱奧之理論為其代辨以師承之熱信而麻醉之順衆生之欲而引攝之耳察其思想所自來動機之所出價值之所在痼疾其可愈乎第四節印度佛教之衰亡佛元八世紀以來佛教外以印度教之復興於具有反吠陀傳統之佛教豫以甚大之逼迫內以唯心真常圓融他力神祕欲樂頓證思想之泛濫日與梵神同化幸得波羅王朝之覆育乃得一長期之偏安然此末期之佛教論理務瑣屑玄談供少數者之玩索實行則迷信淫穢鄙劣不堪可謂無益於身心無益於國族律以佛教本義幾乎無不為反佛教者聞當時王舍城外之尸林中密者於中修起尸法可以害人者即為數不少佛教已奄奄一息而又有強暴之敵人來佛元十四世紀初阿富汗王摩訶末率軍侵略印度占高附而都之回教漸滲入印度內地相傳侵入者凡十七次每侵入必舉異教之寺院而悉火之佛教所受之損害可想見也於是恆河閻浮河兩岸西至摩臘婆各地之佛徒改信回教者日衆其佛教僅存之化區惟摩竭陀迤東耳逮波羅王朝覆亡回教之侵入益深漸達東印金剛上師星散不久王室改宗歐丹富多梨寺及超岩寺先後被毀即僅存之那爛陀寺亦僅餘七十餘人佛教滅迹於印度大陸時為佛元十六世紀佛教興於東方漸達於全印次又日漸萎縮而終衰亡於東方吾人為印度佛教惜然於後期之佛教未嘗不感其有可亡之道也第十八章印度佛教之回顧千六百年之印度佛教師弦中絶寂寞無聞披陳簡而懷往事未嘗不感慨系之衰亡以來七百年於茲佛教猶遍行於亞洲之黃色民族間不失為黃族共信之宗教佛弟子亦可以自慰矣今之世世局混亂東方民族復蘇之秋也於此黃族文明之重鎮其不容漠視當不僅佛弟子已也為印度佛教之觀察者不僅知之而尤要於知其所以興替者不為其所蒙不阿其所好知其本而識其變必如是而後信解之可批評之無不可否則信者認賊為父實不足以言信佛批評者逐影狂吠亦徒亂視聽而已佛教之興衰自其傳布於印度者言之則以孔雀王朝為極盛雖教化初及於南北未足以言深入然一躍而為印度之國教導達群方五印一家實佛教從來所未有中印法難後已不足言此矣就其思想之發展言之則初以大乘入世傾向之開展而演為學派之分流分流又綜合大乘佛教乃確立雖以婆羅門學者之治佛法者多內蘊神化之機為現實政教所限大乘無僧然大體言之不失為達磨正常之開發也笈多朝興真常唯心之説盛已不足言此矣佛教之盛極而衰漸失淳源而變質外來之教難為其一因佛教適應反吠陀之潮流而創立者頗為吠陀文化之雅利安人所不滿醞釀為熏迦王朝之毀佛自爾以來印度教憑其千百年來雄厚之潛力在在與佛教爭理論之辨難而外常利用外族入寇之政治形勢以排佛其甚者戒日王信佛婆羅門出之以行刺佛坐菩提樹下成佛於拘尸那入涅槃設賞迦王竟伐菩提樹而毀拘尸那為空墟佛教所受之損害實不堪回首胸奴族之毀佛動機為寺院財産之掠奪以思想之衝突兼貨利之劫掠者則回軍之入寇是矣歷受無限之摧殘佛弟子之心境間失其中道之常軌佛教於是大變矣敵者之摧殘不足為佛教害受吠陀文化之熏染則佛教致命傷也傳説魔王面佛時宣布其反佛教之決心歷舉種種方法佛答以不能損正法之一毫魔末謂吾將衣汝衣食汝食入佛教而行我舊法佛為之瞿然而驚受反佛教精神之熏染外若佛教而實非法非律師子身中蟲自食師子肉雖以師子之雄猛亦且無如之何印人薄於史地之觀念故思辨深入而事多疏失佛教宏布其間亦未能免此初以釋尊根本聖典之賅攝未盡又博采而補苴之然以事憑傳説乏精密之考訂故於是否佛説僅能以法印辨別之由是而天龍夜叉宮中之佛法源源而來非之則頗有符合佛説者在是之則又多少異後後承於前前積小異為大異馴致以真常大我代諸行無常諸法無我以恆常妙樂代涅槃寂靜以怖畏之天神代和藹之佛矣即今日而欲為之指證真偽亦幾乎難能唯可以初出者為本而研究之窺其基本之思想而後以之衡一切耳印人之思想多偏激偏激非如實徹底之謂強調誇大而達於極端是也見之於行為淡泊自勵者流於殘酷之苦行聲色自娛者流於縱欲之狂逸見之於神格吠陀之讚詩輒以盡善盡美以讚一神又即以此讚別神以是雜亂無系成所謂交換神教極端思想之演化即隨舉一神而崇事之即等於一切自生主造一切者祈禱主原人等演化為生主為梵為我而其根本仍大同釋尊出世反極端而唱中道宜可以日有起色矣惜釋尊滅後佛弟子即受其熏染而失中道重律者日務瑣細而拘滯莫通重法者一切隨宜薄律制為事相禪師昧教浸假而不立文字經師重説日失其篤行之精神其偏激之思想泛溢於大乘佛教者尤多無一大乘經而不以為究竟無一修行法而不貫徹一切偏激思想之交流形成無可無不可無是無非之圓融於是乎佛天同化邪正雜濫餘風及中國禪者一棒一喝罄無不盡念佛者則南無阿彌陀佛六字是一味阿伽陀藥無病不治偏激誇大極而無不自以為圓融也請以人身喻之人之所以為人以其有五官四肢百骸之全也必各當其分各司其職而後為健康否則即殘廢毀滅耳若自偏激而圓融之則言目者人非目不見眼大於頭舉人身之全而唯一眼可也重手者人非手不成不妨手多於毛髮舉全身而手之可也舉七尺之身無一而非眼也無一而非手也即眼即手無手不眼圓融極而不自知其為偏激誇大也一切因緣和合生畢竟無自性而緣起秩然不可亂緣異則變因異則滅圓融者殆未之思也以此為聖者境為吾人所能達懸為理想以求之猶可也而擬議聖境之圓融論者忘其自身為凡愚不於悲心利他中求之乃欲於唯心他力神祕欲樂中求之凡於平日之行事無不好大急功流於觀望取巧也彼必曰條條大路通長安無一物而非藥也孰知面牆而立者晝夢冥遊者未足以語此有居渝都而赴南岸午餐之約者沿嘉陵江北上出秦隴繞道西伯利亞過歐洲經紅海歷印度而至南岸雖條條是路其奈此路行不得何無一物非藥其如屎尿不可以應萬病何圓融之病深入佛教或者以此為佛教光而吾則恥之或者以此為不執者則又謗佛之甚者基於傳説之紛歧偏激之圓融無可不可而方便之義大濫釋尊之創教內具特有之深見然以非適應時代根性正法莫得而宏闡乃於適應時代根性之方便中唱中道之行如實之理於印度固有之一切善者從之猶無大害者則姑存之而豫以新解釋如雜含經帝釋與阿修羅之爭藉方便而暢真實然未嘗無是非之辨也方便以時地之適應而需要時移境易則昔之為妙方便者今則轉為佛法之障方便僅為導入真實之方式偏讚方便每陷於喧賓奪主之勢方便或有適應特殊而偶用之者逮誇大而普遍之無不成為反佛教者大乘初興猶知正直捨方便但説無上道而後起者惑於菩薩方便之勝於二乘舉一切而融攝之不知時空之適應不知主客之勢不知常軌與變例彼方便究竟者且舉淫穢邪鄙為無上方便遑論其餘佛教有諺云方便出下流吾於佛教之梵化有同感也嗟乎過去之印度佛教已矣今流行於黃族間之佛教又如何殷鑒不遠勿謂圓融神祕而可以住持正法也附録印度佛教大事年表佛元西元中國歷朝年代印度王朝年代印度佛教史實第一世紀前四世紀周摩竭陀悉蘇那伽王朝元年第四月三八八年安王十四年阿闍世王即位第八年王舍城第一結集前三世紀摩竭陀孔雀王朝佛元六七二四年一年頃二九年頃赧王在位時賓頭沙羅王在位時毗舍離第二結集佛教初分大衆上座二部第二世紀一二八年二六年五十五年阿恕迦王灌頂第九年迦王歸依佛教華氏城比丘爭五事佛教分成四派秦始皇帝在位王遣傳教師布佛教於四方第三世紀前二世紀漢摩竭陀熏迦王朝佛元二四三六二四年一八四呂后四年補砂蜜多羅王初年中印法難起南北佛教轉盛二二年頃一六年頃文帝在位時龍軍比丘為北印彌蘭王説法迦旃延尼子作發智論妙音作甘露味毗曇鳩摩羅陀作喻鬘論西北印佛教分化第四世紀前一世紀三一年八七年武帝後元二年師子國大寺與無畏山寺共諍大寺始以巴利語寫經安達羅王朝南佛元三六一六二三南中大乘佛教日盛貴霜王朝北佛元三六一七頃第五世紀第一世紀馬鳴菩薩宏法中印著賴吒和羅曲等第六世紀第二世紀五三年頃一四年頃順帝在位時迦膩色迦王在位時王信佛教馬鳴來北印北方大乘漸盛迦濕彌羅論師編大毗婆沙論一切有説大成龍樹菩薩著中論智論宏性空大乘第七世紀第三世紀魏提婆菩薩著百論廣破外道達磨多羅貫通有部東西二系著雜心論訶梨跋摩集譬喻及大衆分別説義著成實論第八世紀第四世紀晉笈多王朝佛元七八九二八室利邏多著經部毗婆沙無著承彌勒學出瑜伽論等於西方宏虛妄唯識論七四年頃三五年頃羅什遊學罽賓世親折中説一切有系作俱舍論世親歸大作十地經論等衆賢作順正理論破俱舍以救婆沙堅慧著寶性論於東方弘真常唯心論增建那爛陀寺漸為大乘中心祕密教漸行覺音赴鍚蘭銅鍱部由此轉盛第五世紀七九三年四五年安帝義熙元年旃陀羅笈多二世在位時晉法顯至第九世紀宋齊安慧作中論釋啓空有之爭陳那著因明七論因明大成清辨宏性空於南印著掌珍論等空有之爭始烈第六世紀梁八九七年頃五九年頃武帝天監年那羅新哈笈多在位時胸奴王密希拉古拉摧殘西北印佛教第十世紀護法著三十唯識論釋陳隋伐彈那王朝佛元一三四龍智盛弘祕密教月稱於中印大弘空宗九八年頃五九年頃文帝開皇年波羅羯羅伐彈那王在位時設賞迦王西侵排斥中印佛教第七世紀一年頃六一年頃煬帝大業年曷利沙伐彈那王時戒日中印佛教復興戒賢於那爛陀寺弘瑜伽論第十一世紀唐一一九年六三一年太宗貞觀五年唐玄奘至法稱再興因明波羅王朝佛元一四八一五二七南北佛教並衰祕密教盛行一五年頃六六年頃高宗在位時瞿波羅王在位時唐義淨至第十二世紀第八世紀達磨波羅王在位時始建超岩寺為祕密教中心道場師子賢弘現觀莊嚴論第十三世紀第九世紀摩醯波羅王時毗覩波傳出時輪金剛密教乃備第十四世紀第十世紀宋太祖在位時荼那迦王在位時超岩寺六賢門出第十五世紀第十一世紀第十六世紀第十二世紀斯那王朝佛元一五二七一六年頃寧宗在位時回教侵入東方王朝覆亡佛教受毀未幾而亡印度之佛教重版後記印度之佛教是民國三十一年寫作的也是我第一部出版的作品四十多年來一直沒有再版這是多少使人感到有點意外的其實也只是因緣而已這部書在重慶出版那時的抗戰後方一般印書是不容易得到白報紙的生報紙薄而脆容易碎裂熟報紙要堅韌些但又粗又厚也不理想當時就是用這兩種紙印的抗戰勝利了覺得這種紙張的書不會受人尊重所以三十五年春只帶了二十册熟報紙本離川經歷了西安開封武昌回到上海杭州寧波這二十本書也就差不多了從香港到臺灣連自己僅有的一册也不知給誰借去而失了蹤在香港時一直在出版新的作品沒有想到這本書的再版來臺灣以後一直忙著講經出國建道場還有疾病在佛法的進修來説這是最鬆弛的十二年沒有有分量的新的作品也就沒有想到連自己都沒有保存了的印度之佛教所以這一期間很少有人知道我曾寫過這部書的民國五十五年為了寫説一切有部為主的論書與論師之研究想參考這本書知道道安老法師有一本特地向他借來參考也就在説一切有部為主的論書與論師之研究的序文中説到了這部印度之佛教這部書是用文言寫的多敘述而少引證對佛教史來説體裁是很不適合的而且空疏與錯誤的也不少我要用語體的引證的重寫一部這是當時閉關以後的決定覺得文言文寫的對現代一般讀者未免困難了一點這是印度佛教史著重於佛法流變的思想史只説這樣那樣很少引證引證的也沒有注明出處這是不能為現代學者所能接受的所以決定重寫並且分寫為多少部還有在大乘佛法中本書分為性空唯名虛妄唯識真常唯心三系前二者也就是一般所説的中觀與瑜伽都重於論義古代的論師有思想上的傳承對於衆多的經文有整理與抉擇有批評也有融會但在傳統的信仰中又都表示是依經而造論的這點在空有之間答復王恩洋居士對本書的批評時已説明了依經立論但在本書對於前二系論義顯然的沒有注重到經典第三真常唯心在經典中本重於勝義自性真如法界佛身常住而在衆生位上點出真常本有與自性清淨心合一起初都是經説有些是論式的經僅有的寶性論也重於自性清淨的轉依為離垢清淨這一真常心的經義虛妄唯識者早就有了接觸而多少修正他但在流行中真常心與虛妄識相關聯而有如來藏藏識心楞伽密嚴等集出本書稱之為真常唯心論其實還是尊重虛妄唯識者的部分內容所以成唯識論也還引楞伽密嚴為經證真常心的特質是真常我在佛法的演化中達到衆生本來是佛衆生即佛末了是意解為本初佛有本為一佛一切為佛所顯現的意義這是更梵我化了對這些還沒有能明確的表示所以不想重版想分別的寫為多少部而對本書有所修正有所補充寫了説一切有部為主的論書與論師之研究又寫了原始佛教聖典之集成六十年夏我將過去的一般作品或記録編為妙雲集將印度之佛教的第一章印度佛教流變概觀第十七章密教之興與佛教之滅分別編入妙雲集的佛教史地考論以佛法研究佛法大概從此以後印度之佛教這部書知道的人漸漸多了但書是沒有流通的連我自己也沒有決定不再出版怎麼又要重版呢第一想分寫為多少部而二十年來在説到過的兩部以外只寫了初期大乘佛教之起源與開展如來藏之研究空之探究體力越來越差怕難有大部的寫作想到印度之佛教到底是始終條理表示了印度佛教的演變過程指出了抉擇取捨的明確標準在我的其他作品中還沒有足以代替的雖然文字體裁內容不完全理想還是有值得重印的意義第二有些人要讀約在六十三四年藍吉富居士在佛光山油印多少部給同學們參考原書可能是常覺法師提貢的六十七年春臺北研究佛學的青年緇素重版了一次今年圓光佛學院的同學又重版一次他們的重版當然是分贈有緣而不是銷售的六十七年重版時不知那一位寫的重版前言這樣説印度之佛教為印順老法師早年於大陸出版的第一部著作時值動亂故流傳不廣來臺之後始終未嘗再版故鮮為後學者所知近年有得舊本而抄之者時有託借復印展轉傳告求託復印者日衆而原作者無意再版奈何本書豫吾人對印度佛法流傳之遞變以提綱挈領之認識出吾人於摸索附會之深坑示吾人學佛之正途免學者之枉勞可謂開吾人眼目者較諸一般究非凡響而求者日衆必難以任其湮滅故有私下重版之議本書未必普遍為人信受但抄寫的復印的私下重版的看來是終究非出版不可的這部書在重慶初版脫落錯誤前後顛倒的就不少再經抄寫重印也難免有誤有些錯誤連我自己都想不出原文是什麼那不如自己來重加校正一下表式排得不理想的也加以改善既有人要讀總得校印一部比較好的本子使讀者讀起來方便些這樣就決定重版流通在文字的改正表式的改善以外在本書的某些章節中加上附注這因為本書是敘述而少引證引證也沒有説明出處所以加上附注這一節這一段可參閲我所作的其他作品這些作品對某些論題都引證而注明出處這樣可以補足本書的部分缺點還有本書是四十多年前的作品現在看來有些是應該修正的如十二分教阿含經的集出有部內在的三系等注明參閲某書凡所説而與本書不同的就應該依據這些後出的作品來改正這樣也可以減少因讀本書而引起不完善的見解本書自序中説僻處空山參考苦少直探於譯典者多於時賢之作惟內院出版之數種商務本印度佛教史略印度宗教哲學史而已我想在這裡補充幾句譯典是清刻的大藏經法尊法師從藏文譯出的菩提道次第廣論密宗道次第廣論入中論與支那內學院有關的是呂澄的雜阿含經刊定記內學第一輯阿毗達磨泛論內學第二輯西藏佛學原論商務本何載陽的南傳小乘部執內學第二輯劉定權的經部義內學第二輯呂澄等合編的諸家戒本通論內學第三輯還有日人寺本婉雅譯注的印度佛教史這是西藏傳説的特別是後期的印度佛教有很好的參考價值這本書是留日學僧墨禪法師的抗戰軍興墨師到武昌來我向他借了這本書不久他去了香港等到抗戰勝利回來知道墨師已在上海去世這本書就這樣的久借無歸成為我的書了沈隱了四十年的印度之佛教忽而重版多少有點意外其實意外的事多著呢印度之佛教初版時也曾有過非常的意外當時我住在合江深山的法王寺由住在重慶的蒙君仁慈負責出版事宜他與出版商談妥了預付一筆印刷費開始排版校對消息傳到山上大家非常歡喜半個月以後送稿校對的事停止了蒙君怎麼催也沒有效果後來竟渺茫到原稿也不知在那裡了消息傳來説不出的著急著急也沒有用只有一再寫信給蒙君急急的追索了沈悶了一個多月好消息忽然傳來有人負責承印並已開始送稿後來才知道蒙君接洽的出版商自己沒有印刷廠轉交另一印刷廠承印當然他要取得一分利益那時三十二年通貨膨脹加速負責排印的工廠覺得沒有利潤可得所以排了多少版與他收到的款項相當就停止了也就是不想做這筆生意了後來非常意外的我想可能是承包商將原稿到處去接洽這份原稿落在屬於軍部的一個印刷廠主管的手裡這位主管曾經出家在國民革命期間參加了革命行列他見到這份原稿覺得有不同平常的內容憑他對佛法的一分信心決意由他來負責完成這部書的出版價錢依舊可説為佛法服務工廠是沒有利潤可得的就這樣印度之佛教終於出版了三十三年夏我回縉雲山路過重慶特地約這位主管見面表示我對他深深的謝意意外的事我説是不可思議的因緣在這意外的重版時刻順便記下了這一段因緣希望讀者有這樣的感覺印度之佛教能與大家見面從過去到現在都是有點意外的七十四年七月五日印順記
